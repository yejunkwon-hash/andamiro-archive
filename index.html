<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안다 아카이브</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit" async defer></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
/* ===== 기본 토큰 (wiki.html과 동일) ===== */
:root{
  --accent:#C00000; --accent-soft:#d64a42; --bg:#eef1f5; --card:#ffffff;
  --text:#202124; --text-dim:#5f6368; --border:#e3e6ea; --border-strong:#c9ced6;
  --link:#1e6be0; --link-red:#cc2b2b; --box-bg:#f6f8fa; --infobox-head:#C00000;
  --table-head:#eef1f7; --shadow:0 1px 3px rgba(0,0,0,.08);
}
body.dark{
  --accent:#e05a52; --accent-soft:#ea7d76; --bg:#17181c; --card:#232429;
  --text:#e4e6eb; --text-dim:#9aa0ab; --border:#33353c; --border-strong:#44464e;
  --link:#6ba4ff; --link-red:#ff6b6b; --box-bg:#2a2c33; --infobox-head:#a83232;
  --table-head:#2a2c33; --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,
  'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;}
a{color:var(--link);text-decoration:none;} a:hover{text-decoration:underline;} a.new{color:var(--link-red);}

.topbar{position:sticky;top:0;z-index:50;background:var(--accent);color:#fff;display:flex;align-items:center;gap:14px;padding:0 18px;height:48px;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.topbar .brandwrap{display:flex;align-items:center;gap:10px;flex:none;}
.topbar .refresh{display:inline-flex;align-items:center;justify-content:center;color:#fff;opacity:.9;cursor:pointer;transition:opacity .15s;}
.topbar .refresh:hover{opacity:1;}
.topbar .refresh svg{display:block;}
.topbar .refresh.spinning{animation:andaspin .7s linear infinite;}
@keyframes andaspin{to{transform:rotate(360deg);}}
.topbar .logo{font-weight:800;font-size:17px;letter-spacing:-.5px;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer;}
.topbar .logo .mark{display:inline-flex;align-items:center;justify-content:center;background:#fff;border-radius:0;padding:4px 6px;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.topbar .logo .mark img{height:22px;width:auto;object-fit:contain;display:block;}
.topbar .search{flex:1;max-width:420px;position:relative;}
.topbar .search input{width:100%;height:32px;border:none;border-radius:5px;padding:0 12px;font-size:13.5px;background:rgba(255,255,255,.95);color:#111;}
.topbar .search input:focus{outline:2px solid rgba(255,255,255,.6);}
.topbar .spacer{flex:1;}
.topbar button.mode,.topbar button.logout,.topbar button.navbtn{background:rgba(255,255,255,.14);color:#fff;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;font-size:13px;}
.topbar button.mode:hover,.topbar button.logout:hover,.topbar button.navbtn:hover{background:rgba(255,255,255,.26);}
.topbar .userbox{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#fff;}
.role-badge{background:rgba(255,255,255,.22);padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;background:var(--card);vertical-align:middle;}
.seg-opt{border:none;background:transparent;color:var(--text-dim);font-size:12px;font-weight:700;padding:5px 12px;cursor:pointer;border-right:1px solid var(--border);font-family:inherit;transition:background .12s,color .12s;}
.seg-opt:last-child{border-right:none;}
.seg-opt.on{background:var(--accent);color:#fff;}
.seg-opt:not(.on):not(:disabled):hover{background:var(--box-bg);color:var(--text);}
.seg-locked .seg-opt{cursor:not-allowed;opacity:.8;}
.seg-me{font-size:11px;color:var(--text-dim);margin-left:6px;vertical-align:middle;}
.club-sel{max-width:140px;padding:4px 6px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);font-size:12.5px;font-family:inherit;cursor:pointer;}
.club-sel:hover{border-color:var(--accent);}
.club-sel:disabled{opacity:.6;cursor:default;}
.club-sel.ok{border-color:#1b7a2f;box-shadow:0 0 0 2px rgba(27,122,47,.18);}
.seg-opt.seg-owner{color:var(--accent);}
.seg-opt.seg-owner.on{background:var(--accent);color:#fff;}
.seg-opt.seg-owner:not(.on):not(:disabled):hover{background:#fdeaea;color:var(--accent);}
body.dark .seg-opt.seg-owner:not(.on):not(:disabled):hover{background:#3a2626;}
.mlink{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:700;}
.mlink:hover{text-decoration:underline;}
.profile-wrap{display:flex;gap:22px;align-items:flex-start;flex-wrap:wrap;}
.profile-main{flex:1;min-width:300px;}
.profile-side{width:290px;flex:none;}
.profile-top{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.profile-ava{width:96px;height:96px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:44px;font-weight:800;flex:none;user-select:none;}
.profile-headline{min-width:0;}
.profile-name{font-size:22px;font-weight:800;color:var(--text);}
.profile-handle{font-size:14px;font-weight:500;color:var(--text-dim);}
.profile-sub{font-size:13px;color:var(--text-dim);margin-top:5px;display:flex;align-items:center;gap:6px;}
.role-chip{background:var(--accent);color:#fff;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:700;}
.profile-table{max-width:520px;}
.profile-side .side-head{font-weight:800;color:var(--accent);margin-bottom:8px;}
.hh-first{background:var(--box-bg);color:var(--accent);border:1px solid var(--border);border-radius:8px;font-size:10px;padding:0 6px;margin-left:4px;}
.muted{color:var(--text-dim);}
@media(max-width:720px){ .profile-side{width:100%;} }
.profile-ava{background-size:cover;background-position:center;}
.me-wrap{display:flex;gap:22px;align-items:flex-start;flex-wrap:wrap;}
.me-table{flex:1;min-width:280px;}
.me-avatar-box{width:190px;flex:none;display:flex;flex-direction:column;gap:10px;align-items:stretch;}
.me-avatar{width:190px;height:190px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:80px;font-weight:800;background-size:cover;background-position:center;user-select:none;}
.me-avatar-btns{display:flex;flex-direction:column;gap:6px;}
.me-avatar-btns .btn{padding:7px 10px;font-size:13px;}
.me-avatar-msg{font-size:12px;min-height:16px;line-height:1.4;}
.me-avatar-msg.err{color:var(--link-red);}
.me-avatar-msg.ok{color:#1b7a2f;}
@media(max-width:720px){ .me-avatar-box{width:100%;align-items:center;} }
.club-sec{margin-top:28px;}
.club-sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;}
.club-sec-head h2{font-size:17px;margin:0;color:var(--text);}
.club-list{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.club-item{border-bottom:1px solid var(--border);}
.club-item:last-child{border-bottom:none;}
.club-row{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;background:var(--card);}
.club-row:hover{background:var(--box-bg);}
.club-caret{color:var(--text-dim);font-size:12px;width:12px;flex:none;}
.club-name{font-weight:700;color:var(--text);}
.club-count{color:var(--text-dim);font-size:12px;margin-left:auto;flex:none;}
.club-tag{font-size:10px;color:var(--text-dim);border:1px solid var(--border);border-radius:8px;padding:0 6px;}
.club-members{padding:6px 12px 12px 30px;background:var(--box-bg);display:flex;flex-direction:column;gap:2px;}
.club-mem{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:8px;text-decoration:none;color:var(--text);}
.club-mem:hover{background:var(--card);}
.club-mem-ava{width:26px;height:26px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;background-size:cover;background-position:center;}
.club-mem-t{font-size:13px;}
.club-empty{color:var(--text-dim);font-size:12.5px;padding:4px 6px;}
.ce-box{max-width:420px;}
.ce-add{display:flex;gap:8px;margin:14px 0 6px;}
.ce-add input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);}
.ce-msg{font-size:12px;min-height:15px;}
.ce-msg.err{color:var(--link-red);}
.ce-msg.ok{color:#1b7a2f;}
.ce-list{max-height:300px;overflow:auto;border:1px solid var(--border);border-radius:8px;margin-top:6px;}
.ce-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);}
.ce-row:last-child{border-bottom:none;}
.ce-name{font-weight:600;color:var(--text);}
.ce-btns{margin-left:auto;display:flex;gap:6px;}
.ce-btns button,.ce-add button{border:none;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;}
.ce-rename,.ce-cancel{background:var(--box-bg);color:var(--text);border:1px solid var(--border);}
.ce-del,.ce-save,.ce-add button{background:var(--accent);color:#fff;}
.ce-lock{margin-left:auto;font-size:11px;color:var(--text-dim);}
.ce-edit{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);}
.dir-top{display:flex;align-items:center;gap:8px;}
.dir-searchwrap{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:9px;padding:7px 11px;background:var(--card);color:var(--text-dim);min-width:210px;}
.dir-searchwrap input{border:none;outline:none;background:transparent;color:var(--text);font-size:14px;width:100%;}
.dir-filter{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:10px 0 4px;background:var(--card);display:flex;flex-direction:column;gap:12px;}
.dir-fgroup{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.dir-flabel{font-weight:800;font-size:13px;color:var(--text);min-width:48px;padding-top:5px;}
.dir-sort{display:flex;gap:6px;flex-wrap:wrap;}
.dir-chip{border:1px solid var(--border);background:var(--card);color:var(--text-dim);border-radius:20px;padding:5px 13px;font-size:12.5px;font-weight:700;cursor:pointer;}
.dir-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.dir-clubs{display:flex;gap:6px 14px;flex-wrap:wrap;}
.dir-check{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text);cursor:pointer;}
.dir-check input{accent-color:var(--accent);}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:12px;}
.dir-card{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card);text-decoration:none;color:var(--text);transition:box-shadow .15s,transform .15s,border-color .15s;}
.dir-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.10);transform:translateY(-2px);border-color:var(--accent);}
.dir-ava{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;font-weight:800;background-size:cover;background-position:center;user-select:none;}
.dir-info{padding:9px 11px 11px;}
.dir-name{font-weight:800;font-size:14.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dir-handle{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.dir-metarow{display:flex;align-items:center;gap:6px;margin-top:7px;}
.dir-no{font-size:11px;font-weight:800;color:var(--accent);}
.dir-club{font-size:10.5px;color:var(--text-dim);border:1px solid var(--border);border-radius:8px;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@media(max-width:560px){ .dir-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;} .dir-searchwrap{min-width:150px;} }
.usermenu{position:relative;display:flex;align-items:center;gap:9px;}
#userlabel{color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.um-trigger{position:relative;}
.usericon{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.usericon:hover{background:rgba(255,255,255,.30);}
.usermenu-drop{position:absolute;right:0;top:100%;padding-top:8px;min-width:190px;display:none;z-index:60;}
.um-trigger:hover .usermenu-drop,.um-trigger.open .usermenu-drop{display:block;}
.um-trigger.closing .usermenu-drop{display:none;}
.usermenu-drop a{display:block;padding:11px 15px;color:var(--text);font-size:13.5px;cursor:pointer;background:var(--card);border-left:1px solid var(--border);border-right:1px solid var(--border);}
.usermenu-drop a:first-child{border-top:1px solid var(--border);border-radius:8px 8px 0 0;}
.usermenu-drop a:last-child{border-bottom:1px solid var(--border);border-radius:0 0 8px 8px;box-shadow:0 6px 18px rgba(0,0,0,.14);}
.usermenu-drop a+a{border-top:1px solid var(--border);}
.usermenu-drop a:hover{background:var(--box-bg);text-decoration:none;}
.usermenu-drop a.danger{color:var(--link-red);}
@media(max-width:860px){ #userlabel{display:none;} }

/* 페이지 전환 애니메이션 */
@keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#doc.pageIn{animation:pageIn .22s ease;}

/* 대문(랜딩) */
.landing .hero-notice{text-align:center;border:1px solid var(--border);border-radius:10px;background:var(--box-bg);padding:22px 18px;margin-bottom:22px;}
.hn-title{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-.5px;margin-bottom:12px;}
.hn-lines p{margin:5px 0;color:var(--text);font-size:14px;line-height:1.7;}
.hn-lines b{color:var(--accent);}
.landing-grid{display:flex;gap:20px;align-items:flex-start;}
.cats{flex:1;min-width:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.landing-reco{min-height:calc(100vh - 300px);display:flex;flex-direction:column;}
.landing-reco .cat:last-child{flex:1;}
/* 커뮤니티 */
.community{display:flex;gap:16px;align-items:flex-start;}
.chat{flex:1;min-width:0;display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:420px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);}
.chat-head{background:var(--accent);color:#fff;font-weight:800;font-size:14px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.chat-size{display:inline-flex;gap:5px;}
.csz-btn{width:22px;height:22px;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.16);color:#fff;border-radius:5px;cursor:pointer;font-weight:800;font-size:14px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0;}
.csz-btn:hover{background:rgba(255,255,255,.32);}
.csz-btn:disabled{opacity:.35;cursor:default;}
.chat-log{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;zoom:var(--chat-scale,1);}
.chat-empty{color:var(--text-dim);font-size:13px;text-align:center;margin:auto;}
.chat-log .msg{display:flex;gap:9px;align-items:flex-start;max-width:100%;}
.msg-avatar{flex:none;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;overflow:hidden;background-size:cover;background-position:center;}
.msg-main{min-width:0;display:flex;flex-direction:column;gap:3px;}
.msg-who{font-weight:700;font-size:12.5px;color:var(--text);}
.msg-bubble-row{display:flex;align-items:flex-end;gap:6px;}
.msg-bubble{background:var(--card);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:8px 12px;font-size:14px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word;max-width:min(72%,420px);box-shadow:0 1px 2px rgba(0,0,0,.05);}
.msg.mine .msg-bubble{background:#fdeaea;border-color:#f0c8c8;}
body.dark .msg.mine .msg-bubble{background:#3a2626;border-color:#5a3a3a;}
.msg-time{font-size:10.5px;color:var(--text-dim);white-space:nowrap;}
.msg-del{flex:none;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-size:12px;line-height:1;padding:2px 3px;border-radius:5px;opacity:.5;transition:opacity .15s,color .15s,background .15s;}
.msg:hover .msg-del{opacity:.8;}
.msg-del:hover{opacity:1;color:var(--accent);background:var(--box-bg);}
.msg-reactions{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:1px;}
.rpill{display:inline-flex;align-items:center;gap:3px;font-size:12px;background:var(--box-bg);border:1px solid var(--border);border-radius:11px;padding:1px 8px;cursor:pointer;color:var(--text);line-height:1.7;}
.rpill.mine{background:var(--accent);border-color:var(--accent);color:#fff;}
.rpill:hover{border-color:var(--accent);}
.react-wrap{position:relative;display:inline-flex;}
.react-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;font-size:12px;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.react-btn:hover{border-color:var(--accent);color:var(--accent);}
.react-pop{position:absolute;bottom:26px;left:0;display:none;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 6px;box-shadow:var(--shadow);z-index:30;}
.react-pop.open{display:flex;}
.react-opt{border:none;background:transparent;font-size:17px;cursor:pointer;padding:2px 5px;border-radius:6px;line-height:1;}
.react-opt:hover{background:var(--box-bg);}
.react-opt.on{background:var(--box-bg);outline:2px solid var(--accent);}
.chat-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);background:var(--card);}
.chat-input input{flex:1;height:38px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-size:14px;background:var(--card);color:var(--text);}
.chat-input button{border:none;background:var(--accent);color:#fff;border-radius:6px;padding:0 18px;font-weight:700;cursor:pointer;}
.chat-input button:hover{filter:brightness(1.08);}
.eye-btn{flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:38px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:6px;cursor:pointer;padding:0;}
.eye-btn:hover{border-color:var(--accent);}
.eye-btn.on{border-color:var(--accent);color:var(--accent);background:var(--box-bg);}
.chat-hint{display:flex;justify-content:flex-end;padding:2px 4px 0;}
.latex-help{font-size:11.5px;color:var(--text-dim);cursor:pointer;}
.latex-help:hover{color:var(--accent);text-decoration:underline;}
.chat-preview{border:1px dashed var(--border);border-radius:8px;padding:8px 10px;margin-top:6px;background:var(--box-bg);}
.preview-label{font-size:11px;font-weight:800;color:var(--text-dim);margin-bottom:6px;letter-spacing:.3px;}
.preview-empty{font-size:13px;color:var(--text-dim);}
.chat-preview .preview-msg{max-width:100%;}
.chat-preview .msg-bubble{background:#fdeaea;border-color:#f0c8c8;}
body.dark .chat-preview .msg-bubble{background:#3a2626;border-color:#5a3a3a;}
.chat-admin{padding:6px 10px 2px;font-size:12px;color:var(--text-dim);}
.chat-admin-row{display:flex;justify-content:flex-end;align-items:center;gap:8px;flex-wrap:wrap;}
.chat-admin-text{text-align:right;}
.chat-admin-text b{color:var(--text);}
.chat-trash{border:1px solid var(--border);background:var(--card);border-radius:6px;width:32px;height:28px;cursor:pointer;font-size:14px;line-height:1;}
.chat-trash:hover{border-color:var(--accent);}
.chat-del-prompt{display:flex;align-items:center;justify-content:flex-end;gap:6px;width:100%;margin-top:5px;color:var(--text);font-size:12.5px;}
.chat-del-prompt button{border:none;border-radius:5px;padding:4px 11px;cursor:pointer;font-size:12px;font-weight:700;}
.chat-del-prompt .cdp-yes{background:var(--accent);color:#fff;}
.chat-del-prompt .cdp-no{background:var(--box-bg);color:var(--text);border:1px solid var(--border);}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal-box{background:var(--card);border-radius:12px;padding:22px 22px 18px;max-width:340px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,.35);}
.modal-msg{font-size:16px;font-weight:800;color:var(--text);line-height:1.5;}
.modal-sub{font-size:13px;color:var(--text-dim);margin-top:8px;line-height:1.5;}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.modal-btns button{border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-weight:700;font-size:13px;}
.modal-cancel{background:var(--box-bg);color:var(--text);border:1px solid var(--border);}
.modal-ok{background:var(--accent);color:#fff;}
.block-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1100;cursor:wait;}
.block-box{background:var(--card);border-radius:12px;padding:26px 34px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 12px 40px rgba(0,0,0,.35);}
.block-spin{width:34px;height:34px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:andaspin .8s linear infinite;}
.block-text{font-size:14px;color:var(--text);font-weight:600;}
/* 캘린더 */
.calendar-wrap{width:280px;flex:none;position:sticky;top:64px;}
.cal{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);}
.cal-topbar{display:flex;align-items:center;justify-content:space-between;background:var(--accent);color:#fff;padding:8px 12px;}
.cal-title{font-weight:800;font-size:14px;}
.cal-nav{background:rgba(255,255,255,.18);color:#fff;border:none;width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:11px;line-height:1;}
.cal-nav:hover:not(:disabled){background:rgba(255,255,255,.32);}
.cal-nav:disabled{opacity:.35;cursor:not-allowed;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);padding:1px;}
.cal-dow{background:var(--box-bg);text-align:center;font-size:11px;font-weight:800;padding:6px 0;color:var(--text-dim);}
.cal-cell{background:var(--card);min-height:38px;padding:4px;font-size:12px;color:var(--text);}
.cal-cell.empty{background:var(--box-bg);}
.cal-cell.today .cal-num{background:var(--accent);color:#fff;border-radius:50%;padding:1px 5px;}
.cal-dow.sun,.cal-cell.sun .cal-num{color:#d33;}
.cal-dow.sat,.cal-cell.sat .cal-num{color:#37c;}
.cal-cell.today.sun .cal-num,.cal-cell.today.sat .cal-num{color:#fff;}
.cal-admin{font-size:12px;color:var(--text);padding:9px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.cal-admin.muted{color:var(--text-dim);}
.cal-yr-input{width:64px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--card);color:var(--text);font-size:12px;}
.cal-save{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700;}
.cal-save:hover{filter:brightness(1.08);}
.cal-yr:hover{border-color:var(--accent);}
.cal-range{color:var(--text-dim);font-size:11px;}
.doclist-head{background:var(--accent);color:#fff;font-weight:800;font-size:15px;text-align:center;padding:11px;}
.cat-head{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--accent);color:#fff;border-top:1px solid rgba(255,255,255,.22);padding:9px 14px;cursor:pointer;user-select:none;}
.cat-head:hover{filter:brightness(1.06);}
.cat-name{font-weight:800;font-size:14px;color:#fff;}
.cat-toggle{font-size:12px;color:#fff;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.cat-chev{display:inline-block;font-size:11px;line-height:1;transition:transform .25s ease;opacity:.9;}
.cat.cat-collapsed .cat-chev{transform:rotate(-90deg);}
.cat-body{background:var(--card);max-height:1200px;overflow:hidden;transition:max-height .3s ease,opacity .25s ease;opacity:1;}
.cat.cat-collapsed .cat-body{max-height:0;opacity:0;}
.doc-link{display:flex;align-items:baseline;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;color:var(--text);}
.doc-link:last-child{border-bottom:none;}
.doc-link:hover{background:var(--box-bg);text-decoration:none;}
.dl-title{font-weight:700;color:var(--accent);white-space:nowrap;}
.dl-desc{font-size:12.5px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;}
.recent{width:215px;flex:none;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);}
.recent-h{font-weight:800;font-size:13px;padding:10px 13px;border-bottom:1px solid var(--border);color:var(--text-dim);background:var(--box-bg);}
.rc-item{display:flex;justify-content:space-between;gap:8px;padding:9px 13px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;color:var(--text);}
.rc-item:last-child{border-bottom:none;}
.rc-item:hover{background:var(--box-bg);text-decoration:none;}
.rc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rc-time{color:var(--text-dim);font-size:11px;white-space:nowrap;}
@media(max-width:760px){ .landing-grid{flex-direction:column;} .recent{width:100%;} }

.layout{max-width:1180px;margin:16px auto;padding:0 14px;display:flex;gap:16px;align-items:flex-start;}
.sidebar{width:210px;flex:none;position:sticky;top:64px;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;}
.sidebar h4{margin:0;padding:11px 14px;font-size:12px;color:var(--text-dim);letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--box-bg);}
.sidebar nav a{display:block;padding:9px 14px;color:var(--text);font-size:13.5px;border-bottom:1px solid var(--border);cursor:pointer;}
.sidebar nav a:hover{background:var(--box-bg);text-decoration:none;}
.sidebar nav a.active{color:var(--accent);font-weight:700;border-left:3px solid var(--accent);padding-left:11px;}
.sidebar .addbtn{display:block;width:calc(100% - 20px);margin:10px;padding:8px;border:1px dashed var(--border-strong);background:transparent;color:var(--accent);border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;}
.sidebar .addbtn:hover{background:var(--box-bg);}
.content{flex:1;min-width:0;}
.rightrail{width:217px;flex:none;position:sticky;top:64px;display:flex;flex-direction:column;gap:10px;}
.rightrail .recent{width:100%;box-sizing:border-box;}
.rightrail .addbtn{display:block;width:100%;padding:9px;border:1px dashed var(--border-strong);background:var(--card);color:var(--accent);border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;box-shadow:var(--shadow);}
.rightrail .addbtn:hover{background:var(--box-bg);}
.search-results{position:absolute;top:36px;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);overflow-y:auto;max-height:60vh;z-index:60;}
.search-results a{display:block;padding:9px 12px;color:var(--text);font-size:13.5px;border-bottom:1px solid var(--border);cursor:pointer;}
.search-results a:last-child{border-bottom:none;}
.search-results a:hover{background:var(--box-bg);text-decoration:none;}
.search-results .sr-empty{padding:9px 12px;color:var(--text-dim);font-size:13px;}
.search-results .sr-head{padding:7px 12px;font-size:11px;font-weight:800;letter-spacing:.3px;color:var(--text-dim);background:var(--box-bg);border-bottom:1px solid var(--border);}

.doc{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:22px 28px 34px;}
.doc-head{display:flex;align-items:baseline;flex-wrap:wrap;gap:10px;border-bottom:2px solid var(--accent);padding-bottom:8px;margin-bottom:4px;}
.doc-head h1{margin:0;font-size:26px;letter-spacing:-.5px;}
.doc-head .tabs{margin-left:auto;display:flex;gap:4px;}
.doc-head .tabs button{background:var(--box-bg);border:1px solid var(--border);color:var(--text-dim);font-size:12px;padding:4px 9px;border-radius:5px;cursor:pointer;}
.doc-head .tabs button:hover{border-color:var(--border-strong);color:var(--text);}
.doc-head .tabs button.danger{color:var(--link-red);}
.doc-meta{font-size:12px;color:var(--text-dim);margin:6px 0 14px;}

.notice{background:var(--box-bg);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:4px;padding:9px 14px;font-size:13px;color:var(--text-dim);margin:0 0 18px;}
.notice b{color:var(--text);}
.infobox{float:right;width:290px;margin:0 0 16px 20px;border:1px solid var(--border-strong);border-radius:6px;overflow:hidden;font-size:13px;background:var(--card);}
.infobox .ib-title{background:var(--infobox-head);color:#fff;text-align:center;padding:10px;font-weight:800;font-size:15px;letter-spacing:-.3px;}
.infobox .ib-sub{background:var(--infobox-head);color:rgba(255,255,255,.85);text-align:center;padding:0 10px 9px;font-size:12px;margin-top:-4px;}
.infobox table{width:100%;border-collapse:collapse;}
.infobox th,.infobox td{padding:7px 9px;border-top:1px solid var(--border);vertical-align:top;text-align:left;}
.infobox th{background:var(--table-head);width:34%;color:var(--text-dim);font-weight:700;white-space:nowrap;}

.toc{display:inline-block;min-width:230px;max-width:100%;background:var(--box-bg);border:1px solid var(--border);border-radius:5px;padding:10px 16px 12px;margin:6px 0 22px;}
.toc .toc-title{font-weight:800;font-size:14px;margin-bottom:6px;}
.toc ul{list-style:none;margin:0;padding:0;font-size:13.5px;}
.toc li{padding:1.5px 0;} .toc li.l3{padding-left:16px;} .toc li.l4{padding-left:32px;}
.toc a{color:var(--link);cursor:pointer;} .toc .n{color:var(--text-dim);margin-right:5px;}

.doc h2,.doc h3,.doc h4{scroll-margin-top:64px;cursor:pointer;position:relative;}
.doc h2{font-size:21px;border-bottom:1px solid var(--border-strong);padding-bottom:5px;margin:30px 0 12px;}
.doc h3{font-size:17.5px;border-bottom:1px solid var(--border);padding-bottom:4px;margin:22px 0 10px;}
.doc h4{font-size:15.5px;margin:18px 0 8px;}
.doc h2 .sec-num,.doc h3 .sec-num,.doc h4 .sec-num{color:var(--accent);margin-right:7px;font-weight:800;}
.doc h2 .fold{position:absolute;right:2px;font-size:12px;color:var(--text-dim);font-weight:400;}
.doc .collapsed{display:none;}
.doc p{margin:9px 0;}
.doc ul.body-list,.doc ol.body-list{margin:9px 0;padding-left:24px;}
.doc ul.body-list li,.doc ol.body-list li{margin:4px 0;}
.doc strong{color:var(--text);}
.doc table.wtable{border-collapse:collapse;width:100%;margin:12px 0;font-size:13.5px;}
.doc table.wtable th,.doc table.wtable td{border:1px solid var(--border-strong);padding:7px 10px;vertical-align:top;}
.doc table.wtable th{background:var(--table-head);font-weight:700;}
.doc table.wtable td.y{white-space:nowrap;color:var(--text-dim);width:90px;}
.callout{background:var(--box-bg);border:1px solid var(--border);border-left:4px solid var(--accent-soft);border-radius:4px;padding:11px 15px;margin:14px 0;font-size:14px;}
.callout .ct{font-weight:800;display:block;margin-bottom:3px;color:var(--accent);}
.imgph{background:repeating-linear-gradient(45deg,var(--box-bg),var(--box-bg) 10px,transparent 10px,transparent 20px);border:1px dashed var(--border-strong);border-radius:6px;color:var(--text-dim);display:flex;align-items:center;justify-content:center;text-align:center;min-height:120px;margin:14px 0;font-size:13px;padding:14px;}
.fn{color:inherit;}
.fn-mark{color:var(--link);cursor:help;font-size:11px;vertical-align:super;position:relative;}
.fn-mark:hover::after{content:attr(data-note);position:absolute;left:50%;bottom:150%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:7px 11px;border-radius:6px;font-size:12px;line-height:1.5;width:max-content;max-width:280px;white-space:normal;z-index:20;box-shadow:0 3px 10px rgba(0,0,0,.25);vertical-align:baseline;}
.footnotes{margin-top:34px;border-top:1px solid var(--border);padding-top:14px;font-size:12.5px;color:var(--text-dim);}
.footnotes .fn-item{margin:5px 0;} .footnotes .fn-item b{color:var(--link);margin-right:6px;}
.category{margin-top:26px;background:var(--box-bg);border:1px solid var(--border);border-radius:5px;padding:8px 14px;font-size:12.5px;color:var(--text-dim);}
.category b{color:var(--text-dim);margin-right:6px;} .category a{margin-right:4px;}
.related{list-style:none;padding:0;margin:8px 0;}
.related li{padding:3px 0 3px 18px;position:relative;}
.related li::before{content:"▸";position:absolute;left:0;color:var(--accent);}
footer.site{max-width:1180px;margin:14px auto 30px;padding:0 14px;color:var(--text-dim);font-size:12px;text-align:center;}

/* ===== 로그인 화면 ===== */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.login-card{background:var(--card);border:1px solid var(--border);border-top:4px solid var(--accent);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.12);width:100%;max-width:360px;padding:28px 26px;}
.login-card h1{margin:0 0 4px;font-size:22px;letter-spacing:-.5px;}
.login-card .sub{color:var(--text-dim);font-size:13px;margin-bottom:20px;}
.login-card label{display:block;font-size:12.5px;color:var(--text-dim);margin:12px 0 4px;font-weight:700;}
.login-card input{width:100%;height:38px;border:1px solid var(--border-strong);border-radius:6px;padding:0 11px;font-size:14px;background:var(--card);color:var(--text);}
.login-card input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
.btn{border:none;border-radius:6px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer;}
.btn.primary{background:var(--accent);color:#fff;width:100%;margin-top:18px;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.ghost{background:var(--box-bg);border:1px solid var(--border);color:var(--text);}
.login-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:12.5px;}
.login-row a{cursor:pointer;}
.msg{font-size:13px;margin-top:12px;padding:8px 11px;border-radius:6px;display:none;}
.msg.err{display:block;background:#fdecec;color:#b3261e;border:1px solid #f5c2c0;}
.msg.ok{display:block;background:#eaf6ec;color:#1b7a2f;border:1px solid #bfe3c6;}
body.dark .msg.err{background:#3a2020;color:#ff9a94;border-color:#5a2a2a;}
body.dark .msg.ok{background:#1f3323;color:#8fd39c;border-color:#2f5236;}

/* ===== 편집 폼 ===== */
.editor label{display:block;font-size:12.5px;color:var(--text-dim);font-weight:700;margin:14px 0 4px;}
.editor input,.editor textarea{width:100%;border:1px solid var(--border-strong);border-radius:6px;padding:9px 11px;font-size:14px;background:var(--card);color:var(--text);font-family:inherit;}
.editor textarea{min-height:340px;resize:vertical;line-height:1.6;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;}
.editor .hint{font-size:11.5px;color:var(--text-dim);font-weight:400;margin-left:6px;}
.editor .adv summary{cursor:pointer;font-size:12.5px;color:var(--text-dim);margin-top:14px;}
.editor-actions{display:flex;gap:8px;margin-top:18px;align-items:center;}

/* ===== 역사 패널 ===== */
.history .rev{border:1px solid var(--border);border-radius:6px;padding:10px 13px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.history .rev .meta{font-size:12.5px;color:var(--text-dim);}
.history .rev .meta b{color:var(--text);}
.history .rev button{white-space:nowrap;}
.history .rev button:disabled{opacity:.45;cursor:not-allowed;}
.history .expired{font-size:11.5px;color:var(--text-dim);}

@media(max-width:860px){
  .layout{flex-direction:column;}
  .rightrail{width:100%;position:static;}
  .landing-reco{min-height:0;}
  .community{flex-direction:column;}
  .calendar-wrap{width:100%;position:static;}
  .chat{height:60vh;}
  .infobox{float:none;width:100%;margin:0 0 16px;}
  .doc{padding:18px 16px 28px;}
  .topbar .search{max-width:none;}
  .doc-head h1{font-size:22px;}
}

<script>
/* ================== 설정 ================== */
const SUPABASE_URL = 'https://vqocngalfxboticcmiwh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_DXLmvZx9AfuAwcSlCD1Zww_RCSl83Lx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===== Cloudflare Turnstile (CAPTCHA) ===== */
const TS_SITEKEY = '0x4AAAAAADxloShb4WCYFvpB';
let liWidget=null, suWidget=null, liToken='', suToken='';
window.onTurnstileLoad = function(){
  renderLoginCaptcha();
  if(document.getElementById('signupCard').style.display!=='none') renderSignupCaptcha();
};
function renderLoginCaptcha(){
  if(window.turnstile && liWidget===null)
    liWidget=turnstile.render('#li-captcha',{sitekey:TS_SITEKEY,callback:t=>{liToken=t;},'expired-callback':()=>{liToken='';},'error-callback':()=>{liToken='';}});
}
function renderSignupCaptcha(){
  if(window.turnstile && suWidget===null)
    suWidget=turnstile.render('#su-captcha',{sitekey:TS_SITEKEY,callback:t=>{suToken=t;},'expired-callback':()=>{suToken='';},'error-callback':()=>{suToken='';}});
}
function resetLoginCaptcha(){ if(window.turnstile && liWidget!==null) turnstile.reset(liWidget); liToken=''; }
function resetSignupCaptcha(){ if(window.turnstile && suWidget!==null) turnstile.reset(suWidget); suToken=''; }

/* 사이드바 표시 순서(원하는 순). 목록에 없는 새 문서는 뒤에 자동 추가 */
const ORDER = ['home','kypt','method','stats','topics','tools'];

const state = { user:null, role:'viewer', email:'', name:'', handle:'', docs:[], key:null, recovery:false };
const $ = s => document.querySelector(s);

/* ================== 인증 ================== */
async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ await onLoggedIn(); } else { showLogin(); }
}
function showLogin(){ $('#login').style.display='flex'; $('#app').style.display='none'; }
function showApp(){ $('#login').style.display='none'; $('#app').style.display='block'; }

async function doLogin(){
  const email=$('#li-email').value.trim(), pw=$('#li-pw').value;
  const msg=$('#li-msg'); msg.className='msg';
  if(!email||!pw){ msg.className='msg err'; msg.textContent='이메일과 비밀번호를 입력하세요.'; return; }
  if(!liToken){ msg.className='msg err'; msg.textContent='보안 확인(CAPTCHA)을 완료해 주세요.'; return; }
  $('#li-btn').disabled=true; $('#li-btn').textContent='로그인 중…';
  const { error } = await sb.auth.signInWithPassword({ email, password:pw, options:{ captchaToken: liToken } });
  $('#li-btn').disabled=false; $('#li-btn').textContent='로그인';
  resetLoginCaptcha();
  if(error){ msg.className='msg err'; msg.textContent='로그인 실패: '+error.message; return; }
  await onLoggedIn();
}
async function doReset(){
  const email=$('#li-email').value.trim(), msg=$('#li-msg');
  if(!email){ msg.className='msg err'; msg.textContent='먼저 이메일을 입력한 뒤 눌러주세요.'; return; }
  if(!liToken){ msg.className='msg err'; msg.textContent='보안 확인(CAPTCHA)을 완료해 주세요.'; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href, captchaToken: liToken });
  resetLoginCaptcha();
  msg.className = error ? 'msg err' : 'msg ok';
  msg.textContent = error ? ('오류: '+error.message) : '재설정 링크를 이메일로 보냈어요. 메일의 링크를 누르면 새 비밀번호를 설정하는 화면으로 이동합니다. (스팸함도 확인) 혹시 메일을 받지 못하였다면 관리자에게 직접 문의하세요.';
}
async function onLoggedIn(){
  const { data:{ user } } = await sb.auth.getUser();
  state.user = user;
  const { data: prof } = await sb.from('profiles').select('role,email,name,handle').eq('id', user.id).single();
  state.role = prof?.role || 'viewer';
  state.email = prof?.email || user.email;
  state.name = prof?.name || '';
  state.handle = prof?.handle || '';
  renderUserbox();
  await loadDocs();
  showApp();
  route();
}
const ROLE_RANK={ viewer:0, editor:1, admin:2, owner:3 };
function roleRank(r){ return ROLE_RANK[r] ?? 0; }
function myRank(){ return roleRank(state.role); }
function canEdit(){ return myRank() >= ROLE_RANK.editor; }
function isAdmin(){ return myRank() >= ROLE_RANK.admin; }   // owner도 admin 권한 포함(상위 계층)
function isOwner(){ return state.role==='owner'; }
function renderUserbox(){
  const who = state.name || state.handle || (state.email ? state.email.split('@')[0] : '') || '회원';
  $('#userlabel').innerHTML = `${escapeHtml(who)} 님 <span class="role-badge" style="background:rgba(255,255,255,.22)">${state.role}</span>`;
  $('#dropRequests').style.display = isOwner() ? 'block' : 'none';
  $('#dropHealth').style.display = isOwner() ? 'block' : 'none';
  $('#dropAdmin').style.display = isAdmin() ? 'block' : 'none';
}

/* ================== 문서 목록/로드 ================== */
async function loadDocs(){
  const { data, error } = await sb.from('documents').select('key,title');
  if(error){ $('#doc').innerHTML='<p>문서 목록을 불러오지 못했습니다: '+escapeHtml(error.message)+'</p>'; return; }
  const rank = k => { const i=ORDER.indexOf(k); return i<0 ? 999 : i; };
  state.docs = (data||[]).sort((a,b)=> rank(a.key)-rank(b.key) || a.key.localeCompare(b.key));
  buildNav();
}
function buildNav(active){
  const nav=$('#nav'); if(!nav) return;   // 좌측 문서 목록 제거됨 → 호출돼도 안전하게 무시
  nav.innerHTML =
    `<a data-key="main" class="${active==='main'?'active':''}">🏠 대문</a>` +
    state.docs.map(d =>
      `<a data-key="${d.key}" class="${d.key===active?'active':''}">${escapeHtml(d.title||d.key)}</a>`).join('');
  $('#nav').querySelectorAll('a').forEach(a=>a.onclick=()=>{ location.hash='#'+a.dataset.key; });
}

/* 우측 '최근 변경' 레일 (문서 페이지에서만 표시) */
async function fetchRecent(){
  try{ const { data } = await sb.from('documents').select('key,title,updated_at').order('updated_at',{ascending:false}).limit(10); return data||[]; }
  catch(e){ return []; }
}
function railReserve(on){
  const rail=$('#rightrail'); if(!rail) return;
  if(on){ rail.style.display=''; if(!rail.innerHTML) rail.innerHTML='<div class="recent"><div class="recent-h">최근 변경</div><div class="rc-item" style="cursor:default;color:var(--text-dim)">불러오는 중…</div></div>'; }
  else { rail.style.display='none'; rail.innerHTML=''; }
}
function renderRightRail(recent){
  const rail=$('#rightrail'); if(!rail) return;
  rail.style.display='';
  const list = (recent && recent.length)
    ? recent.map(r=>`<a class="rc-item" data-key="${escapeAttr(r.key)}"><span class="rc-name">${escapeHtml(r.title||r.key)}</span><span class="rc-time">${fmtKST(r.updated_at)}</span></a>`).join('')
    : '<div class="rc-item" style="cursor:default;color:var(--text-dim)">최근 변경 없음</div>';
  rail.innerHTML = `<div class="recent"><div class="recent-h">최근 변경</div>${list}</div>`
    + (canEdit()?`<button class="addbtn" id="railAdd">＋ 새 문서</button>`:'');
  rail.querySelectorAll('.rc-item[data-key]').forEach(a=>a.onclick=()=>{ location.hash='#'+a.dataset.key; });
  const add=$('#railAdd'); if(add) add.onclick=addDoc;
}

async function renderDoc(key){
  const { data: doc, error } = await sb.from('documents').select('*').eq('key', key).single();
  if(error || !doc){ $('#doc').innerHTML='<h1>문서 없음</h1><p>존재하지 않는 문서입니다.</p>'; return; }
  state.key = key;
  const info = doc.infobox, cat = doc.category;
  let infoboxHtml='';
  if(info && info.rows){
    const rows = info.rows.map(r=>`<tr><th>${r[0]}</th><td>${r[1]}</td></tr>`).join('');
    infoboxHtml = `<aside class="infobox"><div class="ib-title">${escapeHtml(info.title||'')}</div>`
      + (info.sub?`<div class="ib-sub">${escapeHtml(info.sub)}</div>`:'')
      + `<table>${rows}</table></aside>`;
  }
  const tabs = [];
  if(canEdit()) tabs.push('<button id="editBtn">[편집]</button>');
  tabs.push('<button id="histBtn">[역사]</button>');
  if(isAdmin()) tabs.push('<button id="delBtn" class="danger">[삭제]</button>');

  $('#doc').innerHTML = `
    <div class="doc-head"><h1>${escapeHtml(doc.title||'')}</h1>
      <div class="tabs">${tabs.join('')}</div></div>
    <div class="doc-meta">${escapeHtml(doc.eng||'')} · 최근 수정: ${fmtKST(doc.updated_at)}</div>
    ${doc.notice?`<div class="notice">${doc.notice}</div>`:''}
    ${infoboxHtml}
    <div class="toc-slot"></div>
    <div class="doc-body">${doc.body||''}</div>
    <div class="footnotes-slot"></div>
    ${cat?`<div class="category"><b>분류:</b> ${cat.map(c=>`<a class="new">${escapeHtml(c)}</a>`).join(' | ')}</div>`:''}
  `;
  buildToc(); buildFootnotes(); buildNav(key);
  if(canEdit()) $('#editBtn').onclick=()=>enterEdit(doc);
  $('#histBtn').onclick=()=>showHistory(key);
  if(isAdmin()) $('#delBtn').onclick=()=>deleteDoc(doc);
  renderRightRail(await fetchRecent());
  window.scrollTo(0,0);
}

/* 목차/각주 (wiki.html과 동일 로직) */
function buildToc(){
  const body=$('#doc').querySelector('.doc-body'); if(!body) return;
  const heads=body.querySelectorAll('h2,h3,h4'); let c2=0,c3=0,c4=0; const items=[];
  heads.forEach(h=>{
    let num='';
    if(h.tagName==='H2'){c2++;c3=0;c4=0;num=`${c2}`;}
    else if(h.tagName==='H3'){c3++;c4=0;num=`${c2}.${c3}`;}
    else{c4++;num=`${c2}.${c3}.${c4}`;}
    const id='sec-'+num.replace(/\./g,'-'); h.id=id;
    const t=h.textContent;
    h.innerHTML=`<span class="sec-num">${num}.</span>${t}`+(h.tagName==='H2'?`<span class="fold">［접기］</span>`:'');
    items.push({level:h.tagName,num,id,text:t});
  });
  if(items.length){
    const lis=items.map(it=>{const cls=it.level==='H3'?'l3':it.level==='H4'?'l4':'';
      return `<li class="${cls}"><a data-target="${it.id}"><span class="n">${it.num}.</span>${it.text}</a></li>`;}).join('');
    $('#doc').querySelector('.toc-slot').innerHTML=`<div class="toc"><div class="toc-title">목차</div><ul>${lis}</ul></div>`;
  }
  $('#doc').querySelectorAll('.toc a').forEach(a=>a.onclick=e=>{e.preventDefault();
    const t=document.getElementById(a.dataset.target); if(t)t.scrollIntoView({behavior:'smooth',block:'start'});});
  body.querySelectorAll('h2').forEach(h=>h.addEventListener('click',()=>{
    let el=h.nextElementSibling; const col=h.classList.toggle('is-collapsed');
    const f=h.querySelector('.fold'); if(f)f.textContent=col?'［펼치기］':'［접기］';
    while(el&&el.tagName!=='H2'){el.classList.toggle('collapsed',col);el=el.nextElementSibling;}
  }));
}
function buildFootnotes(){
  const fns=$('#doc').querySelectorAll('.doc-body .fn'); if(!fns.length) return;
  const list=[];
  fns.forEach((fn,i)=>{const n=i+1,note=fn.dataset.note||'';
    const m=document.createElement('sup');m.className='fn-mark';m.textContent=`[${n}]`;m.dataset.note=note;
    fn.after(m); list.push(`<div class="fn-item" id="fn-${n}"><b>[${n}]</b>${note}</div>`);});
  $('#doc').querySelector('.footnotes-slot').innerHTML=`<div class="footnotes"><b>각주</b>${list.join('')}</div>`;
}

/* ================== 편집 ================== */
function enterEdit(doc){
  const infoStr = doc.infobox ? JSON.stringify(doc.infobox, null, 2) : '';
  const catStr = doc.category ? doc.category.join(', ') : '';
  $('#doc').innerHTML = `
    <div class="doc-head"><h1>문서 편집</h1></div>
    <div class="editor">
      <label>제목</label><input id="e-title" value="${escapeAttr(doc.title||'')}">
      <label>영문 부제 <span class="hint">(선택)</span></label><input id="e-eng" value="${escapeAttr(doc.eng||'')}">
      <label>안내상자 <span class="hint">(문서 상단 회색 박스, HTML 가능·선택)</span></label>
      <input id="e-notice" value="${escapeAttr(doc.notice||'')}">
      <label>분류 <span class="hint">(쉼표로 구분)</span></label><input id="e-cat" value="${escapeAttr(catStr)}">
      <label>본문 <span class="hint">(HTML. h2/h3로 제목, &lt;span class="fn" data-note="…"&gt;용어&lt;/span&gt;로 각주)</span></label>
      <textarea id="e-body">${escapeHtml(doc.body||'')}</textarea>
      <details class="adv"><summary>정보 틀(인포박스) 고급 편집 · JSON</summary>
        <textarea id="e-info" style="min-height:160px">${escapeHtml(infoStr)}</textarea>
      </details>
      <div class="editor-actions">
        <button class="btn primary" id="saveBtn" style="width:auto">저장</button>
        <button class="btn ghost" id="cancelBtn">취소</button>
        <span class="msg" id="e-msg" style="margin:0"></span>
      </div>
    </div>`;
  $('#cancelBtn').onclick=()=>renderDoc(doc.key);
  $('#saveBtn').onclick=()=>saveDoc(doc.key);
  window.scrollTo(0,0);
}
async function saveDoc(key){
  const msg=$('#e-msg'); msg.className='msg';
  let infobox=null;
  const rawInfo=$('#e-info').value.trim();
  if(rawInfo){ try{ infobox=JSON.parse(rawInfo); }catch(e){ msg.className='msg err'; msg.textContent='정보 틀 JSON 형식 오류: '+e.message; return; } }
  const cat=$('#e-cat').value.split(',').map(s=>s.trim()).filter(Boolean);
  const payload={
    title:$('#e-title').value.trim(),
    eng:$('#e-eng').value.trim()||null,
    notice:$('#e-notice').value.trim()||null,
    body:$('#e-body').value,
    category: cat.length?cat:null,
    infobox: infobox,
    updated_by: state.user.id,
    updated_at: new Date().toISOString()
  };
  $('#saveBtn').disabled=true;
  const { error } = await sb.from('documents').update(payload).eq('key', key);
  $('#saveBtn').disabled=false;
  if(error){ msg.className='msg err'; msg.textContent='저장 실패: '+error.message; return; }
  await loadDocs(); await renderDoc(key);   // 저장 시 트리거가 이전 버전을 자동 백업
}
async function addDoc(){
  const key=(prompt('새 문서의 주소(영문 소문자, 예: history)')||'').trim().toLowerCase();
  if(!key) return;
  if(!/^[a-z0-9_-]+$/.test(key)){ alert('주소는 영문 소문자·숫자·-·_ 만 가능해요.'); return; }
  const title=(prompt('문서 제목')||'').trim(); if(!title) return;
  const { error } = await sb.from('documents').insert({
    key, title, body:'<h2>개요</h2>\n<p>내용을 작성하세요.</p>', updated_by: state.user.id });
  if(error){ alert('생성 실패: '+error.message); return; }
  await loadDocs(); location.hash='#'+key;
}
async function deleteDoc(doc){
  if(!confirm(`'${doc.title}' 문서를 삭제할까요? (이력도 함께 사라집니다)`)) return;
  const { error } = await sb.from('documents').delete().eq('key', doc.key);
  if(error){ alert('삭제 실패: '+error.message); return; }
  await loadDocs(); location.hash = state.docs[0] ? '#'+state.docs[0].key : '#home';
}

/* ================== 역사 / 롤백 ================== */
async function showHistory(key){
  const { data: revs, error } = await sb.from('revisions').select('*').eq('doc_key', key).order('edited_at',{ascending:false});
  if(error){ alert('이력을 불러오지 못했습니다: '+error.message); return; }
  const MONTH = 30*24*3600*1000;
  const rows = (revs||[]).map(r=>{
    const within = (Date.now()-new Date(r.edited_at).getTime()) <= MONTH;
    const who = r.edited_by ? r.edited_by.slice(0,8) : '알 수 없음';
    const rb = canEdit()
      ? (within ? `<button class="btn ghost" data-id="${r.id}">이 버전으로 되돌리기</button>`
                : `<span class="expired">30일 경과 · 롤백 불가</span>`)
      : '';
    return `<div class="rev"><div class="meta"><b>${fmtKST(r.edited_at)}</b> · ${escapeHtml(r.title||'')} · 편집자 ${who}</div>${rb}</div>`;
  }).join('') || '<p>아직 편집 이력이 없습니다. (문서를 한 번 수정하면 이전 버전이 여기에 쌓입니다.)</p>';

  $('#doc').innerHTML = `
    <div class="doc-head"><h1>역사 · ${escapeHtml(key)}</h1>
      <div class="tabs"><button id="backBtn">[문서로]</button></div></div>
    <div class="doc-meta">30일 이내 버전만 되돌릴 수 있습니다. 되돌려도 과거 기록은 지워지지 않습니다.</div>
    <div class="history">${rows}</div>`;
  $('#backBtn').onclick=()=>renderDoc(key);
  $('#doc').querySelectorAll('.history button[data-id]').forEach(b=>b.onclick=()=>doRollback(key, Number(b.dataset.id)));
  window.scrollTo(0,0);
}
async function doRollback(key, revId){
  if(!confirm('이 버전으로 되돌릴까요? 현재 내용은 이력으로 보관됩니다.')) return;
  const { error } = await sb.rpc('rollback_document', { p_key:key, p_revision_id:revId });
  if(error){ alert('되돌리기 실패: '+error.message); return; }
  await loadDocs(); await renderDoc(key);
}

/* ================== 회원 관리 (admin+) ================== */
/* 세그먼트 렌더: owner=모든 회원(+양도), admin=viewer·editor 회원만(최대 admin). 본인 행은 잠금. */
function memberSeg(m){
  const base=['viewer','editor','admin'];
  const btn=(r,cls,extra)=>`<button class="seg-opt${cls}${r==='owner'?' seg-owner':''}${m.role===r?' on':''}"${extra}>${r}</button>`;
  if(m.id===state.user.id){
    const btns=[...base,'owner'].map(r=>btn(r,'',' disabled')).join('');
    return `<div class="seg seg-locked" title="본인 등급은 바꿀 수 없어요">${btns}</div> <span class="seg-me">(나)</span>`;
  }
  const manageable = isOwner() || roleRank(m.role) <= ROLE_RANK.editor;   // admin은 viewer·editor만
  if(!manageable){
    const btns=base.map(r=>btn(r,'',' disabled')).join('');
    return `<div class="seg seg-locked" title="admin은 viewer·editor 회원만 변경할 수 있어요">${btns}</div>`;
  }
  const list = isOwner() ? [...base,'owner'] : base;   // owner만 양도(owner) 옵션
  const btns=list.map(r=>btn(r,'',` data-role="${r}"${r==='owner'?' title="owner 양도"':''}`)).join('');
  return `<div class="seg" data-id="${m.id}">${btns}</div> <span class="ck" data-for="${m.id}" style="font-size:11px;margin-left:6px"></span>`;
}

/* 소속(동아리) 칸: owner는 드롭다운으로 배정, 그 외는 텍스트 표시 */
function clubCell(id, cur, names){
  cur = cur || '무소속';
  if(!isOwner()) return escapeHtml(cur);
  const opts = names.includes(cur) ? names : [...names, cur];   // '목록 외' 값도 선택 유지
  const o = opts.map(n=>`<option value="${escapeAttr(n)}"${n===cur?' selected':''}>${escapeHtml(n)}</option>`).join('');
  return `<select class="club-sel" data-id="${escapeAttr(id)}" data-prev="${escapeAttr(cur)}">${o}</select>`;
}
async function setMemberClub(id, club, sel){
  const prev = sel.getAttribute('data-prev') || club;
  sel.disabled=true;
  try{
    const { error } = await sb.rpc('set_member_club', { p_target:id, p_club:club });
    if(error) throw error;
    sel.setAttribute('data-prev', club);
    sel.classList.add('ok'); setTimeout(()=>sel.classList.remove('ok'), 1200);
  }catch(e){
    sel.value=prev;
    alert('소속 변경 실패: owner 권한과 동아리 목록을 확인하세요. (20_member_club.sql 실행 여부도 확인)');
  }finally{ sel.disabled=false; }
}

async function renderClubSection(){
  const box=$('#clubSection'); if(!box) return;
  let clubs=[], profs=[];
  try{ const { data } = await sb.from('clubs').select('id,name,is_none'); clubs=data||[]; }catch(e){}
  try{ const { data } = await sb.from('profiles').select('id,member_no,name,handle,club,avatar_url'); profs=data||[]; }catch(e){}
  const byClub={}; profs.forEach(p=>{ const c=p.club||'무소속'; (byClub[c]=byClub[c]||[]).push(p); });
  const tableByName={}; clubs.forEach(c=>{ tableByName[c.name]=c; });
  const allNames=new Set([...clubs.map(c=>c.name), ...profs.map(p=>p.club||'무소속')]);
  const names=[...allNames].filter(n=>n!=='무소속').sort((a,b)=>String(a).localeCompare(String(b),'ko'));
  names.push('무소속');
  const items=names.map(n=>{
    const t=tableByName[n]; const inTable=!!t;
    const mem=(byClub[n]||[]).slice().sort((a,b)=>(a.member_no||1e9)-(b.member_no||1e9));
    const memHtml = mem.length ? mem.map(m=>{
      const av=avatarFor(m.name,m.handle);
      const ava = m.avatar_url
        ? `<span class="club-mem-ava" style="background-image:url('${escapeAttr(m.avatar_url)}')"></span>`
        : `<span class="club-mem-ava" style="background:${av.bg}">${escapeHtml(av.ch)}</span>`;
      return `<a class="club-mem" href="#member/${m.id}">${ava}<span class="club-mem-t">#${m.member_no??'-'} ${escapeHtml(m.name||'-')} <span class="muted">@${escapeHtml(m.handle||'-')}</span></span></a>`;
    }).join('') : '<div class="club-empty">소속 회원이 없습니다.</div>';
    return `<div class="club-item">
      <div class="club-row">
        <span class="club-caret">▸</span>
        <span class="club-name">${escapeHtml(n)}</span>${(!inTable && n!=='무소속')?'<span class="club-tag">목록 외</span>':''}
        <span class="club-count">${mem.length}명</span>
      </div>
      <div class="club-members" style="display:none">${memHtml}</div>
    </div>`;
  }).join('');
  box.innerHTML=`
    <div class="club-sec-head"><h2>동아리 목록</h2><button class="btn ghost" id="clubEditBtn">동아리 목록 수정</button></div>
    <div class="club-list">${items}</div>
    <div class="doc-meta">동아리명을 눌러 소속 회원을 펼쳐볼 수 있어요. '목록 외'는 회원이 가입 때 직접 적었지만 목록에 아직 없는 이름이에요 — 수정에서 추가하면 관리됩니다.</div>`;
  box.querySelectorAll('.club-row').forEach(r=>r.onclick=()=>{
    const m=r.parentElement.querySelector('.club-members'); const open=m.style.display!=='none';
    m.style.display=open?'none':'block'; r.querySelector('.club-caret').textContent=open?'▸':'▾';
  });
  $('#clubEditBtn').onclick=openClubEditor;
}

/* 동아리 목록 수정 모달 (추가 / 이름변경 / 삭제) */
async function openClubEditor(){
  let clubs=[];
  try{ const { data } = await sb.from('clubs').select('id,name,is_none'); clubs=data||[]; }catch(e){}
  clubs.sort((a,b)=> (a.is_none?1:0)-(b.is_none?1:0) || String(a.name).localeCompare(String(b.name),'ko'));

       </div>`).join('');

    <div class="ce-add"><input id="ceNew" type="text" placeholder="새 동아리 이름" maxlength="40" autocomplete="off"><button id="ceAdd">추가</button></div>

    <div class="modal-btns"><button class="modal-cancel" id="ceClose">닫기</button></div>
  </div>`;
  document.body.appendChild(ov);
  const reopen=()=>{ ov.remove(); openClubEditor(); };
  const close=()=>{ ov.remove(); renderClubSection(); };
  const setMsg=(t,ok)=>{ const m=$('#ceMsg'); if(!m)return; m.textContent=t||''; m.className='ce-msg'+(ok?' ok':(t?' err':'')); };
  $('#ceClose').onclick=close;
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  $('#ceAdd').onclick=async()=>{
    const name=($('#ceNew').value||'').trim(); if(!name){ setMsg('이름을 입력하세요.'); return; }
    const { error }=await sb.rpc('add_club',{ p_name:name });
    if(error){ setMsg(error.message||'추가 실패'); return; }
    reopen();
  };
  $('#ceNew').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); $('#ceAdd').click(); } });
  ov.querySelectorAll('.ce-del').forEach(b=>b.onclick=async()=>{
    const row=b.closest('.ce-row'); const id=row.dataset.id, name=row.dataset.name;
    const ok=await confirmModal('"'+name+'" 동아리를 삭제할까요?','소속 회원은 모두 무소속으로 이동합니다.');
    if(!ok) return;
    showBlockingLoader('삭제하는 중…');
    const { error }=await sb.rpc('delete_club',{ p_id:Number(id) });
    hideBlockingLoader();
    if(error){ setMsg(error.message||'삭제 실패'); return; }
    reopen();
  });
  ov.querySelectorAll('.ce-rename').forEach(b=>b.onclick=()=>{
    const row=b.closest('.ce-row'); const id=row.dataset.id, name=row.dataset.name;
    row.innerHTML=`<input class="ce-edit" type="text" value="${escapeAttr(name)}" maxlength="40" autocomplete="off"><span class="ce-btns"><button class="ce-save">저장</button><button class="ce-cancel">취소</button></span>`;
    const inp=row.querySelector('.ce-edit'); inp.focus();
    row.querySelector('.ce-cancel').onclick=reopen;

      if(error){ setMsg(error.message||'변경 실패'); return; }
      reopen();
    };
    row.querySelector('.ce-save').onclick=doSave;
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); doSave(); } });
  });
}
async function setRole(id, role){
  const note=$('#doc').querySelector('.ck[data-for="'+id+'"]');
  if(role==='owner'){
    const ok=await confirmModal('이 회원에게 owner 권한을 양도하시겠습니까?', '본인은 admin으로 등급 하향됩니다. (되돌리려면 새 owner가 다시 양도해야 합니다.)', '양도');
    if(!ok){ renderAdmin(); return; }
    if(note){ note.textContent='양도 중…'; note.style.color='var(--text-dim)'; }
    const { error } = await sb.rpc('transfer_owner', { p_target:id });
    if(error){ if(note){ note.textContent='실패: '+error.message; note.style.color='var(--link-red)'; } return; }
    state.role='admin'; renderUserbox();                 // 본인은 이제 admin
    alert('owner 권한을 양도했습니다. 본인 등급은 admin으로 변경되었습니다.');
    renderAdmin();                                        // 새 권한 기준으로 표 갱신
    return;
  }
  if(note){ note.textContent='변경 중…'; note.style.color='var(--text-dim)'; }
  const { error } = await sb.rpc('set_member_role', { p_target:id, p_role:role });
  if(error){ if(note){ note.textContent='실패: '+error.message; note.style.color='var(--link-red)'; } return; }
  const seg=$('#doc').querySelector('.seg[data-id="'+id+'"]');
  if(seg) seg.querySelectorAll('.seg-opt').forEach(b=>b.classList.toggle('on', b.dataset.role===role));
  if(note){ note.textContent='등급 변경됨'; note.style.color='#1b7a2f'; setTimeout(()=>{note.textContent='';},2000); }
}

async function dbCheck(label, fn){
  try{ const { error } = await fn(); return healthRow(label, !error, error?error.message:'OK'); }
  catch(e){ return healthRow(label, false, String(e)); }
}
async function fnDebug(name){
  try{
    const r = await fetch(`${SUPABASE_URL}/functions/v1/${name}?debug=1`,
      { headers:{ apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY } });
    return await r.json();
  }catch(e){ return { ok:false, error:String(e) }; }
}
function fnLine(label, res, keys){
  if(!res || !res.diag) return healthRow(label, false, (res&&res.error)?res.error:'함수 응답 없음 (배포/이름/Verify JWT 확인)');
  const parts = keys.map(k=>`${k}: ${res.diag[k]||'-'}`);
  const ok = keys.every(k=>{ const v=res.diag[k]||''; return v.indexOf('❌')<0 && v.indexOf('없음')<0 && v.indexOf('실패')<0 && v.indexOf('예외')<0; });
  return healthRow(label, ok, parts.join(' · '));
}
function healthRow(label, ok, detail){
  return `<div class="rev"><div class="meta"><b>${ok?'✅':'❌'} ${escapeHtml(label)}</b><br><span style="font-size:11.5px">${escapeHtml(detail)}</span></div></div>`;
}

/* 프로필 사진 업로드/제거 (10KB 미만, Supabase Storage: avatars 버킷) */
const AVA_MAX = 10*1024;
async function onAvatarFile(e){
  const msg=$('#meAvaMsg'); const file=e.target.files&&e.target.files[0]; e.target.value='';
  if(!file) return;
  if(!/^image\//.test(file.type||'')){ msg.className='me-avatar-msg err'; msg.textContent='이미지 파일만 올릴 수 있어요.'; return; }
  if(file.size > AVA_MAX){ msg.className='me-avatar-msg err'; msg.textContent='사진의 용량은 10kb보다 작아야 합니다.'; return; }
  msg.className='me-avatar-msg'; msg.textContent='업로드 중…';
  try{
    const path=state.user.id+'/avatar';
    const up=await sb.storage.from('avatars').upload(path, file, { upsert:true, contentType:file.type, cacheControl:'0' });
    if(up.error) throw up.error;
    const pub=sb.storage.from('avatars').getPublicUrl(path);
    const base=(pub&&pub.data&&pub.data.publicUrl)?pub.data.publicUrl:'';
    const url=base+'?v='+Date.now();
    const { error } = await sb.rpc('set_my_avatar', { p_url:url });
    if(error) throw error;
    avatarCache[state.user.id]=url; applyAvatar(state.user.id);
    const el=$('#meAvatar'); if(el){ el.textContent=''; el.style.background=''; el.style.backgroundImage="url('"+url+"')"; }
    msg.className='me-avatar-msg ok'; msg.textContent='프로필 사진이 변경됐어요.';
  }catch(err){ msg.className='me-avatar-msg err'; msg.textContent='업로드 실패: 스토리지(avatars 버킷·정책)를 확인해 주세요.'; }
}
async function removeAvatar(){
  const msg=$('#meAvaMsg'); msg.className='me-avatar-msg'; msg.textContent='제거 중…';
  try{
    try{ await sb.storage.from('avatars').remove([state.user.id+'/avatar']); }catch(_){}
    const { error } = await sb.rpc('set_my_avatar', { p_url:null });
    if(error) throw error;
    avatarCache[state.user.id]=null;
    let nm=null, hd=null;
    try{ const { data } = await sb.from('profiles').select('name,handle').eq('id',state.user.id).single(); nm=data&&data.name; hd=data&&data.handle; }catch(_){}
    const av=avatarFor(nm, hd);

    msg.className='me-avatar-msg ok'; msg.textContent='기본 사진으로 되돌렸어요.';
  }catch(err){ msg.className='me-avatar-msg err'; msg.textContent='제거 실패: 잠시 후 다시 시도해 주세요.'; }
}

const dir={ data:[], clubNames:[], q:'', sort:'no_asc', selClubs:new Set() };
async function renderDirectory(){

  // 동아리 목록: 테이블 + 목록외(프로필에만 있는 값), 무소속 맨 뒤
  const tableNames=clubs.filter(c=>!c.is_none).map(c=>c.name);
  const orphan=[...new Set(dir.data.map(m=>m.club||'무소속'))].filter(n=>n!=='무소속' && !tableNames.includes(n));
  dir.clubNames=[...tableNames.sort((a,b)=>a.localeCompare(b,'ko')), ...orphan.sort((a,b)=>a.localeCompare(b,'ko')), '무소속'];

      </div>
    </div>

      <span class="dir-flabel">동아리</span>

        ${dir.clubNames.map(n=>`<label class="dir-check"><input type="checkbox" value="${escapeAttr(n)}">${escapeHtml(n)}</label>`).join('')}

  // 바인딩

function dirMatch(m, q){
  q=(q||'').trim(); if(!q) return true;
  const strip=s=>String(s||'').toLowerCase().replace(/\s+/g,'');
  const nq = (typeof _norm==='function') ? _norm(q) : strip(q);
  const name = (typeof _norm==='function') ? _norm(m.name||'') : strip(m.name);
  const handle = (typeof _norm==='function') ? _norm(m.handle||'') : strip(m.handle);
  const no = String(m.member_no||'');
  return (nq && (name.includes(nq) || handle.includes(nq))) || no.includes(strip(q)) || ('#'+no).includes(strip(q));
}
function renderDirGrid(){
  const grid=$('#dirGrid'); if(!grid) return;
  let arr=dir.data.filter(m=>dirMatch(m, dir.q));
  if(dir.selClubs.size) arr=arr.filter(m=>dir.selClubs.has(m.club||'무소속'));
  const byNo=(x,y)=>(x.member_no||1e9)-(y.member_no||1e9);
  const byName=(x,y)=>String(x.name||'').localeCompare(String(y.name||''),'ko');
  if(dir.sort==='no_asc') arr.sort(byNo);
  else if(dir.sort==='no_desc') arr.sort((x,y)=>byNo(y,x));
  else if(dir.sort==='name_asc') arr.sort(byName);
  else if(dir.sort==='name_desc') arr.sort((x,y)=>byName(y,x));
  const cnt=$('#dirCount'); if(cnt) cnt.textContent='전체 '+dir.data.length+'명'+(arr.length!==dir.data.length?(' · 표시 '+arr.length+'명'):'');

  grid.innerHTML=arr.map(m=>{

const CHAT_SCALE=[0.8,0.9,1,1.1,1.2];
function applyChatSize(){
  const i=Math.max(0,Math.min(CHAT_SCALE.length-1, community.chatSize|0));
  document.documentElement.style.setProperty('--chat-scale', String(CHAT_SCALE[i]));
  const d=$('#cszDown'), u=$('#cszUp');
  if(d) d.disabled=(i<=0); if(u) u.disabled=(i>=CHAT_SCALE.length-1);
}
function changeChatSize(delta){
  community.chatSize=Math.max(0,Math.min(CHAT_SCALE.length-1,(community.chatSize|0)+delta));
  try{ localStorage.setItem('andachat_size', String(community.chatSize)); }catch(e){}
  applyChatSize();
}
function initChatSize(){
  try{ const v=localStorage.getItem('andachat_size'); if(v!==null){ const n=parseInt(v,10); if(!isNaN(n)) community.chatSize=n; } }catch(e){}
  const d=$('#cszDown'), u=$('#cszUp');
  if(d) d.onclick=()=>changeChatSize(-1);
  if(u) u.onclick=()=>changeChatSize(1);
  applyChatSize();
}

/* ---- 메세지 삭제 권한: admin·owner만, 그리고 내 서열 > 작성자 서열 ----
   (admin→viewer·editor / owner→viewer·editor·admin. owner 메세지·본인 메세지는 삭제 불가) */
const roleCache={};   // user_id -> role
async function prefetchRoles(ids){
  if(!isAdmin()) return;   // 삭제 가능자(admin+)만 작성자 등급이 필요
  const need=[...new Set((ids||[]).filter(Boolean))].filter(u=>!(u in roleCache));
  if(!need.length) return;
  try{ const { data } = await sb.from('profiles').select('id,role').in('id', need); (data||[]).forEach(p=>{ roleCache[p.id]=p.role||'viewer'; }); }catch(e){}
  need.forEach(u=>{ if(!(u in roleCache)) roleCache[u]='viewer'; });
}
async function ensureRole(uid){
  if(!isAdmin() || !uid || (uid in roleCache)) return;
  roleCache[uid]='viewer';   // 재요청 방지(임시) → 실제값으로 덮어씀
  try{ const { data } = await sb.from('profiles').select('role').eq('id',uid).single(); roleCache[uid]=(data&&data.role)||'viewer'; }catch(e){}
  refreshMsgDelete(uid);
}
function canDeleteMsg(m){
  if(!isAdmin() || !m || !m.user_id) return false;
  const r=roleCache[m.user_id]; if(r===undefined) return false;
  return myRank() > roleRank(r);
}
/* 작성자 등급이 뒤늦게 확인됐을 때, 해당 사용자의 메세지들에 삭제버튼을 추가/제거 */
function refreshMsgDelete(uid){
  const allow = isAdmin() && roleRank(roleCache[uid]) < myRank();
  document.querySelectorAll('.msg[data-uid="'+uid+'"]').forEach(el=>{
    const row=el.querySelector('.msg-bubble-row'); if(!row) return;
    const has=row.querySelector('.msg-del');
    if(allow && !has){
      const b=document.createElement('button'); b.className='msg-del'; b.title='메세지 삭제'; b.textContent='🗑';
      b.onclick=()=>deleteMessage({ id:el.getAttribute('data-mid'), user_id:uid });
      row.appendChild(b);
    } else if(!allow && has){ has.remove(); }
  });
}

function avatarFor(name, handle){
  const s=String(handle||name||'익명');
  const ch=[...s][0]||'?';

  return { ch, bg:`hsl(${h%360} 52% 55%)` };
}

async function loadMessages(){

function appendMessage(m, doScroll=true){
  const log=$('#chatLog'); if(!log) return;
  const empty=log.querySelector('.chat-empty'); if(empty) empty.remove();
  if(log.querySelector('.msg[data-mid="'+m.id+'"]')) return;   // 중복 방지
  const mine=(state.user && m.user_id===state.user.id);
  const canDel = canDeleteMsg(m);   // admin·owner만 + 내 서열 > 작성자 서열
  const who=escapeHtml(m.author_name || m.author_handle || '익명');
  const el=document.createElement('div');
  el.className='msg'+(mine?' mine':''); el.setAttribute('data-mid', m.id); el.setAttribute('data-uid', m.user_id||'');
  el.innerHTML=`
    ${msgAvatarHTML(m)}
    <div class="msg-main">
      <div class="msg-who">${who}</div>
      <div class="msg-bubble-row">
        <div class="msg-bubble">${escapeHtml(m.body)}</div>
        <span class="msg-time">${fmtKST(m.created_at)}</span>
        ${canDel?'<button class="msg-del" title="메세지 삭제">🗑</button>':''}
      </div>
      <div class="msg-reactions" data-mid="${m.id}"></div>
    </div>`;
  log.appendChild(el);
  if(canDel){ const db=el.querySelector('.msg-del'); if(db) db.onclick=()=>deleteMessage(m); }
  else if(isAdmin() && m.user_id && !(m.user_id in roleCache)) ensureRole(m.user_id);   // 실시간 신규 메세지: 작성자 등급 확인 후 버튼 반영
  if(m.user_id && !(m.user_id in avatarCache)) ensureAvatar(m.user_id);
  renderMath(el.querySelector('.msg-bubble'));
  renderReactions(m.id);
  if(doScroll) scrollChatBottom();
}

/* LaTeX 수식 렌더 (KaTeX 로드된 경우에만; $..$ 인라인, $$..$$ 디스플레이) */
function renderMath(node){
  if(!node || !window.renderMathInElement) return;
  try{ window.renderMathInElement(node,{ delimiters:[
    {left:'$$',right:'$$',display:true},
    {left:'$',right:'$',display:false},
    {left:'\\(',right:'\\)',display:false},
    {left:'\\[',right:'\\]',display:true}
  ], throwOnError:false }); }catch(e){}
}
function scrollChatBottom(){ const log=$('#chatLog'); if(log) log.scrollTop=log.scrollHeight; }

/* 미리보기: 눈동자 아이콘을 누르면 입력창 바로 위에 LaTeX 적용된 모습 표시 */

  p.style.display=community.previewOn?'block':'none';

function updatePreview(){

  if(!txt.trim()){ p.innerHTML='<div class="preview-label">미리보기</div><div class="preview-empty">메시지를 입력하면 이렇게 표시됩니다 (수식 포함).</div>'; return; }
  p.innerHTML='<div class="preview-label">미리보기</div><div class="preview-msg"><div class="msg-bubble"></div></div>';

  renderMath(bub);
}

async function sendMessage(){
  const inp=$('#chatText'); if(!inp || !state.user) return;
  const body=inp.value.trim(); if(!body) return;
  inp.value='';
  try{
    const { error } = await sb.from('messages').insert({ user_id:state.user.id, author_name:state.name||null, author_handle:state.handle||null, body });
    if(error) throw error;   // 실시간 구독으로 곧 화면에 반영됨(본인 메시지 포함)
  }catch(e){ inp.value=body; alert('전송 실패: 로그인 상태와 DB 설정(09_community_chat.sql)을 확인하세요.'); }
}

/* 메세지 삭제: admin·owner만, 그리고 내 서열 > 작성자 서열. 권한은 RPC(delete_message)가 서버에서 최종 검증 */
async function deleteMessage(m){
  const ok=await confirmModal('메세지를 삭제하시겠습니까?','삭제된 메세지는 되돌릴 수 없습니다.');
  if(!ok) return;
  try{
    const { error } = await sb.rpc('delete_message', { p_id: m.id });
    if(error) throw error;
    const el=document.querySelector('.msg[data-mid="'+m.id+'"]'); if(el) el.remove();
  }catch(e){ alert('삭제 실패: 자신보다 낮은 등급의 메세지만 삭제할 수 있어요. (admin→viewer·editor, owner→admin까지) — 18_message_delete_rank.sql 실행 여부도 확인'); }
}

/* 반응(회원당 최대 1개: 하트/체크/엄지/웃음) */
async function loadReactions(ids){
  reactState={};
  if(!ids || !ids.length) return;
  try{
    const { data } = await sb.from('message_reactions').select('message_id,user_id,emoji').in('message_id', ids);
    (data||[]).forEach(r=>{
      const s=reactState[r.message_id] || (reactState[r.message_id]={counts:{},mine:null});
      s.counts[r.emoji]=(s.counts[r.emoji]||0)+1;
      if(state.user && r.user_id===state.user.id) s.mine=r.emoji;
    });
  }catch(e){}
}
function renderReactions(mid){
  const box=document.querySelector('.msg-reactions[data-mid="'+mid+'"]'); if(!box) return;
  const s=reactState[mid] || {counts:{},mine:null};
  const pills=EMOJIS.filter(e=>s.counts[e.code]>0).map(e=>
    `<button class="rpill${s.mine===e.code?' mine':''}" data-mid="${mid}" data-emoji="${e.code}">${e.glyph} ${s.counts[e.code]}</button>`).join('');
  const pop=EMOJIS.map(e=>`<button class="react-opt${s.mine===e.code?' on':''}" data-mid="${mid}" data-emoji="${e.code}">${e.glyph}</button>`).join('');
  box.innerHTML = pills + `<span class="react-wrap"><button class="react-btn" data-mid="${mid}" title="반응 남기기">＋</button><span class="react-pop">${pop}</span></span>`;
  box.querySelectorAll('.rpill,.react-opt').forEach(b=>b.onclick=(ev)=>{ ev.stopPropagation(); toggleReaction(b.dataset.mid, b.dataset.emoji); });
  const rb=box.querySelector('.react-btn');
  if(rb) rb.onclick=(ev)=>{ ev.stopPropagation(); const pop=box.querySelector('.react-pop'); const willOpen=!pop.classList.contains('open'); closeAllReactPops(); if(willOpen) pop.classList.add('open'); };
}
function closeAllReactPops(){ document.querySelectorAll('.react-pop.open').forEach(p=>p.classList.remove('open')); }
document.addEventListener('click',closeAllReactPops);

async function toggleReaction(mid, emoji){
  if(!state.user) return;
  mid=parseInt(mid,10);
  const s=reactState[mid] || {counts:{},mine:null};
  try{
    if(s.mine===emoji){
      const { error } = await sb.from('message_reactions').delete().eq('message_id',mid).eq('user_id',state.user.id);
      if(error) throw error;
    } else {
      const { error } = await sb.from('message_reactions').upsert({ message_id:mid, user_id:state.user.id, emoji }, { onConflict:'message_id,user_id' });
      if(error) throw error;
    }
    await refreshReactionsFor(mid);
  }catch(e){ alert('반응 처리 실패: DB 설정(10_message_reactions.sql) 실행 여부를 확인하세요.'); }
}
async function refreshReactionsFor(mid){
  mid=parseInt(mid,10);
  try{
    const { data } = await sb.from('message_reactions').select('user_id,emoji').eq('message_id',mid);
    const s={counts:{},mine:null};
    (data||[]).forEach(r=>{ s.counts[r.emoji]=(s.counts[r.emoji]||0)+1; if(state.user&&r.user_id===state.user.id) s.mine=r.emoji; });
    reactState[mid]=s;
  }catch(e){}
  renderReactions(mid);
}

function subscribeChat(){
  unsubscribeChat();
  chatChannel = sb.channel('community-realtime')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, payload=>appendMessage(payload.new, true))
    .on('postgres_changes', { event:'DELETE', schema:'public', table:'messages' }, payload=>{
      const id=payload.old&&payload.old.id;
      if(id!=null){ const el=document.querySelector('.msg[data-mid="'+id+'"]'); if(el) el.remove(); }
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'message_reactions' }, payload=>{
      const mid=(payload.new&&payload.new.message_id) || (payload.old&&payload.old.message_id);
      if(mid && document.querySelector('.msg-reactions[data-mid="'+mid+'"]')) refreshReactionsFor(mid);
    })
    .subscribe();
}

/* ---- 채팅 관리(관리자 전용): 통계 + 1년 지난 메시지 삭제 ---- */
async function renderChatAdmin(){
  const bar=$('#chatAdmin'); if(!bar) return;
  if(!isAdmin()){ bar.style.display='none'; bar.innerHTML=''; return; }
  bar.style.display='';
  let count=0, oldest=null;
  try{
    const { count:c } = await sb.from('messages').select('*',{count:'exact',head:true});
    count=c||0;
    const { data } = await sb.from('messages').select('created_at').order('created_at',{ascending:true}).limit(1).maybeSingle();
    oldest = data ? data.created_at : null;
  }catch(e){}
  bar.innerHTML=`
    <div class="chat-admin-row">
      <div class="chat-admin-text">현재 총 메세지 수는 <b>${count}</b>개입니다. 가장 오래된 메세지는 <b>${oldest?fmtKST(oldest):'-'}</b>에 작성되었습니다.</div>
      <button class="chat-trash" id="chatTrash" title="1년 지난 메시지 정리">🗑️</button>
    </div>`;
  $('#chatTrash').onclick=onTrashClick;
}
function onTrashClick(){
  const bar=$('#chatAdmin');
  const old=bar.querySelector('.chat-del-prompt'); if(old){ old.remove(); return; }   // 토글
  const p=document.createElement('div'); p.className='chat-del-prompt';
  p.innerHTML=`<span>1년 전 메세지를 삭제하시겠습니까?</span><button class="cdp-yes">삭제</button><button class="cdp-no">취소</button>`;
  bar.appendChild(p);
  p.querySelector('.cdp-no').onclick=()=>p.remove();
  p.querySelector('.cdp-yes').onclick=async()=>{
    p.remove();
    const ok=await confirmModal('정말로 삭제하시겠습니까?', '1년이 지난 메세지가 영구 삭제되며 되돌릴 수 없습니다.');
    if(ok) await deleteOldMessages();
  };
}
async function deleteOldMessages(){
  const cutoff=new Date(); cutoff.setFullYear(cutoff.getFullYear()-1);
  showBlockingLoader('오래된 메세지를 삭제하는 중…');
  try{
    const { error } = await sb.from('messages').delete().lt('created_at', cutoff.toISOString());
    if(error) throw error;
    await loadMessages();
    await renderChatAdmin();
  }catch(e){ alert('삭제 실패: admin 권한과 DB 설정을 확인하세요.'); }
  finally{ hideBlockingLoader(); }
}

/* 확인 팝업(Promise) */
function confirmModal(title, sub, okLabel){
  return new Promise(resolve=>{
    const ov=document.createElement('div'); ov.className='modal-ov';
    ov.innerHTML=`<div class="modal-box"><div class="modal-msg">${escapeHtml(title)}</div>${sub?`<div class="modal-sub">${escapeHtml(sub)}</div>`:''}<div class="modal-btns"><button class="modal-cancel">취소</button><button class="modal-ok">${escapeHtml(okLabel||'삭제')}</button></div></div>`;
    document.body.appendChild(ov);
    const done=v=>{ ov.remove(); resolve(v); };
    ov.querySelector('.modal-cancel').onclick=()=>done(false);
    ov.querySelector('.modal-ok').onclick=()=>done(true);
    ov.addEventListener('click',e=>{ if(e.target===ov) done(false); });
  });
}
/* 화면 전체 차단 로딩 */
function showBlockingLoader(text){
  hideBlockingLoader();
  const ov=document.createElement('div'); ov.className='block-ov'; ov.id='blockOv';
  ov.innerHTML=`<div class="block-box"><div class="block-spin"></div><div class="block-text">${escapeHtml(text||'처리 중…')}</div></div>`;
  document.body.appendChild(ov);
}
function hideBlockingLoader(){ const o=$('#blockOv'); if(o) o.remove(); }
