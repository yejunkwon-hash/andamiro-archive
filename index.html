<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안다 아카이브</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit" async defer></script>
<style>
/* ===== 기본 토큰 (wiki.html과 동일) ===== */
:root{
  --accent:#C00000; --accent-soft:#d64a42; --bg:#eef1f5; --card:#ffffff;
  --text:#202124; --text-dim:#5f6368; --border:#e3e6ea; --border-strong:#c9ced6;
  --link:#1e6be0; --link-red:#cc2b2b; --box-bg:#f6f8fa; --infobox-head:#C00000;
  --table-head:#eef1f7; --shadow:0 1px 3px rgba(0,0,0,.08);
}
body.dark{
  --accent:#e05a52; --accent-soft:#ea7d76; --bg:#17181c; --card:#232429;
  --text:#e4e6eb; --text-dim:#9aa0ab; --border:#33353c; --border-strong:#44464e;
  --link:#6ba4ff; --link-red:#ff6b6b; --box-bg:#2a2c33; --infobox-head:#a83232;
  --table-head:#2a2c33; --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,
  'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;}
a{color:var(--link);text-decoration:none;} a:hover{text-decoration:underline;} a.new{color:var(--link-red);}

.topbar{position:sticky;top:0;z-index:50;background:var(--accent);color:#fff;display:flex;align-items:center;gap:14px;padding:0 18px;height:48px;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.topbar .brandwrap{display:flex;align-items:center;gap:10px;flex:none;}
.topbar .refresh{display:inline-flex;align-items:center;justify-content:center;color:#fff;opacity:.9;cursor:pointer;transition:opacity .15s;}
.topbar .refresh:hover{opacity:1;}
.topbar .refresh svg{display:block;}
.topbar .refresh.spinning{animation:andaspin .7s linear infinite;}
@keyframes andaspin{to{transform:rotate(360deg);}}
.topbar .logo{font-weight:800;font-size:17px;letter-spacing:-.5px;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer;}
.topbar .logo .mark{display:inline-flex;align-items:center;justify-content:center;background:#fff;border-radius:0;padding:4px 6px;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.topbar .logo .mark img{height:22px;width:auto;object-fit:contain;display:block;}
.topbar .search{flex:1;max-width:420px;position:relative;}
.topbar .search input{width:100%;height:32px;border:none;border-radius:5px;padding:0 12px;font-size:13.5px;background:rgba(255,255,255,.95);color:#111;}
.topbar .search input:focus{outline:2px solid rgba(255,255,255,.6);}
.topbar .spacer{flex:1;}
.topbar button.mode,.topbar button.logout,.topbar button.navbtn{background:rgba(255,255,255,.14);color:#fff;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:5px;}
.topbar button.mode:hover,.topbar button.logout:hover,.topbar button.navbtn:hover{background:rgba(255,255,255,.26);}
.topbar .userbox{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#fff;}
.role-badge{background:rgba(255,255,255,.22);padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;background:var(--card);vertical-align:middle;}
.seg-opt{border:none;background:transparent;color:var(--text-dim);font-size:12px;font-weight:700;padding:5px 12px;cursor:pointer;border-right:1px solid var(--border);font-family:inherit;transition:background .12s,color .12s;}
.seg-opt:last-child{border-right:none;}
.seg-opt.on{background:var(--accent);color:#fff;}
.seg-opt:not(.on):not(:disabled):hover{background:var(--box-bg);color:var(--text);}
.seg-locked .seg-opt{cursor:not-allowed;opacity:.8;}
.seg-me{font-size:11px;color:var(--text-dim);margin-left:6px;vertical-align:middle;}
.club-sel{max-width:140px;padding:4px 6px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);font-size:12.5px;font-family:inherit;cursor:pointer;}
.club-sel:hover{border-color:var(--accent);}
.club-sel:disabled{opacity:.6;cursor:default;}
.club-sel.ok{border-color:#1b7a2f;box-shadow:0 0 0 2px rgba(27,122,47,.18);}
.seg-opt.seg-owner{color:var(--accent);}
.seg-opt.seg-owner.on{background:var(--accent);color:#fff;}
.seg-opt.seg-owner:not(.on):not(:disabled):hover{background:#fdeaea;color:var(--accent);}
body.dark .seg-opt.seg-owner:not(.on):not(:disabled):hover{background:#3a2626;}
.mlink{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:700;}
.mlink:hover{text-decoration:underline;}
.profile-wrap{display:flex;gap:22px;align-items:flex-start;flex-wrap:wrap;}
.profile-main{flex:1;min-width:300px;}
.profile-side{width:290px;flex:none;}
.profile-top{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.profile-ava{width:96px;height:96px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:44px;font-weight:800;flex:none;user-select:none;}
.profile-headline{min-width:0;}
.profile-name{font-size:22px;font-weight:800;color:var(--text);}
.profile-handle{font-size:14px;font-weight:500;color:var(--text-dim);}
.profile-sub{font-size:13px;color:var(--text-dim);margin-top:5px;display:flex;align-items:center;gap:6px;}
.role-chip{background:var(--accent);color:#fff;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:700;}
.profile-table{max-width:520px;}
.profile-side .side-head{font-weight:800;color:var(--accent);margin-bottom:8px;}
.hh-first{background:var(--box-bg);color:var(--accent);border:1px solid var(--border);border-radius:8px;font-size:10px;padding:0 6px;margin-left:4px;}
.muted{color:var(--text-dim);}
@media(max-width:720px){ .profile-side{width:100%;} }
.profile-ava{background-size:cover;background-position:center;}
.me-wrap{display:flex;gap:22px;align-items:flex-start;flex-wrap:wrap;}
.me-table{flex:1;min-width:280px;}
.me-avatar-box{width:190px;flex:none;display:flex;flex-direction:column;gap:10px;align-items:stretch;}
.me-avatar{width:190px;height:190px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:80px;font-weight:800;background-size:cover;background-position:center;user-select:none;}
.me-avatar-btns{display:flex;flex-direction:column;gap:6px;}
.me-avatar-btns .btn{padding:7px 10px;font-size:13px;}
.me-avatar-msg{font-size:12px;min-height:16px;line-height:1.4;}
.me-avatar-msg.err{color:var(--link-red);}
.me-avatar-msg.ok{color:#1b7a2f;}
@media(max-width:720px){ .me-avatar-box{width:100%;align-items:center;} }
.club-sec{margin-top:28px;}
.club-sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;}
.club-sec-head h2{font-size:17px;margin:0;color:var(--text);}
.club-list{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.club-item{border-bottom:1px solid var(--border);}
.club-item:last-child{border-bottom:none;}
.club-row{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;background:var(--card);}
.club-row:hover{background:var(--box-bg);}
.club-caret{color:var(--text-dim);font-size:12px;width:12px;flex:none;}
.club-name{font-weight:700;color:var(--text);}
.club-count{color:var(--text-dim);font-size:12px;margin-left:auto;flex:none;}
.club-tag{font-size:10px;color:var(--text-dim);border:1px solid var(--border);border-radius:8px;padding:0 6px;}
.club-members{padding:6px 12px 12px 30px;background:var(--box-bg);display:flex;flex-direction:column;gap:2px;}
.club-mem{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:8px;text-decoration:none;color:var(--text);}
.club-mem:hover{background:var(--card);}
.club-mem-ava{width:26px;height:26px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;background-size:cover;background-position:center;}
.club-mem-t{font-size:13px;}
.club-empty{color:var(--text-dim);font-size:12.5px;padding:4px 6px;}
.ce-box{max-width:420px;}
.ce-add{display:flex;gap:8px;margin:14px 0 6px;}
.ce-add input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);}
.ce-msg{font-size:12px;min-height:15px;}
.ce-msg.err{color:var(--link-red);}
.ce-msg.ok{color:#1b7a2f;}
.ce-list{max-height:300px;overflow:auto;border:1px solid var(--border);border-radius:8px;margin-top:6px;}
.ce-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);}
.ce-row:last-child{border-bottom:none;}
.ce-name{font-weight:600;color:var(--text);}
.ce-btns{margin-left:auto;display:flex;gap:6px;}
.ce-btns button,.ce-add button{border:none;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;}
.ce-rename,.ce-cancel{background:var(--box-bg);color:var(--text);border:1px solid var(--border);}
.ce-del,.ce-save,.ce-add button{background:var(--accent);color:#fff;}
.ce-lock{margin-left:auto;font-size:11px;color:var(--text-dim);}
.ce-edit{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);}
.dir-top{display:flex;align-items:center;gap:8px;}
.dir-searchwrap{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:9px;padding:7px 11px;background:var(--card);color:var(--text-dim);min-width:210px;}
.dir-searchwrap input{border:none;outline:none;background:transparent;color:var(--text);font-size:14px;width:100%;}
.dir-filter{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:10px 0 4px;background:var(--card);display:flex;flex-direction:column;gap:12px;}
.dir-fgroup{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.dir-flabel{font-weight:800;font-size:13px;color:var(--text);min-width:48px;padding-top:5px;}
.dir-sort{display:flex;gap:6px;flex-wrap:wrap;}
.dir-chip{border:1px solid var(--border);background:var(--card);color:var(--text-dim);border-radius:20px;padding:5px 13px;font-size:12.5px;font-weight:700;cursor:pointer;}
.dir-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.dir-clubs{display:flex;gap:6px 14px;flex-wrap:wrap;}
.dir-check{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text);cursor:pointer;}
.dir-check input{accent-color:var(--accent);}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:12px;}
.dir-card{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card);text-decoration:none;color:var(--text);transition:box-shadow .15s,transform .15s,border-color .15s;}
.dir-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.10);transform:translateY(-2px);border-color:var(--accent);}
.dir-ava{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;font-weight:800;background-size:cover;background-position:center;user-select:none;}
.dir-info{padding:9px 11px 11px;}
.dir-name{font-weight:800;font-size:14.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dir-handle{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.dir-metarow{display:flex;align-items:center;gap:6px;margin-top:7px;}
.dir-no{font-size:11px;font-weight:800;color:var(--accent);}
.dir-club{font-size:10.5px;color:var(--text-dim);border:1px solid var(--border);border-radius:8px;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@media(max-width:560px){ .dir-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;} .dir-searchwrap{min-width:150px;} }
.usermenu{position:relative;display:flex;align-items:center;gap:9px;}
#userlabel{color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.um-trigger{position:relative;}
.usericon{position:relative;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;overflow:hidden;transition:border-radius .12s;}
.usericon:hover{background:rgba(255,255,255,.30);}
.usericon.has-photo{border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,.9);}
.ui-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.online-dot{color:#2e9e5b;font-size:11px;font-weight:800;margin-left:6px;white-space:nowrap;}
.ava-cell{width:34px;height:34px;border-radius:50%;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex:none;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;}
.table-hint{display:none;font-size:11.5px;color:var(--text-dim);margin:0 0 5px;}
.admin-table th,.admin-table td{white-space:nowrap;}
.usermenu-drop{position:absolute;right:0;top:100%;padding-top:8px;min-width:190px;display:none;z-index:60;}
.um-trigger:hover .usermenu-drop,.um-trigger.open .usermenu-drop{display:block;}
.um-trigger.closing .usermenu-drop{display:none;}
.usermenu-drop a{display:block;padding:11px 15px;color:var(--text);font-size:13.5px;cursor:pointer;background:var(--card);border-left:1px solid var(--border);border-right:1px solid var(--border);}
.usermenu-drop a:first-child{border-top:1px solid var(--border);border-radius:8px 8px 0 0;}
.usermenu-drop a:last-child{border-bottom:1px solid var(--border);border-radius:0 0 8px 8px;box-shadow:0 6px 18px rgba(0,0,0,.14);}
.usermenu-drop a+a{border-top:1px solid var(--border);}
.usermenu-drop a:hover{background:var(--box-bg);text-decoration:none;}
.usermenu-drop a.danger{color:var(--link-red);}
@media(max-width:860px){ #userlabel{display:none;} }

/* 페이지 전환 애니메이션 */
@keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#doc.pageIn{animation:pageIn .22s ease;}

/* 대문(랜딩) */
.landing .hero-notice{text-align:center;border:1px solid var(--border);border-radius:10px;background:var(--box-bg);padding:22px 18px;margin-bottom:22px;}
.hn-title{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-.5px;margin-bottom:12px;}
.hn-lines p{margin:5px 0;color:var(--text);font-size:14px;line-height:1.7;}
.hn-lines b{color:var(--accent);}
.landing-grid{display:flex;gap:20px;align-items:flex-start;}
.cats{flex:1;min-width:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.landing-reco{min-height:calc(100vh - 300px);display:flex;flex-direction:column;}
.landing-reco .cat:last-child{flex:1;}
/* 커뮤니티 */
.community{display:flex;gap:16px;align-items:flex-start;}

/* ===== 질문 게시판 (4단계) ===== */
.q-panel{width:240px;flex:none;display:flex;flex-direction:column;gap:8px;position:sticky;top:64px;max-height:calc(100vh - 180px);}
.q-panel-head{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.q-panel-head b{font-size:14px;color:var(--text);}
.q-ask{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 11px;font-size:12px;font-weight:800;cursor:pointer;}
.q-ask:hover{background:var(--accent-soft);}
.q-list{overflow-y:auto;display:flex;flex-direction:column;gap:7px;padding-right:2px;}
.q-box{display:block;border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0;background:var(--card);padding:9px 10px;cursor:pointer;text-decoration:none;}
.q-box:hover{background:var(--box-bg);border-left-color:var(--accent-soft);}
.q-box.on{background:var(--box-bg);border-left-width:5px;}
.q-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.q-meta{font-size:11px;color:var(--text-dim);margin-top:4px;display:flex;gap:6px;}
.q-empty{font-size:12.5px;color:var(--text-dim);padding:12px;border:1px dashed var(--border);border-radius:8px;text-align:center;}
.qh{border:1px solid var(--border);border-bottom:none;background:var(--box-bg);padding:13px 14px;}
.qh-top{display:flex;align-items:center;gap:9px;}
.qh-ava{width:32px;height:32px;border-radius:50%;flex:none;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;}
.qh-who{font-size:12.5px;color:var(--text-dim);}
.qh-title{font-size:16px;font-weight:800;color:var(--text);margin:9px 0 0;line-height:1.45;}
.qh-body{font-size:14px;color:var(--text);margin-top:7px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.qh-imgs{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.qh-imgs img{width:104px;height:104px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:zoom-in;background:var(--card);}
.qh-del{margin-left:auto;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;}
.qh-del:hover{color:var(--link-red);}
.qc-thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.qc-thumb{position:relative;}
.qc-thumb img{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border);}
.qc-x{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;border:none;background:var(--link-red);color:#fff;font-size:11px;line-height:1;cursor:pointer;}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1200;cursor:zoom-out;}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:6px;}
@media(max-width:1100px){
  .community{flex-wrap:wrap;}
  .q-panel{width:100%;position:static;max-height:none;order:-1;}
  .q-list{max-height:210px;}
}
.chat{flex:1;min-width:0;display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:420px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);}
.chat-head{background:var(--accent);color:#fff;font-weight:800;font-size:14px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.chat-size{display:inline-flex;gap:5px;}
.csz-btn{width:22px;height:22px;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.16);color:#fff;border-radius:5px;cursor:pointer;font-weight:800;font-size:14px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0;}
.csz-btn:hover{background:rgba(255,255,255,.32);}
.csz-btn:disabled{opacity:.35;cursor:default;}
.typing-bar{min-height:17px;padding:0 14px 2px;font-size:12px;color:var(--text-dim);font-style:italic;}
.typing-bar .tdot{display:inline-block;animation:tblink 1.2s infinite;}
@keyframes tblink{0%,60%,100%{opacity:.35}30%{opacity:1}}
.msg-imgs{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.msg-imgs img{max-height:240px;max-width:210px;height:auto;width:auto;border-radius:8px;border:1px solid var(--border);cursor:zoom-in;object-fit:cover;background:var(--box-bg);}
.img-expired{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:150px;height:96px;border-radius:8px;border:1px dashed var(--border-strong);background:var(--box-bg);color:var(--text-dim);font-size:11.5px;text-align:center;line-height:1.4;}
.img-expired b{font-size:12px;color:var(--text-dim);}
.cimg-tray{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 6px;}
.cimg-thumb{position:relative;}
.cimg-thumb img{width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid var(--border);}
.cimg-x{position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;border:none;background:var(--link-red);color:#fff;font-size:10px;line-height:1;cursor:pointer;}
.cimg-btn{background:none;border:none;font-size:19px;cursor:pointer;padding:0 6px;opacity:.6;}
.cimg-btn:hover{opacity:1;}
.chat-log{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;zoom:var(--chat-scale,1);}
.chat-empty{color:var(--text-dim);font-size:13px;text-align:center;margin:auto;}
.chat-log .msg{display:flex;gap:9px;align-items:flex-start;max-width:100%;}
.msg-avatar{flex:none;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;overflow:hidden;background-size:cover;background-position:center;}
.msg-main{min-width:0;flex:1;display:flex;flex-direction:column;gap:3px;}
.msg-who{font-weight:700;font-size:12.5px;color:var(--text);}
.msg-who.go-profile{cursor:pointer;}
.msg-who.go-profile:hover{color:var(--accent);text-decoration:underline;}
.msg-avatar.go-profile{cursor:pointer;}
.msg-avatar.go-profile:hover{filter:brightness(1.05);box-shadow:0 0 0 2px var(--accent);}
.msg-bubble-row{display:flex;align-items:flex-end;gap:6px;}
.msg-bubble{background:var(--card);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:8px 12px;font-size:14px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word;max-width:min(72%,420px);box-shadow:0 1px 2px rgba(0,0,0,.05);}
.msg.mine .msg-bubble{background:#fdeaea;border-color:#f0c8c8;}
body.dark .msg.mine .msg-bubble{background:#3a2626;border-color:#5a3a3a;}
.msg-time{font-size:10.5px;color:var(--text-dim);white-space:nowrap;}
.msg-del{flex:none;align-self:center;margin-left:auto;border:none;background:transparent;color:var(--text-dim);cursor:pointer;padding:5px 7px;border-radius:6px;display:inline-flex;align-items:center;opacity:.55;transition:all .12s;}
.msg-del:hover{opacity:1;color:#fff;background:var(--link-red);}
.msg-system{text-align:center;color:var(--text-dim);font-size:13.5px;line-height:1.5;margin:10px 0;padding:0 12px;}
.msg-system span{display:inline-block;background:var(--box-bg);border-radius:12px;padding:4px 12px;max-width:90%;}

.msg-reactions{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:1px;}
.rpill{display:inline-flex;align-items:center;gap:3px;font-size:12px;background:var(--box-bg);border:1px solid var(--border);border-radius:11px;padding:1px 8px;cursor:pointer;color:var(--text);line-height:1.7;}
.rpill.mine{background:var(--accent);border-color:var(--accent);color:#fff;}
.rpill:hover{border-color:var(--accent);}
.react-wrap{position:relative;display:inline-flex;}
.react-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;font-size:12px;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.react-btn:hover{border-color:var(--accent);color:var(--accent);}
.react-pop{position:absolute;bottom:26px;left:0;display:none;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 6px;box-shadow:var(--shadow);z-index:30;}
.react-pop.open{display:flex;}
.react-opt{border:none;background:transparent;font-size:17px;cursor:pointer;padding:2px 5px;border-radius:6px;line-height:1;}
.react-opt:hover{background:var(--box-bg);}
.react-opt.on{background:var(--box-bg);outline:2px solid var(--accent);}
.chat-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);background:var(--card);align-items:center;}
.chat-input input{flex:1;height:44px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-size:14px;background:var(--card);color:var(--text);}
.chat-input button{height:44px;border:none;background:var(--accent);color:#fff;border-radius:6px;padding:0 18px;font-weight:700;cursor:pointer;}
.chat-input button:hover{filter:brightness(1.08);}
.eye-btn{flex:none;display:inline-flex;align-items:center;justify-content:center;width:56px;height:44px;padding:0;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:6px;cursor:pointer;}
.eye-btn:hover{border-color:var(--accent);}
.eye-btn.on{border-color:var(--accent);color:var(--accent);background:var(--box-bg);}
.preview-hint{padding:6px 10px 0;font-size:11.5px;color:var(--text-dim);line-height:1.4;}
.eye-key{font-size:9px;font-weight:700;border:1px solid var(--border-strong);border-radius:3px;padding:1px 4px;color:var(--text-dim);}
.chat-hint{display:flex;justify-content:flex-end;padding:2px 4px 0;}
.latex-help{font-size:11.5px;color:var(--text-dim);cursor:pointer;}
.latex-help:hover{color:var(--accent);text-decoration:underline;}
.chat-preview{border:1px dashed var(--border);border-radius:8px;padding:8px 10px;margin-top:6px;background:var(--box-bg);}
.preview-label{font-size:11px;font-weight:800;color:var(--text-dim);margin-bottom:6px;letter-spacing:.3px;}
.preview-empty{font-size:13px;color:var(--text-dim);}
.chat-preview .preview-msg{max-width:100%;}
.chat-preview .msg-bubble{background:#fdeaea;border-color:#f0c8c8;}
body.dark .chat-preview .msg-bubble{background:#3a2626;border-color:#5a3a3a;}
.chat-admin{padding:6px 10px 2px;font-size:12px;color:var(--text-dim);}
.chat-admin-row{display:flex;justify-content:flex-end;align-items:center;gap:8px;flex-wrap:wrap;}
.chat-admin-text{text-align:right;}
.chat-admin-text b{color:var(--text);}
.chat-trash{border:1px solid var(--border);background:var(--card);border-radius:6px;width:32px;height:28px;cursor:pointer;font-size:14px;line-height:1;}
.chat-trash:hover{border-color:var(--accent);}
.cdp-range{border:1px solid var(--border-strong);background:var(--card);color:var(--text);border-radius:99px;padding:4px 11px;font-size:12px;font-weight:700;cursor:pointer;margin-left:4px;}
.cdp-range:hover{background:var(--link-red);border-color:var(--link-red);color:#fff;}
.chat-del-prompt{display:flex;align-items:center;justify-content:flex-end;gap:6px;width:100%;margin-top:5px;color:var(--text);font-size:12.5px;}
.chat-del-prompt button{border:none;border-radius:5px;padding:4px 11px;cursor:pointer;font-size:12px;font-weight:700;}
.chat-del-prompt .cdp-yes{background:var(--accent);color:#fff;}
.chat-del-prompt .cdp-no{background:var(--box-bg);color:var(--text);border:1px solid var(--border);}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;}




/* ===== 문서 작성 팁: 떠다니는 창 ===== */
.tipwin{position:fixed;z-index:1100;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.28);overflow:hidden;min-width:280px;min-height:160px;}
.tipwin-hd{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--box-bg);border-bottom:1px solid var(--border);cursor:move;user-select:none;flex:none;}
.tipwin-hd b{font-size:13px;}
.tipwin-hd .sp{font-size:11px;color:var(--text-dim);}
.tipwin-x{margin-left:auto;background:none;border:none;font-size:17px;line-height:1;cursor:pointer;color:var(--text-dim);padding:0 4px;}
.tipwin-x:hover{color:var(--link-red);}
.tipwin-body{flex:1;overflow:auto;}
.tipwin-rz{position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 50%,var(--border-strong) 50%,var(--border-strong) 60%,transparent 60%,transparent 70%,var(--border-strong) 70%,var(--border-strong) 80%,transparent 80%);}
.tipwin.dragging{opacity:.92;}
@media(max-width:760px){
  .tipwin{left:0 !important;right:0 !important;bottom:0 !important;top:auto !important;
          width:auto !important;height:62vh !important;border-radius:12px 12px 0 0;}
  .tipwin-hd{cursor:default;} .tipwin-rz{display:none;}
}

/* ===== 문서 작성 팁 패널 (우측) ===== */
/* 평소엔 눈에 띄지 않고, 마우스를 올렸을 때만 활성화된 모습이 된다 */
.wk-tipbtn{background:transparent;border:1px solid transparent;color:var(--text-dim);font-size:12px;font-weight:700;padding:4px 9px;border-radius:6px;cursor:pointer;margin-left:auto;opacity:.55;transition:all .12s;}
.wk-tipbtn:hover,.wk-tipbtn.on{opacity:1;background:var(--accent);color:#fff;border-color:var(--accent);}
.tip-pane{border:1px solid var(--border);border-radius:8px;background:var(--card);overflow:auto;min-height:420px;max-height:70vh;}
.tip-hd{position:sticky;top:0;background:var(--box-bg);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;z-index:2;}
.tip-hd b{font-size:13px;}
.tip-x{margin-left:auto;background:none;border:none;font-size:17px;line-height:1;cursor:pointer;color:var(--text-dim);}
.tip-sec{font-size:11px;font-weight:800;color:var(--accent);padding:9px 12px 3px;letter-spacing:.3px;}
.tip-tbl{width:100%;border-collapse:collapse;table-layout:fixed;}
.tip-tbl th{background:var(--box-bg);font-size:10.5px;color:var(--text-dim);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border);}
.tip-tbl td{border-bottom:1px solid var(--border);padding:6px 8px;font-size:12px;vertical-align:top;}
.tip-tbl td:nth-child(1){width:32%;}
.tip-tbl td:nth-child(2){width:38%;}
.tip-tbl td:nth-child(3){width:30%;color:var(--text-dim);font-size:11px;}
.tip-tbl code{background:var(--box-bg);border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-size:11px;font-family:ui-monospace,Consolas,monospace;white-space:pre-wrap;word-break:break-all;}
.tip-tbl .rz h2,.tip-tbl .rz h3{all:revert;font-size:12px;margin:0;font-weight:800;}
.tip-tbl .rz p{margin:0;} .tip-tbl .rz ul,.tip-tbl .rz ol{margin:0 0 0 15px;padding:0;}
.tip-tbl .rz table{border-collapse:collapse;} .tip-tbl .rz th,.tip-tbl .rz td{border:1px solid var(--border);padding:1px 4px;font-size:10.5px;}
.tip-tbl .rz blockquote{margin:0;padding:0 0 0 7px;border-left:2px solid var(--border);color:var(--text-dim);}
.tip-tbl .rz img{max-width:60px;} .tip-tbl .rz hr{margin:3px 0;}

/* ===== 인포박스 폼 (JSON 추방) ===== */
.ib-form{border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--box-bg);margin-top:6px;}
.ib-top2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ib-row{display:grid;grid-template-columns:34% 1fr 30px;gap:6px;margin-top:6px;align-items:center;}
.ib-row input{padding:6px 9px !important;font-size:13px !important;}
.ib-x{border:1px solid var(--border);background:var(--card);color:var(--text-dim);border-radius:6px;height:30px;cursor:pointer;font-size:14px;line-height:1;}
.ib-x:hover{border-color:var(--link-red);color:var(--link-red);}
.ib-add{display:inline-flex;align-items:center;justify-content:center;gap:5px;margin-top:8px;background:var(--card);border:1px dashed var(--border-strong);color:var(--text-dim);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;width:100%;}
.ib-add:hover{border-color:var(--accent);color:var(--accent);}
.ib-hd{display:grid;grid-template-columns:34% 1fr 30px;gap:6px;font-size:11px;color:var(--text-dim);font-weight:700;margin-top:10px;}

/* ===== 문서 사진 업로드 ===== */
.wk-split.drag #e-body{outline:2px dashed var(--accent);outline-offset:-3px;background:var(--box-bg);}
.wk-upmsg{font-size:12px;color:var(--text-dim);min-height:16px;margin-top:2px;}
.wk-upmsg.err{color:var(--link-red);font-weight:700;}
.orph-row{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:4px 0;border-bottom:1px solid var(--border);}

/* ===== 편집기 상단 레이아웃 정리 ===== */
.wk-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:4px;}
.wk-head h1{margin:0;}
.wk-keybox{display:flex;align-items:center;gap:5px;flex:none;padding-top:4px;}
.wk-keybox label{margin:0;font-size:11px;color:var(--text-dim);font-weight:700;white-space:nowrap;}
.wk-keybox input{width:150px;padding:4px 8px !important;font-size:12px !important;font-family:ui-monospace,Consolas,monospace;}
.wk-row2{display:grid;grid-template-columns:2fr 1fr;gap:10px;}
.wk-row2 > div{min-width:0;}
.wk-row3{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.wk-tipbtn{background:var(--box-bg);border:1px solid var(--border);color:var(--accent);font-size:12px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer;margin-left:auto;}
.wk-tipbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
@media(max-width:700px){
  .wk-head{flex-direction:column;gap:6px;}
  .wk-keybox{padding-top:0;} .wk-keybox input{width:100%;}
  .wk-row2,.wk-row3{grid-template-columns:1fr;}
}

/* ===== 새 문서 템플릿 선택 ===== */
.tpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:6px 0 4px;}
.tpl-card{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;text-align:center;}
.tpl-card:hover{border-color:var(--accent);background:var(--box-bg);}
.tpl-card.on{border-color:var(--accent);border-width:2px;background:var(--box-bg);}
.tpl-ic{font-size:19px;line-height:1;}
.tpl-nm{font-size:12px;font-weight:700;color:var(--text);}
.tpl-desc{font-size:11.5px;color:var(--text-dim);margin:2px 0 8px;min-height:15px;}
@media(max-width:520px){ .tpl-grid{grid-template-columns:repeat(2,1fr);} }

/* ===== 문서 편집기 v2 (안다 문법) ===== */
.wk-toolbar{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0 6px;}
.wk-toolbar button{background:var(--box-bg);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer;}
.wk-toolbar button:hover{border-color:var(--accent);color:var(--accent);}
.wk-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch;}
.wk-split textarea{width:100%;min-height:420px;resize:vertical;font-family:ui-monospace,Consolas,monospace;font-size:13.5px;line-height:1.6;}
.wk-preview{border:1px solid var(--border);border-radius:8px;padding:14px;background:var(--card);overflow:auto;min-height:420px;max-height:70vh;font-size:14.5px;}
.wk-preview:empty::before{content:'왼쪽에 입력하면 여기에 결과가 실시간으로 보여요.';color:var(--text-dim);font-size:13px;}
.wk-tabs{display:none;gap:6px;margin:8px 0 0;}
.wk-tabs button{flex:1;padding:8px;border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;background:var(--box-bg);color:var(--text-dim);font-weight:700;cursor:pointer;}
.wk-tabs button.on{background:var(--card);color:var(--text);}
.wk-help{font-size:12.5px;line-height:2;color:var(--text-dim);}
.wk-help code{background:var(--box-bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:12px;}
/* ===== 문서 이미지: 띄우기(float) + 글 흘리기 ===== */
.doc-img{max-width:100%;height:auto;border-radius:8px;border:1px solid var(--border);}
.doc-img.al-center{display:block;margin:12px auto;}
.doc-img.al-left{float:left;margin:6px 16px 10px 0;}
.doc-img.al-right{float:right;margin:6px 0 10px 16px;}
/* 제목·구분선은 떠 있는 이미지를 넘어가지 않도록 */
.doc-body h2,.doc-body h3,.doc-body hr,.wk-preview h2,.wk-preview h3,.wk-preview hr{clear:both;}
.doc-body::after,.wk-preview::after{content:'';display:block;clear:both;}
@media(max-width:640px){
  /* 좁은 화면에선 띄우기를 풀고 전체폭 — 글자와 겹치지 않게 */
  .doc-img.al-left,.doc-img.al-right{float:none;display:block;margin:12px auto;width:100% !important;}
}
/* 미리보기에서 선택·조작 */
.wk-preview{position:relative;}
.wk-preview .doc-img{cursor:pointer;}
.wk-preview .doc-img.sel{outline:2px solid var(--accent);outline-offset:2px;}
.img-handle{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:nwse-resize;z-index:5;touch-action:none;}
.img-tools{position:absolute;display:flex;align-items:center;gap:1px;background:var(--card);border:1px solid var(--border-strong);border-radius:8px;padding:3px;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:6;white-space:nowrap;}
.img-tools button{border:none;background:none;font-size:12px;padding:4px 7px;border-radius:5px;cursor:pointer;color:var(--text);line-height:1;}
.img-tools button:hover{background:var(--box-bg);}
.img-tools button.on{background:var(--accent);color:#fff;}
.img-tools button.del:hover{background:var(--link-red);color:#fff;}
.img-tools .sep{width:1px;align-self:stretch;background:var(--border);margin:0 3px;}
.img-tools .wlab{font-size:11px;color:var(--text-dim);padding:0 4px;min-width:34px;text-align:center;}
.wk-table{border-collapse:collapse;margin:10px 0;max-width:100%;}
.wk-table th,.wk-table td{border:1px solid var(--border);padding:6px 12px;font-size:14px;}
.wk-table th{background:var(--box-bg);}
@media(max-width:900px){
  .wk-split{grid-template-columns:1fr;}
  .wk-tabs{display:flex;}
  .wk-split.prev-mode #wkEditCol{display:none;}
  .wk-split:not(.prev-mode) #wkPrevCol{display:none;}
  .wk-split textarea,.wk-preview{min-height:300px;}
}

/* ===== 알림/쪽지 인박스 (2단계) ===== */
.nav-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 4px;margin-left:5px;border-radius:9px;background:var(--accent);color:#fff;font-size:11px;font-weight:800;line-height:1;}
.inbox-wrap{display:grid;grid-template-columns:minmax(0,340px) minmax(0,1fr);gap:14px;align-items:start;}
.inbox-list{border:1px solid var(--border);border-radius:10px;background:var(--card);overflow:hidden;}
.ib-item{display:flex;gap:10px;padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--card);}
.ib-item:last-child{border-bottom:none;}
.ib-item:hover{background:var(--box-bg);}
.ib-item.on{background:var(--box-bg);box-shadow:inset 3px 0 0 var(--accent);}
.ib-item.unread .ib-name{font-weight:800;}
.ib-item.unread .ib-prev{color:var(--text);font-weight:600;}
.ib-ava{width:36px;height:36px;border-radius:50%;flex:none;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;}
/* 접속 표시: 아바타 우하단 초록 점 */
.ava-wrap{position:relative;flex:none;}
.pres-dot{position:absolute;right:0;bottom:0;width:11px;height:11px;border-radius:50%;background:var(--text-dim);border:2px solid var(--card);opacity:0;transition:opacity .15s,background .15s;}
.pres-dot.on{background:#22c55e;opacity:1;}
/* 대화 헤더의 접속 표시 */
.pres-tag{font-size:11.5px;font-weight:700;color:#22c55e;margin-left:6px;display:none;}
.pres-tag.on{display:inline;}
.ib-body{min-width:0;flex:1;}
.ib-top{display:flex;justify-content:space-between;gap:8px;align-items:baseline;}
.ib-name{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ib-time{font-size:11px;color:var(--text-dim);flex:none;}
.ib-prev{font-size:12.5px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.ib-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;align-self:center;}
.inbox-pane{border:1px solid var(--border);border-radius:10px;background:var(--card);min-height:320px;display:flex;flex-direction:column;box-shadow:var(--shadow);}
.ip-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
.ip-title{font-weight:800;font-size:15px;color:var(--text);}
.ip-close{margin-left:auto;background:none;border:none;font-size:20px;line-height:1;cursor:pointer;color:var(--text-dim);}
.ip-msgs{padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:52vh;}
.dm-b{max-width:78%;padding:9px 12px;border-radius:12px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.dm-b.them{align-self:flex-start;background:var(--box-bg);border:1px solid var(--border);color:var(--text);}
.dm-b.me{align-self:flex-end;background:var(--accent);color:#fff;}
.dm-t{font-size:10.5px;color:var(--text-dim);margin-top:3px;}
.dm-t.me{align-self:flex-end;}
.msg-imgs.mine{align-self:flex-end;justify-content:flex-end;}
.ip-reply{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);}
.ip-reply textarea{flex:1;resize:none;min-height:38px;max-height:120px;padding:8px 10px;border:1px solid var(--border-strong);border-radius:8px;font:inherit;font-size:14px;background:var(--card);color:var(--text);}
.ip-empty{margin:auto;color:var(--text-dim);font-size:13.5px;padding:30px;text-align:center;}
.dm-btn{border:1px solid var(--border-strong);background:var(--card);color:var(--text);border-radius:6px;padding:3px 9px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
.dm-btn:hover{background:var(--box-bg);border-color:var(--accent);color:var(--accent);}
.dir-metarow .dm-btn{margin-left:6px;}
@media(max-width:820px){ .inbox-wrap{grid-template-columns:1fr;} }
.modal-box{background:var(--card);border-radius:12px;padding:22px 22px 18px;max-width:340px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,.35);}
.modal-msg{font-size:16px;font-weight:800;color:var(--text);line-height:1.5;}
.modal-sub{font-size:13px;color:var(--text-dim);margin-top:8px;line-height:1.5;}
.he-input{width:100%;box-sizing:border-box;margin-top:12px;height:38px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-size:14px;background:var(--card);color:var(--text);font-family:inherit;}
.he-input:focus{outline:none;border-color:var(--accent);}
.he-msg{min-height:16px;font-size:12.5px;margin-top:6px;color:var(--text-dim);}
.he-msg.err{color:var(--link-red);}
.nd-label{display:block;margin-top:12px;margin-bottom:2px;font-size:12.5px;font-weight:700;color:var(--text-dim);}
.modal-box .he-input{margin-top:2px;}
.handle-cell{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.handle-edit{flex:none;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text-dim);cursor:pointer;padding:0;transition:border-color .15s,color .15s,background .15s;}
.handle-edit:hover{border-color:var(--accent);color:var(--accent);background:var(--box-bg);}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.modal-btns button{border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-weight:700;font-size:13px;}
.modal-cancel{background:var(--box-bg);color:var(--text);border:1px solid var(--border);}
.modal-ok{background:var(--accent);color:#fff;}
.block-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1100;cursor:wait;}
.block-box{background:var(--card);border-radius:12px;padding:26px 34px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 12px 40px rgba(0,0,0,.35);}
.block-spin{width:34px;height:34px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:andaspin .8s linear infinite;}
.block-text{font-size:14px;color:var(--text);font-weight:600;}
/* 캘린더 */
.calendar-wrap{width:280px;flex:none;position:sticky;top:64px;}
.cal{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);}
.cal-topbar{display:flex;align-items:center;justify-content:space-between;background:var(--accent);color:#fff;padding:8px 12px;}
.cal-title{font-weight:800;font-size:14px;}
.cal-nav{background:rgba(255,255,255,.18);color:#fff;border:none;width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:11px;line-height:1;}
.cal-nav:hover:not(:disabled){background:rgba(255,255,255,.32);}
.cal-nav:disabled{opacity:.35;cursor:not-allowed;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);padding:1px;}
.cal-dow{background:var(--box-bg);text-align:center;font-size:11px;font-weight:800;padding:6px 0;color:var(--text-dim);}
.cal-cell{background:var(--card);min-height:38px;padding:4px;font-size:12px;color:var(--text);}
.cal-cell.empty{background:var(--box-bg);}
.cal-cell.today .cal-num{background:var(--accent);color:#fff;border-radius:50%;padding:1px 5px;}
.cal-dow.sun,.cal-cell.sun .cal-num{color:#d33;}
.cal-dow.sat,.cal-cell.sat .cal-num{color:#37c;}
.cal-cell.today.sun .cal-num,.cal-cell.today.sat .cal-num{color:#fff;}
.cal-admin{font-size:12px;color:var(--text);padding:9px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.cal-admin.muted{color:var(--text-dim);}
.cal-yr-input{width:64px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--card);color:var(--text);font-size:12px;}
.cal-save{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700;}
.cal-save:hover{filter:brightness(1.08);}
.cal-yr:hover{border-color:var(--accent);}
.cal-range{color:var(--text-dim);font-size:11px;}
.doclist-head{background:var(--accent);color:#fff;font-weight:800;font-size:15px;text-align:center;padding:11px;}
.cat-head{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--accent);color:#fff;border-top:1px solid rgba(255,255,255,.22);padding:9px 14px;cursor:pointer;user-select:none;}
.cat-head:hover{filter:brightness(1.06);}
.cat-name{font-weight:800;font-size:14px;color:#fff;}
.cat-toggle{font-size:12px;color:#fff;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.cat-chev{display:inline-block;font-size:11px;line-height:1;transition:transform .25s ease;opacity:.9;}
.cat.cat-collapsed .cat-chev{transform:rotate(-90deg);}
.cat-body{background:var(--card);max-height:1200px;overflow:hidden;transition:max-height .3s ease,opacity .25s ease;opacity:1;}
.cat.cat-collapsed .cat-body{max-height:0;opacity:0;}
.doc-link{display:flex;align-items:baseline;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;color:var(--text);}
.doc-link:last-child{border-bottom:none;}
.doc-link:hover{background:var(--box-bg);text-decoration:none;}
.dl-title{font-weight:700;color:var(--accent);white-space:nowrap;}
.dl-desc{font-size:12.5px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;}
.alldocs-sec{margin-top:16px;}
.ad-count{font-weight:700;opacity:.85;font-size:13px;}
.alldocs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));}


/* ===== 아이콘 (인라인 SVG 스프라이트) ===== */
.ic16,.ic18,.ic20{fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:none;}
.ic16{width:15px;height:15px;}
.ic18{width:17px;height:17px;}
.ic20{width:19px;height:19px;}
.ic-dice .dot{fill:currentColor;stroke:none;}

/* ===== 모바일 하단 탭 바 ===== */
.botnav{display:none;}
@media(max-width:768px){
  /* 상단의 이동 버튼들은 하단으로 내려간다 → 상단바는 로고+검색+계정만 남아 홀가분해짐 */
  .topbar .navbtn{display:none;}
  /* 검색을 두 번째 줄로 내려 전체 폭을 쓴다 (한 줄에 우겨넣으면 협소해짐) */
  .topbar{gap:8px;padding:0 10px 8px;height:auto;flex-wrap:wrap;align-items:center;}
  .topbar .brandwrap{height:48px;}
  .topbar .spacer{display:none;}
  .topbar .mode{padding:6px 8px;font-size:12px;margin-left:auto;}
  .topbar .search{order:10;flex:0 0 100%;max-width:none;min-width:0;}
  .topbar .search input{height:36px;font-size:14px;}
  .search-results{top:40px;}

  .botnav{
    display:flex; position:fixed; left:0; right:0; bottom:0; z-index:90;
    background:var(--card); border-top:1px solid var(--border-strong);
    box-shadow:0 -2px 12px rgba(0,0,0,.10);
    padding-bottom:env(safe-area-inset-bottom);      /* 아이폰 홈 인디케이터 영역 */
  }
  .bn-item{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; padding:7px 0 6px; background:none; border:none; cursor:pointer;
    color:var(--text-dim); font-size:10.5px; font-weight:700; position:relative;
    -webkit-tap-highlight-color:transparent;
  }
  .bn-item .bn-ic{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  .bn-item.on{color:var(--accent);}
  .bn-item.on .bn-ic{transform:translateY(-1px);}
  .bn-badge{
    position:absolute; top:3px; left:50%; margin-left:5px;
    min-width:16px; height:16px; padding:0 4px; border-radius:99px;
    background:var(--link-red); color:#fff; font-size:10px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
  }
  /* ★버그 수정: 여백을 존재하지 않는 .wrap 에 걸어놨었다 → 실제 컨테이너는 .layout */
  body.has-botnav .layout{ padding-bottom:calc(66px + env(safe-area-inset-bottom)); }
  /* 폰에서 하단 시트로 뜨는 팁 창이 하단 바와 겹치지 않게 */
  .tipwin{ bottom:calc(56px + env(safe-area-inset-bottom)) !important; height:56vh !important; }

  /* ★★ iOS 자동 확대 방지 (이번 문제의 진짜 원인)
     입력창 font-size가 16px 미만이면 iOS Safari가 포커스 순간 화면을 강제 확대한다.
     그러면 상단바가 잘리고 position:fixed 하단 바가 화면 밖으로 밀려난다.
     16px 이상이면 확대가 아예 일어나지 않는다. */
  .chat-input input,
  .ip-reply textarea,
  .dir-search input, #dirSearch,
  .he-input, .editor input, .editor textarea,
  input[type="text"], input[type="search"], input[type="email"],
  input[type="number"], input[type="password"], textarea, select{
    font-size:16px !important;
  }

  /* 가로 넘침 차단 — 넘치면 브라우저가 축소해서 레이아웃이 깨진다 */
  html,body{ max-width:100%; overflow-x:hidden; }
  .layout{ padding-left:10px; padding-right:10px; }
  .doc{ padding:16px 14px 26px; }
  .community{ flex-direction:column; }
  .q-panel, .calendar-wrap{ width:100% !important; position:static !important; max-height:none; }
  .table-scroll{ overflow-x:auto; max-width:100%; }

  /* ★ 채팅 배율(zoom) 제거 — 이게 가로 넘침의 진범이었다.
     zoom>1이면 .chat-log 내용이 컨테이너보다 넓어져 메시지 오른쪽이 잘린다.
     폰에선 화면이 좁아 배율 조정이 의미도 없으므로 기능 자체를 감춘다. */
  .chat-log{ zoom:1 !important; }
  .chat-size{ display:none !important; }

  /* 채팅: 전체가 보이도록 (하단 바 + 상단 2줄 감안, 주소창 때문에 vh 대신 dvh) */
  .chat{ height:auto; min-height:0; max-width:100%; }
  .chat-log{ max-height:calc(100dvh - 300px); min-height:280px; overflow-x:hidden; }
  .msg{ max-width:100%; }
  .msg-bubble{ max-width:78% !important; }
  .msg-imgs img{ max-width:60vw; }

  /* ★ 회원 관리 표: 가로 스크롤 확실히 동작하게
     (부모가 min-width를 안 풀어주면 표가 스크롤되지 않고 화면 밖으로 밀린다) */
  .content, .doc{ min-width:0; max-width:100%; }
  .table-scroll{
    width:100%; max-width:100%;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    overscroll-behavior-x:contain;            /* 표를 넘길 때 페이지가 같이 밀리지 않게 */
  }
  .table-scroll > table{ width:auto !important; min-width:max-content; }
  .table-hint{ display:block; }
}
body.trash-view .botnav{display:none;}   /* 휴지통 열람 모드에선 네비 비활성 */

/* ===== 질문하기: 우측 슬라이드 패널 (팝업 대체) ===== */
.qc-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1100;display:flex;justify-content:flex-end;}
.qc-drawer{width:min(460px,100%);height:100%;background:var(--card);border-left:1px solid var(--border-strong);
  box-shadow:-10px 0 34px rgba(0,0,0,.22);padding:20px 22px;overflow-y:auto;display:flex;flex-direction:column;
  animation:qcIn .2s ease-out;}
@keyframes qcIn{from{transform:translateX(100%);opacity:.6}to{transform:none;opacity:1}}
.qc-drawer .modal-msg{text-align:left;font-size:18px;}
.qc-drawer .modal-sub{text-align:left;}
.qc-drawer .modal-btns{margin-top:auto;padding-top:16px;justify-content:flex-end;}
@media(max-width:640px){
  .qc-ov{align-items:flex-end;}
  .qc-drawer{width:100%;height:88vh;border-left:none;border-radius:14px 14px 0 0;
    animation:qcUp .22s ease-out;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
  @keyframes qcUp{from{transform:translateY(100%)}to{transform:none}}
}

/* 쪽지함 새로고침 애니메이션 (평소 자동 갱신은 무애니메이션 유지 — 깜빡임 방지 원칙) */
.ib-reload{opacity:.35;transform:translateY(-4px);transition:opacity .12s,transform .12s;}
.ib-in{animation:ibIn .3s ease-out;}
@keyframes ibIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== 참여 넛지 (대문) ===== */
.nudge{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(90deg,var(--box-bg),var(--card));border:1px solid var(--border-strong);border-left:4px solid var(--accent);border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:16px;}
.nudge .nz-t{flex:1;font-size:13.5px;color:var(--text);min-width:180px;}
.nudge .nz-t b{color:var(--accent);}
.nudge button{white-space:nowrap;}
.nudge .nz-x{background:none;border:none;color:var(--text-dim);font-size:17px;line-height:1;cursor:pointer;padding:0 2px;}
.nudge .nz-x:hover{color:var(--link-red);}
.stub-sec{margin-top:8px;}
.stub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;}
.stub-card{border:1px dashed var(--border-strong);border-radius:9px;padding:10px 12px;background:var(--card);cursor:pointer;}
.stub-card:hover{border-style:solid;border-color:var(--accent);}
.stub-card .st-t{font-size:14px;font-weight:800;color:var(--text);word-break:break-all;}
.stub-card .st-m{font-size:11.5px;color:var(--text-dim);margin-top:3px;}
.stub-badge{display:inline-flex;align-items:center;gap:5px;background:var(--box-bg);border:1px dashed var(--border-strong);color:var(--text-dim);border-radius:99px;padding:3px 11px;font-size:12px;margin-left:8px;}
.rc-who{font-size:11px;color:var(--text-dim);}

/* ===== 기여 크레딧 · 좋아요 ===== */
.like-bar{display:flex;align-items:center;gap:10px;margin:2px 0 14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.like-btn{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border-strong);color:var(--text-dim);border-radius:99px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;}
.like-btn:hover{border-color:var(--link-red);color:var(--link-red);}
.like-btn.on{background:var(--link-red);border-color:var(--link-red);color:#fff;}
.like-btn .lh{font-size:14px;line-height:1;}
.like-hint{font-size:12px;color:var(--text-dim);}
.credit-line{font-size:12px;color:var(--text-dim);}
.credit-line b{color:var(--accent);}
.dc-like{font-size:11.5px;color:var(--link-red);font-weight:700;}
.mc-credit{font-size:11px;color:var(--text-dim);margin-top:3px;}

.qb-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.qb-head h1{margin:0;flex:1;}
.qb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.qb-card{display:block;border:1px solid var(--border);border-radius:10px;padding:14px 16px;background:var(--card);cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.qb-card:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(0,0,0,.07);}
.qb-t{font-size:15px;font-weight:800;color:var(--text);word-break:break-word;}
.qb-m{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--text-dim);margin-top:7px;}
.qb-ans{background:var(--box-bg);border:1px solid var(--border);border-radius:99px;padding:1px 9px;font-weight:700;}
.qb-ans.hot{background:var(--accent);border-color:var(--accent);color:#fff;}
.qb-empty{padding:30px;text-align:center;color:var(--text-dim);border:1px dashed var(--border-strong);border-radius:10px;}
/* 문서 탭 편집 유도 */
.doc-card.stub{border-style:dashed;}
.dc-stub{font-size:11px;color:var(--accent);font-weight:700;}
.dc-edit{margin-left:auto;font-size:11px;color:var(--text-dim);border:1px solid var(--border);border-radius:99px;padding:2px 9px;background:var(--card);cursor:pointer;}
.dc-edit:hover{border-color:var(--accent);color:var(--accent);}
@media(max-width:640px){ .qb-grid{grid-template-columns:1fr;} }

/* ===== 문서 탭 (#docs) ===== */
.docs-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.docs-head h1{margin:0;flex:1;}
.docs-sort{display:flex;gap:4px;}
.docs-sort button{background:var(--box-bg);border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-weight:700;padding:6px 12px;border-radius:99px;cursor:pointer;}
.docs-sort button.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.docs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}
.doc-card{display:block;border:1px solid var(--border);border-radius:10px;padding:13px 15px;background:var(--card);cursor:pointer;transition:border-color .12s, box-shadow .12s;}
.doc-card:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(0,0,0,.07);}
.doc-card .dc-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:3px;word-break:break-all;}
.doc-card .dc-key{font-size:11.5px;color:var(--text-dim);font-family:ui-monospace,Consolas,monospace;}
.doc-card .dc-meta{font-size:12px;color:var(--text-dim);margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
.doc-card .dc-cat{font-size:11px;background:var(--box-bg);border:1px solid var(--border);border-radius:99px;padding:1px 8px;color:var(--text-dim);}
@media(max-width:640px){ .docs-grid{grid-template-columns:1fr;} }
.alldocs-grid .alldoc{border-right:1px solid var(--border);}
.alldoc .dl-key{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ad-empty{padding:14px 16px;color:var(--text-dim);font-size:13px;}
@media(max-width:640px){ .alldocs-grid{grid-template-columns:1fr;} }
.recent{width:215px;flex:none;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);}
.recent-h{font-weight:800;font-size:13px;padding:10px 13px;border-bottom:1px solid var(--border);color:var(--text-dim);background:var(--box-bg);}
.rc-item{display:flex;justify-content:space-between;gap:8px;padding:9px 13px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;color:var(--text);}
.rc-item:last-child{border-bottom:none;}
.rc-item:hover{background:var(--box-bg);text-decoration:none;}
.rc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rc-time{color:var(--text-dim);font-size:11px;white-space:nowrap;}
@media(max-width:760px){ .landing-grid{flex-direction:column;} .recent{width:100%;} }

.layout{max-width:1180px;margin:16px auto;padding:0 14px;display:flex;gap:16px;align-items:flex-start;}
.sidebar{width:210px;flex:none;position:sticky;top:64px;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;}
.sidebar h4{margin:0;padding:11px 14px;font-size:12px;color:var(--text-dim);letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--box-bg);}
.sidebar nav a{display:block;padding:9px 14px;color:var(--text);font-size:13.5px;border-bottom:1px solid var(--border);cursor:pointer;}
.sidebar nav a:hover{background:var(--box-bg);text-decoration:none;}
.sidebar nav a.active{color:var(--accent);font-weight:700;border-left:3px solid var(--accent);padding-left:11px;}
.sidebar .addbtn{display:inline-flex;align-items:center;justify-content:center;gap:5px;display:block;width:calc(100% - 20px);margin:10px;padding:8px;border:1px dashed var(--border-strong);background:transparent;color:var(--accent);border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;}
.sidebar .addbtn:hover{background:var(--box-bg);}
.content{flex:1;min-width:0;}
.rightrail{width:217px;flex:none;position:sticky;top:64px;display:flex;flex-direction:column;gap:10px;}
.rightrail .recent{width:100%;box-sizing:border-box;}
.rightrail .addbtn{display:block;width:100%;padding:9px;border:1px dashed var(--border-strong);background:var(--card);color:var(--accent);border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;box-shadow:var(--shadow);}
.rightrail .addbtn:hover{background:var(--box-bg);}
.rightrail .addbtn.trash-btn{margin-top:2px;border-style:solid;border-color:var(--border-strong);color:var(--text-dim);}
.rightrail .addbtn.trash-btn:hover{color:var(--text);background:var(--box-bg);}
/* 휴지통 열람 모드: 다른 탭/이동 비활성화 + 문서 흑백 */
body.trash-view .search,
body.trash-view #directoryBtn,
body.trash-view #communityBtn,
body.trash-view #homeLink,
body.trash-view .usermenu{pointer-events:none;opacity:.4;}
.trash-doc{filter:grayscale(1);opacity:.92;}
.search-results{position:absolute;top:36px;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);overflow-y:auto;max-height:60vh;z-index:60;}
.search-results a{display:block;padding:9px 12px;color:var(--text);font-size:13.5px;border-bottom:1px solid var(--border);cursor:pointer;}
.search-results a:last-child{border-bottom:none;}
.search-results a:hover{background:var(--box-bg);text-decoration:none;}
.search-results .sr-empty{padding:9px 12px;color:var(--text-dim);font-size:13px;}
.search-results .sr-head{padding:7px 12px;font-size:11px;font-weight:800;letter-spacing:.3px;color:var(--text-dim);background:var(--box-bg);border-bottom:1px solid var(--border);}

.doc{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:22px 28px 34px;}
.doc-head{display:flex;align-items:baseline;flex-wrap:wrap;gap:10px;border-bottom:2px solid var(--accent);padding-bottom:8px;margin-bottom:4px;}
.doc-head h1{margin:0;font-size:26px;letter-spacing:-.5px;}
.doc-head .tabs{margin-left:auto;display:flex;gap:4px;}
.doc-head .tabs button{background:transparent;border:none;color:var(--text-dim);font-size:13.5px;font-weight:600;padding:7px 10px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;line-height:1;transition:color .12s,background .12s;}
.doc-head .tabs button:hover{color:var(--accent);background:var(--box-bg);}
.doc-head .tabs button:active{background:var(--border);}
.doc-head .tabs button.danger{color:var(--link-red);}
.doc-head .tabs button.danger:hover{color:#fff;background:var(--link-red);}
.doc-head .tabs button svg{width:15px;height:15px;flex:none;}
.doc-meta{font-size:12px;color:var(--text-dim);margin:6px 0 14px;}

.notice{background:var(--box-bg);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:4px;padding:9px 14px;font-size:13px;color:var(--text-dim);margin:0 0 18px;}
.notice b{color:var(--text);}
.infobox{float:right;width:290px;margin:0 0 16px 20px;border:1px solid var(--border-strong);border-radius:6px;overflow:hidden;font-size:13px;background:var(--card);}
.infobox .ib-title{background:var(--infobox-head);color:#fff;text-align:center;padding:10px;font-weight:800;font-size:15px;letter-spacing:-.3px;}
.infobox .ib-sub{background:var(--infobox-head);color:rgba(255,255,255,.85);text-align:center;padding:0 10px 9px;font-size:12px;margin-top:-4px;}
.infobox table{width:100%;border-collapse:collapse;}
.infobox th,.infobox td{padding:7px 9px;border-top:1px solid var(--border);vertical-align:top;text-align:left;}
.infobox th{background:var(--table-head);width:34%;color:var(--text-dim);font-weight:700;white-space:nowrap;}

.toc{display:inline-block;min-width:230px;max-width:100%;background:var(--box-bg);border:1px solid var(--border);border-radius:5px;padding:10px 16px 12px;margin:6px 0 22px;}
.toc .toc-title{font-weight:800;font-size:14px;margin-bottom:6px;}
.toc ul{list-style:none;margin:0;padding:0;font-size:13.5px;}
.toc li{padding:1.5px 0;} .toc li.l3{padding-left:16px;} .toc li.l4{padding-left:32px;}
.toc a{color:var(--link);cursor:pointer;} .toc .n{color:var(--text-dim);margin-right:5px;}

.doc h2,.doc h3,.doc h4{scroll-margin-top:64px;cursor:pointer;position:relative;}
.doc h2{font-size:21px;border-bottom:1px solid var(--border-strong);padding-bottom:5px;margin:30px 0 12px;}
.doc h3{font-size:17.5px;border-bottom:1px solid var(--border);padding-bottom:4px;margin:22px 0 10px;}
.doc h4{font-size:15.5px;margin:18px 0 8px;}
.doc h2 .sec-num,.doc h3 .sec-num,.doc h4 .sec-num{color:var(--accent);margin-right:7px;font-weight:800;}
.doc h2 .fold{position:absolute;right:2px;font-size:12px;color:var(--text-dim);font-weight:400;}
.doc .collapsed{display:none;}
.doc p{margin:9px 0;}
.doc ul.body-list,.doc ol.body-list{margin:9px 0;padding-left:24px;}
.doc ul.body-list li,.doc ol.body-list li{margin:4px 0;}
.doc strong{color:var(--text);}
.doc table.wtable{border-collapse:collapse;width:100%;margin:12px 0;font-size:13.5px;}
.doc table.wtable th,.doc table.wtable td{border:1px solid var(--border-strong);padding:7px 10px;vertical-align:top;}
.doc table.wtable th{background:var(--table-head);font-weight:700;}
.doc table.wtable td.y{white-space:nowrap;color:var(--text-dim);width:90px;}
.callout{background:var(--box-bg);border:1px solid var(--border);border-left:4px solid var(--accent-soft);border-radius:4px;padding:11px 15px;margin:14px 0;font-size:14px;}
.callout .ct{font-weight:800;display:block;margin-bottom:3px;color:var(--accent);}
.imgph{background:repeating-linear-gradient(45deg,var(--box-bg),var(--box-bg) 10px,transparent 10px,transparent 20px);border:1px dashed var(--border-strong);border-radius:6px;color:var(--text-dim);display:flex;align-items:center;justify-content:center;text-align:center;min-height:120px;margin:14px 0;font-size:13px;padding:14px;}
.fn{color:inherit;}
.fn-mark{color:var(--link);cursor:help;font-size:11px;vertical-align:super;position:relative;}
.fn-mark:hover::after{content:attr(data-note);position:absolute;left:50%;bottom:150%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:7px 11px;border-radius:6px;font-size:12px;line-height:1.5;width:max-content;max-width:280px;white-space:normal;z-index:20;box-shadow:0 3px 10px rgba(0,0,0,.25);vertical-align:baseline;}
.footnotes{margin-top:34px;border-top:1px solid var(--border);padding-top:14px;font-size:12.5px;color:var(--text-dim);}
.footnotes .fn-item{margin:5px 0;} .footnotes .fn-item b{color:var(--link);margin-right:6px;}
.category{margin-top:26px;background:var(--box-bg);border:1px solid var(--border);border-radius:5px;padding:8px 14px;font-size:12.5px;color:var(--text-dim);}
.category b{color:var(--text-dim);margin-right:6px;} .category a{margin-right:4px;}
.related{list-style:none;padding:0;margin:8px 0;}
.related li{padding:3px 0 3px 18px;position:relative;}
.related li::before{content:"▸";position:absolute;left:0;color:var(--accent);}
footer.site{max-width:1180px;margin:14px auto 30px;padding:0 14px;color:var(--text-dim);font-size:12px;text-align:center;}

/* ===== 로그인 화면 ===== */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.login-card{background:var(--card);border:1px solid var(--border);border-top:4px solid var(--accent);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.12);width:100%;max-width:360px;padding:28px 26px;}
.login-card h1{margin:0 0 4px;font-size:22px;letter-spacing:-.5px;}
.login-card .sub{color:var(--text-dim);font-size:13px;margin-bottom:20px;}
.login-card label{display:block;font-size:12.5px;color:var(--text-dim);margin:12px 0 4px;font-weight:700;}
.login-card input{width:100%;height:38px;border:1px solid var(--border-strong);border-radius:6px;padding:0 11px;font-size:14px;background:var(--card);color:var(--text);}
.login-card input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
.btn{border:none;border-radius:6px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer;}
.btn.primary{background:var(--accent);color:#fff;width:100%;margin-top:18px;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.ghost{background:var(--box-bg);border:1px solid var(--border);color:var(--text);}
.login-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:12.5px;}
.login-row a{cursor:pointer;}
.msg{font-size:13px;margin-top:12px;padding:8px 11px;border-radius:6px;display:none;}
.msg.err{display:block;background:#fdecec;color:#b3261e;border:1px solid #f5c2c0;}
.msg.ok{display:block;background:#eaf6ec;color:#1b7a2f;border:1px solid #bfe3c6;}
body.dark .msg.err{background:#3a2020;color:#ff9a94;border-color:#5a2a2a;}
body.dark .msg.ok{background:#1f3323;color:#8fd39c;border-color:#2f5236;}

/* ===== 편집 폼 ===== */
.editor label{display:block;font-size:12.5px;color:var(--text-dim);font-weight:700;margin:14px 0 4px;}
.editor input,.editor textarea{width:100%;border:1px solid var(--border-strong);border-radius:6px;padding:9px 11px;font-size:14px;background:var(--card);color:var(--text);font-family:inherit;}
.editor textarea{min-height:340px;resize:vertical;line-height:1.6;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;}
.editor .hint{font-size:11.5px;color:var(--text-dim);font-weight:400;margin-left:6px;}
.editor .adv summary{cursor:pointer;font-size:12.5px;color:var(--text-dim);margin-top:14px;}
.editor-actions{display:flex;gap:8px;margin-top:18px;align-items:center;}

/* ===== 역사 패널 ===== */
.history .rev{border:1px solid var(--border);border-radius:6px;padding:10px 13px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.history .rev .meta{font-size:12.5px;color:var(--text-dim);}
.history .rev .meta b{color:var(--text);}
.history .rev button{white-space:nowrap;}
.history .rev button:disabled{opacity:.45;cursor:not-allowed;}
.history .expired{font-size:11.5px;color:var(--text-dim);}

@media(max-width:860px){
  .layout{flex-direction:column;}
  .rightrail{width:100%;position:static;}
  .landing-reco{min-height:0;}
  .community{flex-direction:column;}
  .calendar-wrap{width:100%;position:static;}
  .chat{height:60vh;}
  .infobox{float:none;width:100%;margin:0 0 16px;}
  .doc{padding:18px 16px 28px;}
  .topbar .search{max-width:none;}
  .doc-head h1{font-size:22px;}
}
</style>

/* 접속 heartbeat: 5초 단위로 로컬 측정 → 30초마다 서버로 한 번에 전송(트래픽 절감). 탭 보일 때만 카운트. */
let hbTimer=null, hbTick=null, hbAccum=0;
async function beat(add, isNew){ try{ await sb.rpc('heartbeat', { p_add: add|0, p_new: !!isNew }); }catch(e){} }
function hbFlush(){ if(hbAccum>0){ const n=hbAccum; hbAccum=0; beat(n, false); } }
function startHeartbeat(){
  stopHeartbeat();
  hbAccum=0;
  beat(0, true);                                              // 새 방문: 이번 체류(session) 0으로 리셋 + 접속 표시
  hbTick=setInterval(()=>{ if(!document.hidden) hbAccum+=5; }, 5000);  // 5초 단위 로컬 측정
  hbTimer=setInterval(hbFlush, 30000);                        // 30초마다 서버 전송
}
function stopHeartbeat(){ if(hbTimer){ clearInterval(hbTimer); hbTimer=null; } if(hbTick){ clearInterval(hbTick); hbTick=null; } hbFlush(); }
document.addEventListener('visibilitychange',()=>{ if(document.hidden) hbFlush(); });   // 탭 숨김 시 남은 시간 전송
window.addEventListener('beforeunload', hbFlush);                                        // 종료 직전 best-effort 전송
/* 탭이 사라질 때 즉시 오프라인 표시 (unload 중엔 일반 fetch가 취소될 수 있어 keepalive 사용) */
window.addEventListener('pagehide', ()=>{
  hbFlush();
  if(!state.user) return;
  if(!ACCESS_TOKEN) return;
  try{
    fetch(SUPABASE_URL + '/rest/v1/rpc/go_offline', {
      method:'POST', keepalive:true,          // 종료 중에도 요청이 취소되지 않게
      headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_KEY,
                'Authorization':'Bearer ' + ACCESS_TOKEN },
      body:'{}'
    });
  }catch(e){}
});

/* 체류시간(분 반올림) 표기: N일 N시간 N분 (0 단위 생략, 1분 미만이면 "0분") */
function fmtDurationMin(sec){
  let min=Math.round((Number(sec)||0)/60);
  const d=Math.floor(min/1440); min-=d*1440;
  const h=Math.floor(min/60);   const m=min-h*60;
  const parts=[];
  if(d) parts.push(d+'일');
  if(h) parts.push(h+'시간');
  if(m) parts.push(m+'분');
  return parts.length ? parts.join(' ') : '0분';
}

/* ================== 타이핑하면 입력창으로 (자동 포커스 대체) ==================
   진입하자마자 포커스를 뺏으면 폰에서 키보드가 튀어오르고 화면이 밀린다.
   대신 '아무 글자나 치는 순간' 입력창으로 포커스를 옮긴다 — 미리 클릭할 필요 없음.
   keydown 시점에 포커스를 옮기므로 그 글자도 그대로 입력창에 들어간다. */
let _t2fHandler = null;
function typeToFocus(sel){
  clearTypeToFocus();
  _t2fHandler = e=>{
    if(e.ctrlKey || e.metaKey || e.altKey) return;                  // 단축키는 통과
    const t=e.target;
    if(t && (t.tagName==='INPUT' || t.tagName==='TEXTAREA' || t.isContentEditable)) return;  // 이미 입력 중
    if(document.querySelector('.modal-ov, .qc-ov, .lightbox, .block-ov')) return;          // 모달·패널 열려 있으면 무시
    // 글자 한 개짜리 키 + 한글 IME(Process/229)만 통과. Enter·Tab·화살표·F키 등은 무시
    const printable = (e.key && e.key.length===1) || e.key==='Process' || e.keyCode===229;
    if(!printable) return;
    const el=document.querySelector(sel);
    if(!el || el===document.activeElement) return;
    el.focus();                                                     // 이후 그 글자가 여기에 입력됨
  };
  document.addEventListener('keydown', _t2fHandler);
}
function clearTypeToFocus(){
  if(_t2fHandler){ document.removeEventListener('keydown', _t2fHandler); _t2fHandler=null; }
}

    ok.disabled=true; msg.className='he-msg';
    try{
      const { data, error } = await sb.rpc('set_my_bio', { p_bio: inp.value });
      if(error) throw error;
      state.bio = data || null;
      close();
      const el=document.getElementById('meBioText');
      if(el) el.innerHTML = data ? escapeHtml(data) : '<span class="muted">아직 한 줄 소개가 없어요.</span>';
    }catch(e){
      ok.disabled=false; msg.className='he-msg err';
      msg.textContent='저장 실패: '+((e&&e.message)||e);
    }
  };
  ok.onclick=save;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') save(); });
}


/* 쪽지함 접속 표시 — list_inbox의 반환 타입을 바꾸지 않는다(반환 타입 변경은 DROP이 필요해 사고가 잦다).
   members_public 에 이미 last_active_at 이 있으므로 그것만 따로 조회한다. */
let presTimer = null;
async function refreshPresence(){
  const els=[...document.querySelectorAll('[data-pres]')];
  if(!els.length) return;
  const ids=[...new Set(els.map(e=>e.dataset.pres).filter(Boolean))];
  if(!ids.length) return;
  let rows=[];
  try{
    const { data, error } = await sb.from('members_public').select('id,last_active_at').in('id', ids);
    if(error) throw error;
    rows=data||[];
  }catch(e){ return; }                       // 실패 시 조용히(표시만 안 될 뿐)
  const on={};
  rows.forEach(r=>{
    on[r.id] = r.last_active_at &&
      (Date.now() - new Date(r.last_active_at).getTime()) < ONLINE_WINDOW_MS;
  });
  els.forEach(e=>{
    const want = !!on[e.dataset.pres];
    if(e.classList.contains('on') !== want) e.classList.toggle('on', want);   // 바뀔 때만 손댐
  });
}
function startPresence(){
  stopPresence();
  refreshPresence();
  presTimer=setInterval(()=>{ if(!document.hidden) refreshPresence(); }, 20000);
}
function stopPresence(){ if(presTimer){ clearInterval(presTimer); presTimer=null; } }

/* ================== 모바일 하단 탭 바 ==================
   폰(≤768px)에서 상단의 이동 버튼을 아래로 내린다 — 엄지가 닿는 위치 + 쪽지 배지가 항상 보임.
   겹침 방지: body.has-botnav 로 본문 하단 여백 확보(채팅 입력줄이 가려지지 않게),
   팁 창(하단 시트)은 하단 바 위로 띄운다. iPhone safe-area 처리 포함. */
function initBotnav(){
  document.body.classList.add('has-botnav');
  document.querySelectorAll('.bn-item[data-nav]').forEach(b=>{
    b.onclick=()=>{ location.hash = '#' + b.dataset.nav; };
  });
}
/* 현재 화면에 맞춰 활성 탭 표시 */
function setBotnavActive(key){
  const k=String(key||'');
  let act='';
  if(k==='' || k==='home' || k==='main')                 act='home';
  else if(k==='docs')                                     act='docs';
  else if(k==='community')                                act='community';
  else if(k.startsWith('q/'))                             act='questions';
  else if(k==='inbox' || k.startsWith('dm/'))             act='inbox';
  else if(k==='questions')                                act='questions';
  else if(!['me','admin','requests','health','password','trash','directory'].includes(k)
          && !k.startsWith('trash/') && !k.startsWith('member/'))
    act='docs';                                           // 개별 문서 페이지 → '문서'
  document.querySelectorAll('.bn-item[data-nav]').forEach(b=>{
    b.classList.toggle('on', b.dataset.nav===act);
  });
}

/* ================== 참여 넛지 (문서 편집 유도) ==================
   ★알림(쪽지함)으로 쏘지 않는다 — "편집해보세요" 공지가 알림함에 쌓이면 스팸이 되고
     진짜 알림(답변·쪽지)의 신뢰까지 깎는다. 넛지는 '지나가다 보이는 곳'에만 둔다. */
const STUB_LEN = 400;                    // 이보다 짧으면 '도움이 필요한 문서'
const NUDGE_KEY = 'anda_nudge_hide';     // 오늘 하루 숨김

async function fetchDocStats(){
  try{
    const { data, error } = await sb.from('doc_stats').select('key,title,len,updated_at');
    if(error) throw error;
    return data||[];
  }catch(e){ return []; }               // 미배포 시 조용히 생략
}
function nudgeHiddenToday(){
  try{ return localStorage.getItem(NUDGE_KEY) === new Date().toDateString(); }catch(e){ return false; }
}
function hideNudgeToday(){
  try{ localStorage.setItem(NUDGE_KEY, new Date().toDateString()); }catch(e){}
  const n=document.getElementById('nudgeBar'); if(n) n.remove();
}
/* 대문 상단 배너 + '도움이 필요한 문서' 섹션 HTML */
function nudgeHTML(stats){
  if(!state.user) return '';
  const stubs = stats.filter(d=>Number(d.len||0) < STUB_LEN)
                     .sort((a,b)=>Number(a.len||0)-Number(b.len||0));
  let h='';
  if(!nudgeHiddenToday()){
    h += `<div class="nudge" id="nudgeBar">
      <span class="nz-t">${stubs.length
        ? `아직 <b>${stubs.length}개</b>의 문서가 짧아요. 아는 만큼만 이어 써주시면 됩니다.`
        : `오늘 문서 하나 다듬어볼까요? <b>실수해도 역사에서 되돌릴 수 있어요.</b>`}</span>
      ${canEdit()?`<button class="btn ghost" id="nzNew" style="font-size:12px;padding:6px 12px">${ic('plus')} 새 문서</button>`:''}
      <button class="btn ghost" id="nzDocs" style="font-size:12px;padding:6px 12px">문서 전체 보기</button>
      <button class="nz-x" id="nzX" title="오늘은 그만 보기">×</button>
    </div>`;
  }
  if(stubs.length){
    h += `<div class="cats stub-sec">
      <div class="doclist-head">도움이 필요한 문서 <span class="ad-count">(${stubs.length})</span></div>
      <div class="stub-grid">
        ${stubs.slice(0,6).map(d=>`
          <div class="stub-card doc-link" data-key="${escapeAttr(d.key)}">
            <div class="st-t">${escapeHtml(d.title||d.key)}</div>
            <div class="st-m">${Number(d.len)||0}자 · ${Number(d.len)?'더 채워주세요':'아직 비어 있어요'}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }
  return h;
}
function bindNudge(stats){
  const n=document.getElementById('nzNew');   if(n) n.onclick=openNewDocModal;
  const d=document.getElementById('nzDocs');  if(d) d.onclick=()=>{ location.hash='#docs'; };
  const x=document.getElementById('nzX');     if(x) x.onclick=hideNudgeToday;
}

/* ================== 문서 좋아요 · 기여 크레딧 ==================
   좋아요는 1인 1개(취소 가능), 싫어요는 만들지 않는다 — 작은 동아리에서 부정 피드백은
   편집 의욕만 꺾는다. 크레딧은 profiles의 누적 컬럼(33번 리비전 정리와 무관하게 영구). */
let likeCache = null;                       // {key:{cnt,liked}} — 문서 탭 정렬용

async function loadLikeCounts(force){
  if(likeCache && !force) return likeCache;
  const map={};
  try{
    const { data, error } = await sb.rpc('doc_like_counts');
    if(error) throw error;
    (data||[]).forEach(r=>{ map[r.doc_key]={ cnt:Number(r.cnt)||0, liked:!!r.liked }; });
  }catch(e){ /* 미배포 시 조용히 0 */ }
  likeCache=map;
  return map;
}
/* 문서 하단 좋아요 바 */
async function renderLikeBar(key){
  const slot=document.getElementById('likeSlot'); if(!slot) return;
  const map=await loadLikeCounts(true);
  const cur=map[key]||{cnt:0,liked:false};
  const draw=(c)=>{
    slot.innerHTML=`<div class="like-bar">
        <button class="like-btn ${c.liked?'on':''}" id="likeBtn">
          <span class="lh">${ic2(c.liked?'heart-fill':'heart','ic18')}</span><span id="likeCnt">${c.cnt}</span>
        </button>
        <span class="like-hint">${c.cnt?'이 문서가 도움이 됐다면 눌러주세요.':'첫 좋아요를 눌러보세요.'}</span>
      </div>`;
    const b=document.getElementById('likeBtn');
    if(b) b.onclick=async()=>{
      b.disabled=true;
      try{
        const { data, error } = await sb.rpc('toggle_doc_like', { p_key:key });
        if(error) throw error;
        const r=(data&&data[0])||{cnt:c.cnt,liked:!c.liked};
        const nc={ cnt:Number(r.cnt)||0, liked:!!r.liked };
        if(likeCache) likeCache[key]=nc;
        draw(nc);
      }catch(e){ b.disabled=false; }
    };
  };
  draw(cur);
}
/* 회원 크레딧 (문서 N개 · 편집 M회) */
async function fetchCredits(ids){
  const out={};
  if(!ids || !ids.length) return out;
  try{
    const { data, error } = await sb.from('member_credits')
      .select('id,doc_count,edit_count').in('id', ids);
    if(error) throw error;
    (data||[]).forEach(r=>{ out[r.id]={ d:Number(r.doc_count)||0, e:Number(r.edit_count)||0 }; });
  }catch(e){ /* 미배포 시 조용히 생략 */ }
  return out;
}
function creditText(c){
  if(!c || (!c.d && !c.e)) return '';
  const p=[];
  if(c.d) p.push(`문서 <b>${c.d}</b>개 생성`);
  if(c.e) p.push(`<b>${c.e}</b>회 편집`);
  return p.join(' · ');
}
