/* ================== 문서 탭 (#docs) — 문서의 정문 ==================
   전체 문서 카드 + 정렬(최근 수정/가나다·좋아요) + [＋ 새 문서] + 편집 유도 */
const docsPage = { sort: 'recent' };
async function renderDocsPage(){
  $('#doc').innerHTML = `<div class="docs-head"><h1>문서</h1></div><p class="doc-meta">불러오는 중…</p>`;
  let rows=[];
  try{
    const { data, error } = await sb.from('documents')
      .select('key,title,eng,category,updated_at,updated_by');
    if(error) throw error;
    rows=data||[];
  }catch(e){ $('#doc').innerHTML='<h1>문서</h1><p>목록을 불러오지 못했습니다: '+escapeHtml((e&&e.message)||e)+'</p>'; return; }

  // 수정자 이름 (members_public 일괄 조회)
  const likes = await loadLikeCounts(true);
  const stats = await fetchDocStats();                       // 본문 길이(짧은 문서 감지) — 서버에서 숫자만
  const lenOf={}; stats.forEach(d=>{ lenOf[d.key]=Number(d.len)||0; });
  const uids=[...new Set(rows.map(r=>r.updated_by).filter(Boolean))];
  const names={};
  if(uids.length){
    try{
      const { data:ps } = await sb.from('members_public').select('id,handle,name').in('id', uids);
      (ps||[]).forEach(p=>{ names[p.id]=p.handle||p.name||''; });
    }catch(_){}
  }

  const draw=()=>{
    const lc=k=>(likes[k]&&likes[k].cnt)||0;
    const isStub=k=>(lenOf[k]!==undefined && lenOf[k] < STUB_LEN);
    const stubCount=rows.filter(d=>isStub(d.key)).length;
    let sorted=rows.slice();
    if(docsPage.sort==='stub') sorted=sorted.filter(d=>isStub(d.key));
    sorted.sort((a,b)=>{
      if(docsPage.sort==='stub')   return (lenOf[a.key]||0)-(lenOf[b.key]||0);
      if(docsPage.sort==='likes')  return lc(b.key)-lc(a.key) || new Date(b.updated_at||0)-new Date(a.updated_at||0);
      if(docsPage.sort==='abc')    return String(a.title||a.key).localeCompare(String(b.title||b.key),'ko');
      return new Date(b.updated_at||0) - new Date(a.updated_at||0);
    });
    $('#doc').innerHTML = `
      <div class="docs-head">
        <h1>문서 <span class="muted" style="font-size:14px;font-weight:400">${rows.length}개</span></h1>
        <div class="docs-sort">
          <button data-s="recent" class="${docsPage.sort==='recent'?'on':''}">최근 수정</button>
          <button data-s="likes" class="${docsPage.sort==='likes'?'on':''}">좋아요순</button>
          <button data-s="abc" class="${docsPage.sort==='abc'?'on':''}">가나다</button>
          ${stubCount?`<button data-s="stub" class="${docsPage.sort==='stub'?'on':''}">✏ 도움 필요 ${stubCount}</button>`:''}
        </div>
        ${canEdit()?`<button class="btn primary" id="dpNew" style="width:auto;padding:8px 14px">${ic('plus')} 새 문서</button>`:''}
      </div>
      ${(canEdit() && stubCount) ? `<div class="nudge">
        <span class="nz-t">짧은 문서가 <b>${stubCount}개</b> 있어요. 아는 만큼만 이어 써주시면 됩니다 — <b>실수해도 역사에서 되돌릴 수 있어요.</b></span>
        <button class="btn ghost" id="dpStub" style="font-size:12px;padding:6px 12px">${ic('edit')} 도움 필요한 문서 보기</button>
      </div>` : ''}
      ${sorted.length ? '' : '<div class="qb-empty">조건에 맞는 문서가 없습니다.</div>'}
      <div class="docs-grid">
        ${sorted.map(d=>`
          <a class="doc-card ${isStub(d.key)?'stub':''}" href="#${escapeAttr(d.key)}">
            <div class="dc-title">${escapeHtml(d.title||d.key)}</div>
            <div class="dc-key">/${escapeHtml(d.key)}${d.eng?' · '+escapeHtml(d.eng):''}</div>
            <div class="dc-meta">
              ${isStub(d.key)?`<span class="dc-stub">✏ ${lenOf[d.key]||0}자 — 이어 써주세요</span>`
                             :`<span>${escapeHtml(fmtKST(d.updated_at))}</span>${names[d.updated_by]?`<span>· ${escapeHtml(names[d.updated_by])}</span>`:''}`}
              ${lc(d.key)?`<span class="dc-like">❤ ${lc(d.key)}</span>`:''}
              ${(d.category||[]).slice(0,2).map(c=>`<span class="dc-cat">${escapeHtml(c)}</span>`).join('')}
              ${canEdit()?`<button class="dc-edit" data-edit="${escapeAttr(d.key)}">편집</button>`:''}
            </div>
          </a>`).join('')}
      </div>`;
    $('#doc').querySelectorAll('.docs-sort button').forEach(b=>{
      b.onclick=()=>{ docsPage.sort=b.dataset.s; draw(); };
    });
    const nw=$('#dpNew'); if(nw) nw.onclick=openNewDocModal;
    const st=$('#dpStub'); if(st) st.onclick=()=>{ docsPage.sort='stub'; draw(); };
    $('#doc').querySelectorAll('[data-edit]').forEach(b=>{
      b.onclick=e=>{ e.preventDefault(); e.stopPropagation();
        state.pendingEdit=b.dataset.edit;          // 문서를 연 뒤 바로 편집기로
        location.hash='#'+b.dataset.edit; };
    });
    window.scrollTo(0,0);
  };
  draw();
}

async function loadDocs(){
  const { data, error } = await sb.from('documents').select('key,title');
  if(error){ $('#doc').innerHTML='<p>문서 목록을 불러오지 못했습니다: '+escapeHtml(error.message)+'</p>'; return; }
  const rank = k => { const i=ORDER.indexOf(k); return i<0 ? 999 : i; };
  state.docs = (data||[]).sort((a,b)=> rank(a.key)-rank(b.key) || a.key.localeCompare(b.key));
  buildNav();
}
function buildNav(active){
  const nav=$('#nav'); if(!nav) return;   // 좌측 문서 목록 제거됨 → 호출돼도 안전하게 무시
  nav.innerHTML =
    `<a data-key="main" class="${active==='main'?'active':''}">🏠 대문</a>` +
    state.docs.map(d =>
      `<a data-key="${d.key}" class="${d.key===active?'active':''}">${escapeHtml(d.title||d.key)}</a>`).join('');
  $('#nav').querySelectorAll('a').forEach(a=>a.onclick=()=>{ location.hash='#'+a.dataset.key; });
}

      + (info.sub?`<div class="ib-sub">${escapeHtml(info.sub)}</div>`:'')
      + `<table>${rows}</table></aside>`;
  }
  const tabs = [];
  if(canEdit()) tabs.push(`<button id="editBtn">${ic('edit')}편집</button>`);
  tabs.push(`<button id="histBtn">${ic('history')}역사</button>`);
  if(isAdmin()) tabs.push(`<button id="delBtn" class="danger">${ic('trash')}삭제</button>`);

  $('#doc').innerHTML = `
    <div class="doc-head"><h1>${escapeHtml(doc.title||'')}</h1>
      <div class="tabs">${tabs.join('')}</div></div>
    <div class="doc-meta">${escapeHtml(doc.eng||'')} · 최근 수정: ${fmtKST(doc.updated_at)}${
      (String(doc.body||'').length < STUB_LEN && canEdit())
        ? `<span class="stub-badge">${ic('edit')} 아직 짧은 문서예요 — 이어 써주세요</span>` : ''}</div>
    <div id="likeSlot"></div>
    ${doc.notice?`<div class="notice">${doc.notice}</div>`:''}
    ${infoboxHtml}
    <div class="toc-slot"></div>
    <div class="doc-body">${renderDocBody(doc)}</div>
    <div class="footnotes-slot"></div>
    ${cat?`<div class="category"><b>분류:</b> ${cat.map(c=>`<a class="new">${escapeHtml(c)}</a>`).join(' | ')}</div>`:''}
  `;
  buildToc(); buildFootnotes(); buildNav(key);
  renderMath($('#doc').querySelector('.doc-body'));    // 문서 본문의 $수식$ 렌더 (기존엔 누락돼 있었음)
  renderLikeBar(key);
  if(state.pendingEdit===key){                       // 문서 탭의 [편집] 버튼으로 들어온 경우
    state.pendingEdit=null;
    if(canEdit()) { enterEdit(doc); return; }
  }
  if(canEdit()) $('#editBtn').onclick=()=>enterEdit(doc);
  $('#histBtn').onclick=()=>showHistory(key);
  if(isAdmin()) $('#delBtn').onclick=()=>deleteDoc(doc);
  renderRightRail(await fetchRecent());
  window.scrollTo(0,0);
}

/* 목차/각주 (wiki.html과 동일 로직) */
function buildToc(){
  const body=$('#doc').querySelector('.doc-body'); if(!body) return;
  const heads=body.querySelectorAll('h2,h3,h4'); let c2=0,c3=0,c4=0; const items=[];
  heads.forEach(h=>{
    let num='';
    if(h.tagName==='H2'){c2++;c3=0;c4=0;num=`${c2}`;}
    else if(h.tagName==='H3'){c3++;c4=0;num=`${c2}.${c3}`;}
    else{c4++;num=`${c2}.${c3}.${c4}`;}
    const id='sec-'+num.replace(/\./g,'-'); h.id=id;
    const t=h.textContent;
    h.innerHTML=`<span class="sec-num">${num}.</span>${t}`+(h.tagName==='H2'?`<span class="fold">［접기］</span>`:'');
    items.push({level:h.tagName,num,id,text:t});
  });
  if(items.length){
    const lis=items.map(it=>{const cls=it.level==='H3'?'l3':it.level==='H4'?'l4':'';
      return `<li class="${cls}"><a data-target="${it.id}"><span class="n">${it.num}.</span>${it.text}</a></li>`;}).join('');
    $('#doc').querySelector('.toc-slot').innerHTML=`<div class="toc"><div class="toc-title">목차</div><ul>${lis}</ul></div>`;
  }
  $('#doc').querySelectorAll('.toc a').forEach(a=>a.onclick=e=>{e.preventDefault();
    const t=document.getElementById(a.dataset.target); if(t)t.scrollIntoView({behavior:'smooth',block:'start'});});
  body.querySelectorAll('h2').forEach(h=>h.addEventListener('click',()=>{
    let el=h.nextElementSibling; const col=h.classList.toggle('is-collapsed');
    const f=h.querySelector('.fold'); if(f)f.textContent=col?'［펼치기］':'［접기］';
    while(el&&el.tagName!=='H2'){el.classList.toggle('collapsed',col);el=el.nextElementSibling;}
  }));
}
function buildFootnotes(){
  const fns=$('#doc').querySelectorAll('.doc-body .fn'); if(!fns.length) return;
  const list=[];
  fns.forEach((fn,i)=>{const n=i+1,note=fn.dataset.note||'';
    const m=document.createElement('sup');m.className='fn-mark';m.textContent=`[${n}]`;m.dataset.note=note;
    fn.after(m); list.push(`<div class="fn-item" id="fn-${n}"><b>[${n}]</b>${note}</div>`);});
  $('#doc').querySelector('.footnotes-slot').innerHTML=`<div class="footnotes"><b>각주</b>${list.join('')}</div>`;
}

/* ================== 편집 ================== */

/* ================== 안다 문법 (문서 편집 v2) ==================
   원칙: 파서가 '허용된 태그만' 생성하므로 XSS가 구조적으로 불가능(정화 라이브러리 불필요).
   ## 제목  ### 소제목  **굵게** *기울임* ~~취소~~  - 목록  1. 번호  > 인용
   | 표 | 셀 |   [글자](주소)   ![설명](사진주소)   [[용어|각주 설명]]   $수식$        */
/* WIKI-PARSER-BEGIN */
/* 이미지 옵션: {w=60, align=right}  — 크기(%)와 정렬(left/center/right)을 문법에 담는다.
   ★본문(마크다운)이 항상 원본(source of truth). 미리보기에서 드래그하면 이 문법이 자동으로 고쳐진다.
   → 리비전·HTML변환 체계가 그대로 유지되고, 절대좌표가 아니라 '띄우기'라서 휴대폰에서도 안 깨진다. */
let _imgN = 0;
const IMG_ALIGNS = ['left','center','right'];
function parseImgOpt(opt){
  const o = { w:100, align:'center' };
  if(!opt) return o;
  String(opt).split(',').forEach(kv=>{
    const m=kv.split('=');
    if(m.length!==2) return;
    const k=m[0].trim().toLowerCase(), v=m[1].trim().toLowerCase();
    if(k==='w'){ const n=parseInt(v,10); if(!isNaN(n)) o.w=Math.max(10, Math.min(100, n)); }
    else if(k==='align' && IMG_ALIGNS.includes(v)) o.align=v;
  });
  return o;
}
function imgOptStr(o){
  if(o.w>=100 && o.align==='center') return '';       // 기본값이면 문법을 지저분하게 하지 않는다
  return '{w='+Math.round(o.w)+', align='+o.align+'}';
}

function wEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function wAttr(s){ return String(s).replace(/"/g,'&quot;'); }
function wUrl(u){
  u=String(u||'').trim().replace(/"/g,'%22').replace(/'/g,'%27');
  if(/^data:/i.test(u)) return '#';                       // base64 본문 삽입 금지(용량 재앙 방지)
  return /^(https?:\/\/|#|\/)/i.test(u) ? u : '#';        // javascript: 등 차단
}
function wInline(s){
  s=s.replace(/\[\[([^|\[\]]+)\|([^\[\]]+)\]\]/g,(m,t,n)=>'<span class="fn" data-note="'+wAttr(n.trim())+'">'+t.trim()+'</span>');
  s=s.replace(/\[\[각주:\s*([^\[\]]+)\]\]/g,(m,n)=>'<span class="fn" data-note="'+wAttr(n.trim())+'">※</span>');
  s=s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)(?:\{([^}]*)\})?/g,(m,a,u,opt)=>{
    const o=parseImgOpt(opt);
    const cls='doc-img al-'+o.align;
    const st=(o.w && o.w<100) ? ' style="width:'+o.w+'%"' : '';
    return '<img class="'+cls+'" data-i="'+(_imgN++)+'" loading="lazy" alt="'+wAttr(a)+'" src="'+wUrl(u)+'"'+st+'>';
  });
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,(m,t,u)=>{
    const url=wUrl(u); const ext=/^https?:/i.test(url);
    return '<a href="'+url+'"'+(ext?' target="_blank" rel="noopener"':'')+'>'+t+'</a>';
  });
  s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  s=s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<i>$2</i>');
  s=s.replace(/~~([^~]+)~~/g,'<s>$1</s>');
  return s;
}
function wTable(rows){
  const cells=r=>r.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>wInline(c.trim()));
  const body=rows.slice(); const head=cells(body.shift());
  if(body.length && /^[\s|:\-]+$/.test(body[0])) body.shift();     // |---|---| 구분줄은 생략 가능
  let h='<table class="wk-table"><tr>'+head.map(c=>'<th>'+c+'</th>').join('')+'</tr>';
  body.forEach(r=>{ h+='<tr>'+cells(r).map(c=>'<td>'+c+'</td>').join('')+'</tr>'; });
  return h+'</table>';
}
function wikiToHtml(src){
  _imgN = 0;
  // 1) 수식 보호: 파싱 전에 빼두고 마지막에 복원 — *·_ 가 수식을 망가뜨리는 것을 방지
  const math=[];
  src=String(src||'').replace(/\$\$[\s\S]+?\$\$|\$[^$\n]+\$/g, m=>{ math.push(m); return '\uE000'+(math.length-1)+'\uE001'; });
  // 2) 전부 이스케이프 → 이후 파서가 만든 태그만 존재
  src=wEsc(src);
  const lines=src.split(/\r?\n/);
  const out=[]; let i=0, list=null, para=[];
  const endPara=()=>{ if(para.length){ out.push('<p>'+para.map(wInline).join('<br>')+'</p>'); para=[]; } };
  const endList=()=>{ if(list){ out.push('</'+list+'>'); list=null; } };
  while(i<lines.length){
    const L=lines[i]; let m;
    if(/^\s*$/.test(L)){ endPara(); endList(); i++; continue; }
    if(m=L.match(/^###\s+(.+)/)){ endPara(); endList(); out.push('<h3>'+wInline(m[1])+'</h3>'); i++; continue; }
    if(m=L.match(/^##\s+(.+)/)){ endPara(); endList(); out.push('<h2>'+wInline(m[1])+'</h2>'); i++; continue; }
    if(/^---+\s*$/.test(L)){ endPara(); endList(); out.push('<hr>'); i++; continue; }
    if(/^&gt;/.test(L)){ endPara(); endList(); const q=[];
      while(i<lines.length && /^&gt;/.test(lines[i])){ q.push(lines[i].replace(/^&gt;\s?/,'')); i++; }
      out.push('<blockquote>'+q.map(wInline).join('<br>')+'</blockquote>'); continue; }
    if(m=L.match(/^-\s+(.+)/)){ endPara(); if(list!=='ul'){ endList(); out.push('<ul>'); list='ul'; } out.push('<li>'+wInline(m[1])+'</li>'); i++; continue; }
    if(m=L.match(/^\d+[.)]\s+(.+)/)){ endPara(); if(list!=='ol'){ endList(); out.push('<ol>'); list='ol'; } out.push('<li>'+wInline(m[1])+'</li>'); i++; continue; }
    if(/^\|.*\|\s*$/.test(L)){ endPara(); endList(); const rows=[];
      while(i<lines.length && /^\|.*\|\s*$/.test(lines[i])){ rows.push(lines[i]); i++; }
      out.push(wTable(rows)); continue; }
    para.push(L); i++;
  }
  endPara(); endList();
  // 3) 수식 복원(이스케이프해서 — 수식 안 <script> 시도까지 차단). KaTeX는 텍스트 노드를 읽으므로 정상 렌더.
  return out.join('\n').replace(/\uE000(\d+)\uE001/g,(m,k)=>wEsc(math[+k]));
}
/* WIKI-PARSER-END */

/* 문서 렌더 분기: 안전망 — 위키 문서인데 본문이 명백히 HTML(옛 리비전 롤백 등)이면 HTML로 렌더 */
function looksLikeHtmlBody(b){ return /^\s*<(h[1-6]|p|div|table|ul|ol|aside|blockquote|section|b|i|span|img|a)\b/i.test(String(b||'')); }
function renderDocBody(doc){
  const wiki = (doc.format==='wiki') && !looksLikeHtmlBody(doc.body);
  return wiki ? wikiToHtml(doc.body||'') : (doc.body||'');
}

/* HTML → 안다 문법 최선 변환 ("차차 변환" 방침용). 결과는 반드시 미리보기로 확인 후 저장. */
function htmlToWiki(html){
  let s=String(html||'').replace(/\r/g,'');
  const strip=t=>String(t).replace(/<[^>]+>/g,'').trim();
  s=s.replace(/<table[^>]*>([\s\S]*?)<\/table>/gi,(m,inner)=>{
    const rows=[...inner.matchAll(/<tr[^>]*>([\s\S]*?)<\/tr>/gi)].map(r=>{
      const cs=[...r[1].matchAll(/<t[hd][^>]*>([\s\S]*?)<\/t[hd]>/gi)].map(c=>strip(c[1]));
      return '| '+cs.join(' | ')+' |';
    });
    return '\n'+rows.join('\n')+'\n';
  });
  s=s.replace(/<h2[^>]*>([\s\S]*?)<\/h2>/gi,(m,t)=>'\n## '+strip(t)+'\n');
  s=s.replace(/<h3[^>]*>([\s\S]*?)<\/h3>/gi,(m,t)=>'\n### '+strip(t)+'\n');
  s=s.replace(/<span[^>]*data-note="([^"]*)"[^>]*>([\s\S]*?)<\/span>/gi,(m,n,t)=>'[['+strip(t)+'|'+n+']]');
  s=s.replace(/<(b|strong)[^>]*>([\s\S]*?)<\/\1>/gi,(m,x,t)=>'**'+strip(t)+'**');
  s=s.replace(/<(i|em)[^>]*>([\s\S]*?)<\/\1>/gi,(m,x,t)=>'*'+strip(t)+'*');
  s=s.replace(/<ol[^>]*>([\s\S]*?)<\/ol>/gi,(m,inner)=>{ let n=0; return '\n'+inner.replace(/<li[^>]*>([\s\S]*?)<\/li>/gi,(mm,t)=>(++n)+'. '+strip(t)+'\n')+'\n'; });
  s=s.replace(/<ul[^>]*>([\s\S]*?)<\/ul>/gi,(m,inner)=>'\n'+inner.replace(/<li[^>]*>([\s\S]*?)<\/li>/gi,(mm,t)=>'- '+strip(t)+'\n')+'\n');
  s=s.replace(/<blockquote[^>]*>([\s\S]*?)<\/blockquote>/gi,(m,t)=>'\n> '+strip(t).split('\n').join('\n> ')+'\n');
  s=s.replace(/<img([^>]*)src="([^"]*)"([^>]*)>/gi,(m,pre,u,post)=>{
    const all=pre+post;
    const wm=all.match(/width\s*:\s*(\d+)%/i) || all.match(/width\s*=\s*"?(\d+)%/i);
    const fl=all.match(/float\s*:\s*(left|right)/i);
    const o={ w: wm?Math.max(10,Math.min(100,parseInt(wm[1],10))):100, align: fl?fl[1].toLowerCase():'center' };
    return '![]('+u+')'+imgOptStr(o);
  });
  s=s.replace(/<a[^>]*href="([^"]*)"[^>]*>([\s\S]*?)<\/a>/gi,(m,u,t)=>'['+strip(t)+']('+u+')');
  s=s.replace(/<br\s*\/?>/gi,'\n');
  s=s.replace(/<\/p>\s*/gi,'\n\n').replace(/<p[^>]*>/gi,'');
  s=s.replace(/<\/?div[^>]*>/gi,'\n');
  s=s.replace(/<[^>]+>/g,'');
  s=s.replace(/&nbsp;/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&amp;/g,'&');
  return s.replace(/\n{3,}/g,'\n\n').trim();
}






/* ── 문서 사진 업로드 ─────────────────────────────────────────
   압축(1600px/150KB) → doc-images 업로드 → 본문에 ![](URL) 삽입.
   경로 3가지: 📷 버튼 · 드래그&드롭 · Ctrl+V 붙여넣기(스크린샷)
   ★본문에는 URL만 들어간다. base64를 넣으면 리비전이 편집마다 사진을 복사해 10년 78GB. */
const DOC_IMG_DIM = 1600;
const DOC_IMG_TARGET = 150*1024;

function wkUpMsg(t, err){
  const el=$('#wkUpMsg'); if(!el) return;
  el.className='wk-upmsg'+(err?' err':''); el.textContent=t||'';
}
async function wkUploadImages(files){
  const ta=$('#e-body'); if(!ta || !state.user) return;
  const imgs=[...files].filter(f=>/^image\//.test(f.type||''));
  if(!imgs.length) return;

  for(const f of imgs){
    if(f.size > IMG_RAW_MAX){ wkUpMsg('25MB 이하 이미지만 올릴 수 있어요.', true); continue; }
    const token = '![업로드 중…](uploading-'+Date.now()+'-'+Math.random().toString(36).slice(2,7)+')';
    const st=ta.selectionStart;
    ta.setRangeText('\n'+token+'\n', st, ta.selectionEnd, 'end');
    wkRenderPreview();
    try{
      wkUpMsg('압축 중…');
      const out = await compressImage(f, { mode:'contain', dim:DOC_IMG_DIM, target:DOC_IMG_TARGET, minQuality:0.45 });
      wkUpMsg(`업로드 중… (${(out.blob.size/1024).toFixed(0)}KB)`);
      const ext = out.type==='image/webp' ? 'webp' : 'jpg';
      const path = `${state.user.id}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
      const up = await sb.storage.from('doc-images')
        .upload(path, out.blob, { contentType: out.type, cacheControl:'31536000', upsert:false });
      if(up.error) throw up.error;
      const pub = sb.storage.from('doc-images').getPublicUrl(path);
      const alt = (f.name||'사진').replace(/\.[^.]+$/,'').replace(/[\[\]()]/g,'').slice(0,40);
      ta.value = ta.value.replace(token, `![${alt}](${pub.data.publicUrl})`);
      wkUpMsg(`올렸어요 · ${(out.blob.size/1024).toFixed(0)}KB`);
    }catch(e){
      ta.value = ta.value.replace(token, '');
      wkUpMsg('업로드 실패: '+((e&&e.message)||e), true);
    }
    wkRenderPreview(); wkAutosave(state.key);
  }
}
function wkPickImage(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.multiple=true;
  inp.onchange=()=>{ wkUploadImages(inp.files||[]); };
  inp.click();
}
function wkBindImageDrop(){
  const ta=$('#e-body'), split=$('#wkSplit'); if(!ta) return;
  ['dragenter','dragover'].forEach(ev=>ta.addEventListener(ev, e=>{
    if(e.dataTransfer && [...e.dataTransfer.types].includes('Files')){ e.preventDefault(); split.classList.add('drag'); }
  }));
  ['dragleave','drop'].forEach(ev=>ta.addEventListener(ev, ()=>split.classList.remove('drag')));
  ta.addEventListener('drop', e=>{
    const fs=e.dataTransfer && e.dataTransfer.files;
    if(fs && fs.length){ e.preventDefault(); wkUploadImages(fs); }
  });
  ta.addEventListener('paste', e=>{
    const items=(e.clipboardData && e.clipboardData.items) || [];
    const files=[...items].filter(i=>i.kind==='file' && /^image\//.test(i.type)).map(i=>i.getAsFile()).filter(Boolean);
    if(files.length){ e.preventDefault(); wkUploadImages(files); }
  });
}

/* ================== 정보 틀(인포박스) 폼 ==================
   예전엔 raw JSON textarea 였다(쉼표 하나 틀리면 저장 실패).
   이제 '항목명 | 값' 행을 버튼으로 추가/삭제하고, JSON은 뒤에서 자동 생성한다. */
function INFOBOX_FORM_HTML(info){
  const rows = (info && Array.isArray(info.rows) && info.rows.length) ? info.rows : [['',''],['','']];
  return `<details class="adv" open><summary>정보 틀 (문서 오른쪽 위 요약 상자)</summary>
    <div class="ib-form">
      <div class="ib-top2">
        <div><label style="margin-top:0">상자 제목</label>
          <input id="ib-title" value="${escapeAttr((info&&info.title)||'')}" placeholder="예: 안다미로"></div>
        <div><label style="margin-top:0">부제 <span class="hint">(선택)</span></label>
          <input id="ib-sub" value="${escapeAttr((info&&info.sub)||'')}" placeholder="예: 경기북과학고 물리 동아리"></div>
      </div>
      <div class="ib-hd"><span>항목명</span><span>값</span><span></span></div>
      <div id="ibRows">${rows.map(r=>ibRowHTML(r[0],r[1])).join('')}</div>
      <button type="button" class="ib-add" id="ibAdd">${ic('plus')} 항목 추가</button>
    </div>
  </details>`;
}
function ibRowHTML(k,v){
  return `<div class="ib-row">
    <input class="ib-k" value="${escapeAttr(k||'')}" placeholder="예: 창립">
    <input class="ib-v" value="${escapeAttr(v||'')}" placeholder="예: 2016년">
    <button type="button" class="ib-x" title="이 행 삭제">×</button>
  </div>`;
}
function bindInfoboxForm(){
  const box=$('#ibRows'); if(!box) return;
  const bindX=()=>box.querySelectorAll('.ib-x').forEach(b=>{ b.onclick=()=>{ b.closest('.ib-row').remove(); }; });
  bindX();
  const add=$('#ibAdd');
  if(add) add.onclick=()=>{
    box.insertAdjacentHTML('beforeend', ibRowHTML('',''));
    bindX();
    const last=box.lastElementChild; if(last) last.querySelector('.ib-k').focus();
  };
}
/* 폼 → JSON. 빈 행은 버리고, 전부 비면 null(인포박스 없음). */
function collectInfobox(){
  const box=$('#ibRows');
  if(!box){                                       // 폼이 없으면 옛 JSON textarea 폴백
    const el=$('#e-info'); const raw=el?el.value.trim():'';
    if(!raw) return null;
    try{ return JSON.parse(raw); }catch(e){ throw new Error('정보 틀 JSON 형식 오류: '+e.message); }
  }
  const title=($('#ib-title').value||'').trim();
  const sub=($('#ib-sub').value||'').trim();
  const rows=[...box.querySelectorAll('.ib-row')]
    .map(r=>[ (r.querySelector('.ib-k').value||'').trim(), (r.querySelector('.ib-v').value||'').trim() ])
    .filter(r=>r[0]!=='' || r[1]!=='');
  if(!title && !sub && !rows.length) return null;
  return { title, sub, rows };
}

const TIPWIN_KEY='anda_tipwin';
function tipWinDefault(){
  const split=$('#wkSplit');                       // 처음엔 '편집창 오른쪽'에
  const r = split ? split.getBoundingClientRect() : { right:window.innerWidth-40, top:120 };
  const w = Math.min(430, Math.max(300, window.innerWidth - r.right - 24));
  return { x: Math.max(8, Math.min(window.innerWidth-w-8, r.right - w)),
           y: Math.max(60, r.top), w, h: Math.min(560, window.innerHeight-140) };
}
function tipWinLoad(){
  try{ const v=JSON.parse(localStorage.getItem(TIPWIN_KEY)||'null'); if(v && v.w>200) return v; }catch(e){}
  return tipWinDefault();
}
function tipWinSave(p){ try{ localStorage.setItem(TIPWIN_KEY, JSON.stringify(p)); }catch(e){} }
function closeTipWin(){
  const w=document.getElementById('tipWin'); if(w) w.remove();
  const b=document.getElementById('wkTipBtn'); if(b) b.classList.remove('on');
}
function toggleTipPane(){
  if(document.getElementById('tipWin')){ closeTipWin(); return; }
  const btn=$('#wkTipBtn'); if(btn) btn.classList.add('on');

  let p=tipWinLoad();
  if(p.x>window.innerWidth-80 || p.y>window.innerHeight-60 || p.x<0 || p.y<0) p=tipWinDefault();

  const win=document.createElement('div');
  win.className='tipwin'; win.id='tipWin';
  win.style.left=p.x+'px'; win.style.top=p.y+'px';
  win.style.width=p.w+'px'; win.style.height=p.h+'px';
  win.innerHTML=`
    <div class="tipwin-hd" id="tipWinHd">
      <b>${ic2('book','ic16')} 문서 작성 팁</b><span class="sp">버튼만 눌러도 작성됩니다</span>
      <button class="tipwin-x" id="tipWinX" title="닫기">×</button>
    </div>
    <div class="tipwin-body" id="tipWinBody">${tipPaneHTML()}</div>
    <div class="tipwin-rz" id="tipWinRz" title="크기 조절"></div>`;
  document.body.appendChild(win);
  $('#tipWinX').onclick=closeTipWin;
  renderMath($('#tipWinBody'));

  const save=()=>tipWinSave({ x:win.offsetLeft, y:win.offsetTop, w:win.offsetWidth, h:win.offsetHeight });

  // 드래그 이동 (상단바)
  const hd=$('#tipWinHd');
  hd.addEventListener('pointerdown', e=>{
    if(e.target.id==='tipWinX' || window.innerWidth<=760) return;   // 폰은 하단 시트 고정
    const sx=e.clientX, sy=e.clientY, ox=win.offsetLeft, oy=win.offsetTop;
    win.classList.add('dragging'); hd.setPointerCapture(e.pointerId);
    const mv=ev=>{
      win.style.left=Math.max(0, Math.min(window.innerWidth-win.offsetWidth, ox+ev.clientX-sx))+'px';
      win.style.top =Math.max(0, Math.min(window.innerHeight-40,             oy+ev.clientY-sy))+'px';
    };
    const up=()=>{ win.classList.remove('dragging');
      hd.removeEventListener('pointermove',mv); hd.removeEventListener('pointerup',up); save(); };
    hd.addEventListener('pointermove',mv); hd.addEventListener('pointerup',up);
  });

  // 크기 조절 (우하단 모서리)
  const rz=$('#tipWinRz');
  rz.addEventListener('pointerdown', e=>{
    e.preventDefault(); e.stopPropagation();
    const sx=e.clientX, sy=e.clientY, ow=win.offsetWidth, oh=win.offsetHeight;
    rz.setPointerCapture(e.pointerId);
    const mv=ev=>{
      win.style.width =Math.max(280, Math.min(window.innerWidth -win.offsetLeft-8, ow+ev.clientX-sx))+'px';
      win.style.height=Math.max(160, Math.min(window.innerHeight-win.offsetTop -8, oh+ev.clientY-sy))+'px';
    };
    const up=()=>{ rz.removeEventListener('pointermove',mv); rz.removeEventListener('pointerup',up); save(); };
    rz.addEventListener('pointermove',mv); rz.addEventListener('pointerup',up);
  });
}


/* ================== 문서 이미지 조작 (미리보기에서 직접) ==================
   미리보기의 이미지를 클릭 → 선택 → 모서리 드래그로 크기, 툴바로 정렬·이동·삭제.
   ★모든 조작은 본문(마크다운)의 {w=..,align=..} 를 고쳐 쓴다 = 본문이 항상 원본.
     절대좌표가 아니라 '띄우기(float)'라서 휴대폰에서 글자와 겹치지 않는다. */
const IMG_MD_RE = () => /!\[([^\]]*)\]\(([^)\s]+)\)(?:\{([^}]*)\})?/g;
let wkSel = null;                       // 선택된 이미지 인덱스

/* 본문의 모든 이미지 토큰을 순회하며 치환 */
function eachImgToken(fn){
  const ta=$('#e-body'); if(!ta) return;
  let n=0;
  ta.value = ta.value.replace(IMG_MD_RE(), (m,a,u,opt)=>fn(n++, a, u, opt, m));
  wkRenderPreview(); wkAutosave(state.key);
}
function currentImgOpt(idx){
  const ta=$('#e-body'); if(!ta) return { w:100, align:'center' };
  let n=0, out={ w:100, align:'center' }, m;
  const re=IMG_MD_RE();
  while((m=re.exec(ta.value))!==null){ if(n++===idx){ out=parseImgOpt(m[3]); break; } }
  return out;
}
function updateImgOpt(idx, patch){
  eachImgToken((i,a,u,opt,m)=>{
    if(i!==idx) return m;
    const o=Object.assign(parseImgOpt(opt), patch);
    return `![${a}](${u})${imgOptStr(o)}`;
  });
}
function deleteImg(idx){
  wkSel=null;
  eachImgToken((i,a,u,opt,m)=> i===idx ? '' : m);
}

/* 이미지가 들어있는 줄 번호 찾기 */
function findImgLine(lines, idx){
  let n=0;
  for(let i=0;i<lines.length;i++){
    const re=IMG_MD_RE(); let c=0;
    while(re.exec(lines[i])!==null) c++;
    if(idx < n+c) return i;
    n+=c;
  }
  return -1;
}
/* 문단 사이로 이동 (dir=-1 위 / +1 아래) */
function moveImgBlock(idx, dir){
  const ta=$('#e-body'); if(!ta) return;
  const lines=ta.value.split('\n');
  const li=findImgLine(lines, idx); if(li<0) return;
  const line=lines[li];
  const one=/!\[[^\]]*\]\([^)\s]+\)(?:\{[^}]*\})?/;
  const tok=(line.match(one)||[])[0];
  if(!tok) return;

  // 문단 안에 글과 섞여 있으면 → 먼저 독립된 줄로 빼낸다
  if(line.replace(one,'').trim() !== ''){
    const rest=line.replace(one,'').trim();
    lines.splice(li, 1, ...(dir<0 ? [tok, rest] : [rest, tok]));
    ta.value=lines.join('\n'); wkRenderPreview(); wkAutosave(state.key); return;
  }

  lines.splice(li,1);                       // 이미지 줄 떼어내기
  let t;
  if(dir<0){
    t=li-1;
    while(t>=0 && lines[t].trim()==='') t--;             // 빈 줄 건너뛰고
    while(t>=0 && lines[t].trim()!=='') t--;             // 앞 블록의 시작까지
    t=Math.max(0, t+1);
  }else{
    t=li;
    while(t<lines.length && lines[t].trim()==='') t++;   // 빈 줄 건너뛰고
    while(t<lines.length && lines[t].trim()!=='') t++;   // 뒤 블록의 끝까지
    t=Math.min(lines.length, t);
  }
  lines.splice(t, 0, line);
  ta.value=lines.join('\n');
  wkRenderPreview(); wkAutosave(state.key);
}

/* 선택 해제 */
function wkClearImgSel(){
  wkSel=null;
  const p=$('#wkPrev'); if(!p) return;
  p.querySelectorAll('.doc-img.sel').forEach(i=>i.classList.remove('sel'));
  p.querySelectorAll('.img-handle,.img-tools').forEach(e=>e.remove());
}
/* 선택 + 툴바·핸들 배치 */
function wkSelectImg(idx){
  const p=$('#wkPrev'); if(!p) return;
  const img=p.querySelector('.doc-img[data-i="'+idx+'"]');
  wkClearImgSel();
  if(!img) return;
  wkSel=idx; img.classList.add('sel');
  const o=currentImgOpt(idx);

  const tb=document.createElement('div'); tb.className='img-tools';
  tb.innerHTML=
    `<button data-a="left"   class="${o.align==='left'?'on':''}"   title="왼쪽에 띄우기(글이 옆으로 흐름)">◧</button>`+
    `<button data-a="center" class="${o.align==='center'?'on':''}" title="가운데">▣</button>`+
    `<button data-a="right"  class="${o.align==='right'?'on':''}"  title="오른쪽에 띄우기(글이 옆으로 흐름)">◨</button>`+
    `<span class="sep"></span>`+
    `<button data-w="30">작게</button><button data-w="50">보통</button>`+
    `<button data-w="75">크게</button><button data-w="100">전체</button>`+
    `<span class="wlab">${o.w}%</span>`+
    `<span class="sep"></span>`+
    `<button data-m="-1" title="위 문단으로">↑</button><button data-m="1" title="아래 문단으로">↓</button>`+
    `<button data-del="1" class="del" title="삭제">${ic('trash')}</button>`;
  p.appendChild(tb);

  const hd=document.createElement('div'); hd.className='img-handle'; hd.title='끌어서 크기 조절';
  p.appendChild(hd);

  const place=()=>{
    tb.style.left = Math.max(2, Math.min(p.clientWidth - tb.offsetWidth - 2, img.offsetLeft)) + 'px';
    tb.style.top  = Math.max(2, img.offsetTop - tb.offsetHeight - 6) + 'px';
    hd.style.left = (img.offsetLeft + img.offsetWidth  - 7) + 'px';
    hd.style.top  = (img.offsetTop  + img.offsetHeight - 7) + 'px';
  };
  place();
  if(!img.complete) img.addEventListener('load', place, { once:true });

  tb.querySelectorAll('[data-a]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); updateImgOpt(idx,{ align:b.dataset.a }); });
  tb.querySelectorAll('[data-w]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); updateImgOpt(idx,{ w:+b.dataset.w }); });
  tb.querySelectorAll('[data-m]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); moveImgBlock(idx, +b.dataset.m); });
  tb.querySelector('[data-del]').onclick=e=>{ e.stopPropagation(); deleteImg(idx); };

  // 모서리 드래그 → 폭(%) 변경. 드래그 중엔 미리보기만 갱신하고, 놓을 때 본문에 확정.
  hd.addEventListener('pointerdown', e=>{
    e.preventDefault(); e.stopPropagation();
    const sx=e.clientX, ow=img.offsetWidth, cw=p.clientWidth||1;
    hd.setPointerCapture(e.pointerId);
    let pct=o.w;
    const mv=ev=>{
      pct = Math.max(10, Math.min(100, Math.round((ow + (ev.clientX - sx)) / cw * 100)));
      img.style.width = pct + '%';
      const lab=tb.querySelector('.wlab'); if(lab) lab.textContent = pct + '%';
      place();
    };
    const up=()=>{
      hd.removeEventListener('pointermove', mv); hd.removeEventListener('pointerup', up);
      updateImgOpt(idx, { w:pct });        // 본문 문법에 확정 → 리비전에 남는다
    };
    hd.addEventListener('pointermove', mv); hd.addEventListener('pointerup', up);
  });
}
/* 미리보기 클릭: 이미지면 선택, 빈 곳이면 해제 */

  $('#wkTipBtn').onclick=toggleTipPane;

  $('#wkTabE').onclick=()=>{ $('#wkSplit').classList.remove('prev-mode'); $('#wkTabE').classList.add('on'); $('#wkTabP').classList.remove('on'); };
  $('#wkTabP').onclick=()=>{ $('#wkSplit').classList.add('prev-mode'); $('#wkTabP').classList.add('on'); $('#wkTabE').classList.remove('on'); wkRenderPreview(); };
  const ta=$('#e-body');
  ta.addEventListener('input', ()=>{ wkRenderPreview(); wkAutosave(doc.key); });
  $('#cancelBtn').onclick=()=>renderDoc(doc.key);
  $('#saveBtn').onclick=()=>saveDoc(doc.key);
  // 임시저장 복구: 저장 없이 닫혔던 초안이 문서보다 최신이면 제안
  if(!opts.converted){
    let d=null; try{ d=JSON.parse(localStorage.getItem(wkDraftKey(doc.key))||'null'); }catch(e){}
    if(d && d.body && d.body!==(doc.body||'') && d.ts > new Date(doc.updated_at||0).getTime()){
      const ok=await confirmModal('저장되지 않은 초안이 있어요','이전에 쓰다가 만 내용을 이어서 쓸까요?','이어서 쓰기');
      if(ok){ ta.value=d.body; if(d.title) $('#e-title').value=d.title; }
      else { try{ localStorage.removeItem(wkDraftKey(doc.key)); }catch(e){} }
    }
  }
  wkRenderPreview();
  window.scrollTo(0,0);
}

function enterEdit(doc){
  // 모든 문서가 새 편집기를 쓴다. 기존 HTML 문서는 진입 시 자동으로 안다 문법으로 변환해 보여주고,
  // ★저장하기 전까지 원본은 그대로 남는다(취소하면 아무 일도 없음). 원본은 아래 '원본 HTML'에서 대조 가능.
  if((doc.format||'html')!=='wiki'){
    const original = doc.body||'';
    enterWikiEdit(Object.assign({}, doc, { body: htmlToWiki(original), format:'wiki' }),
                  { converted:true, originalHtml: original });
    return;
  }
  enterWikiEdit(doc);
}
async function saveDoc(key){
  const msg=$('#e-msg'); msg.className='msg';
  // ★용량 방어: 본문에 base64(data:) 이미지가 들어오면 리비전이 편집마다 사진 전체를 복사한다.
  //   (10년 78GB → DB 한도의 160배). 사진은 반드시 Storage로.
  const bodyVal=$('#e-body') ? $('#e-body').value : '';
  if(/!\[[^\]]*\]\(\s*data:/i.test(bodyVal) || /<img[^>]+src\s*=\s*["']?\s*data:/i.test(bodyVal)){
    msg.className='msg err';
    msg.textContent='본문에 이미지 데이터를 직접 붙여넣을 수 없어요. [📷 사진] 버튼이나 드래그&드롭을 사용하세요. (용량 보호)';
    return;
  }
  let infobox=null;
  try{ infobox=collectInfobox(); }
  catch(e){ msg.className='msg err'; msg.textContent=e.message; return; }
  const cat=$('#e-cat').value.split(',').map(s=>s.trim()).filter(Boolean);
  const payload={
    title:$('#e-title').value.trim(),
    eng:$('#e-eng').value.trim()||null,
    notice:$('#e-notice').value.trim()||null,
    body:$('#e-body').value,
    category: cat.length?cat:null,
    infobox: infobox,
    updated_by: state.user.id,
    updated_at: new Date().toISOString(),
    format: state.editFmt || undefined      // 'wiki' 저장 시 변환 확정, html은 그대로
  };
  $('#saveBtn').disabled=true;

  // ── 동시 편집 충돌 보호 ──
  // 예전엔 두 명이 같은 문서를 고치면 '나중에 저장한 사람'이 앞사람 걸 소리 없이 덮어썼다.
  // 편집 시작 시점의 updated_at 과 지금 서버 값을 비교해, 그 사이에 누가 저장했으면 알려준다.
  if(state.editBase){
    try{
      const { data:cur } = await sb.from('documents')
        .select('updated_at,updated_by').eq('key', key).maybeSingle();
      if(cur && cur.updated_at && cur.updated_at !== state.editBase){
        let who='다른 회원';
        try{
          const { data:p } = await sb.from('members_public')
            .select('handle,name').eq('id', cur.updated_by).maybeSingle();
          if(p) who=(p.handle||p.name||who);
        }catch(_){}
        const ok = await confirmModal(
          '편집하는 사이에 문서가 바뀌었어요',
          `${who}님이 ${fmtKST(cur.updated_at)}에 이 문서를 저장했습니다.\n그대로 저장하면 그 내용이 사라집니다. (역사에서 복구는 가능)`,
          '내 것으로 덮어쓰기');
        if(!ok){
          $('#saveBtn').disabled=false;
          msg.className='msg err';
          msg.textContent='저장하지 않았습니다. 새로고침해서 최신 내용을 확인한 뒤 다시 편집해 주세요.';
          return;
        }
      }
    }catch(_){}   // 확인 실패 시엔 저장을 막지 않는다
  }

  const { error } = await sb.from('documents').update(payload).eq('key', key);
  if(error){ $('#saveBtn').disabled=false; msg.className='msg err'; msg.textContent='저장 실패: '+error.message; return; }
  // 주소(key) 변경: editor·admin·owner, 값이 바뀐 경우
  let finalKey = key;
  const keyEl = $('#e-key');
  if(canEdit() && keyEl){
    const newKey=(keyEl.value||'').trim().toLowerCase();
    if(newKey && newKey!==key){
      if(!/^[a-z0-9_-]+$/.test(newKey)){ $('#saveBtn').disabled=false; msg.className='msg err'; msg.textContent='주소는 영문 소문자·숫자·-·_ 만 가능해요.'; return; }
      const { error:rerr } = await sb.rpc('rename_document', { p_old:key, p_new:newKey });
      if(rerr){ $('#saveBtn').disabled=false; const dup=/exist|taken|duplicate|unique|중복|이미/i.test(rerr.message||''); msg.className='msg err'; msg.textContent = dup ? '이미 사용 중인 주소예요.' : ('주소 변경 실패: '+rerr.message); return; }
      finalKey=newKey;
    }
  }
  $('#saveBtn').disabled=false;
  state.editBase = payload.updated_at;                            // 기준 시각 갱신
  try{ localStorage.removeItem('anda_draft:'+key); }catch(e){}   // 저장 성공 → 임시 초안 제거
  await loadDocs();
  if(finalKey!==key){ location.hash='#'+finalKey; }   // 주소 변경 시 URL도 갱신(route→renderDoc)
  else { await renderDoc(finalKey); }                  // 저장 시 트리거가 이전 버전을 자동 백업
}

/* 새 문서 만들기: 템플릿 선택 → 주소·제목 → 생성 후 뼈대 주입 */
function openNewDocModal(){
  if(!canEdit()) return;
  let pick='free';
  const ov=document.createElement('div'); ov.className='modal-ov';
  ov.innerHTML=`<div class="modal-box" style="max-width:480px">
    <div class="modal-msg">새 문서 만들기</div>
    <div class="modal-sub">어떤 문서인가요? 고르면 <b>기본 뼈대가 자동으로 채워집니다</b>.</div>
    <div class="tpl-grid" id="ndTpl">
      ${Object.entries(DOC_TEMPLATES).map(([k,t])=>`
        <div class="tpl-card ${k==='free'?'on':''}" data-tpl="${k}">
          <span class="tpl-ic">${t.icon}</span><span class="tpl-nm">${escapeHtml(t.name)}</span>
        </div>`).join('')}
    </div>
    <div class="tpl-desc" id="ndDesc">${escapeHtml(DOC_TEMPLATES.free.desc)}</div>
    <label class="nd-label">문서 주소</label>
    <input class="he-input" id="ndKey" type="text" maxlength="60" placeholder="예: history" autocomplete="off">
    <label class="nd-label">문서 제목</label>
    <input class="he-input" id="ndTitle" type="text" maxlength="80" placeholder="예: 동아리 역사" autocomplete="off">
    <div class="he-msg" id="ndMsg"></div>
    <div class="modal-btns"><button class="modal-cancel">취소</button><button class="modal-ok">만들기</button></div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  const key=ov.querySelector('#ndKey'), title=ov.querySelector('#ndTitle'),
        msg=ov.querySelector('#ndMsg'), okb=ov.querySelector('.modal-ok'), desc=ov.querySelector('#ndDesc');
  key.focus();
  ov.querySelector('.modal-cancel').onclick=close;
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  ov.querySelectorAll('.tpl-card').forEach(c=>{
    c.onclick=()=>{
      pick=c.dataset.tpl;
      ov.querySelectorAll('.tpl-card').forEach(x=>x.classList.toggle('on', x===c));
      desc.textContent=DOC_TEMPLATES[pick].desc;
    };
  });

  const doCreate=async()=>{
    const k=key.value.trim().toLowerCase(), t=title.value.trim();
    msg.className='he-msg';
    if(!/^[a-z0-9_-]+$/.test(k)){ msg.className='he-msg err'; msg.textContent='주소는 영문 소문자·숫자·-·_ 만 가능해요.'; return; }
    if(!t){ msg.className='he-msg err'; msg.textContent='문서 제목을 입력하세요.'; return; }
    okb.disabled=true; okb.textContent='만드는 중…';
    try{
      const { data:ex } = await sb.from('documents').select('key').eq('key', k).maybeSingle();
      if(ex){ throw { message:'address already exists' }; }
      const { error } = await sb.rpc('create_document', { p_key:k, p_title:t });
      if(error) throw error;

      // 템플릿 뼈대 주입 (create_document 는 빈 문서만 만들므로 생성 직후 채운다)
      const tpl=DOC_TEMPLATES[pick];
      if(tpl && (tpl.body || tpl.infobox)){
        const info = tpl.infobox
          ? { title:(tpl.infobox.title||'').replace('{{TITLE}}', t), sub:tpl.infobox.sub||'',
              rows: tpl.infobox.rows.map(r=>[r[0], r[1]]) }
          : null;
        const { error:uerr } = await sb.from('documents')
          .update({ body: tpl.body || '', infobox: info, format:'wiki' }).eq('key', k);
        if(uerr) throw uerr;   // 문서는 이미 생성됨 — 실패해도 빈 문서로 열림
      }
      close(); await loadDocs(); location.hash='#'+k;
    }catch(e){
      const dup=/exist|taken|duplicate|unique|중복|이미/i.test(e.message||'');
      msg.className='he-msg err'; msg.textContent = dup ? '이미 사용 중인 주소예요.' : ('생성 실패: '+(e.message||''));
      okb.disabled=false; okb.textContent='만들기';
    }
  };
  okb.onclick=doCreate;
  [key,title].forEach(inp=>inp.addEventListener('keydown',e=>{ if(e.key==='Enter') doCreate(); }));
}
async function deleteDoc(doc){

}

async function restoreDoc(id){
  if(!confirm('이 문서를 복원할까요? 다시 정상 문서로 돌아갑니다.')) return;
  const { error } = await sb.rpc('restore_document', { p_id: Number(id) });
  if(error){ alert('복원 실패: '+error.message); return; }
  await loadDocs();
  document.body.classList.remove('trash-view');
  location.hash='#trash';
  renderTrash();   // 목록 갱신(해시가 이미 #trash면 hashchange가 안 뜨므로 직접 호출)
}

  const eids=[...new Set((revs||[]).map(r=>r.edited_by).filter(Boolean))];

  if(eids.length){ try{ const { data } = await sb.from('members_public').select('id,name,handle').in('id', eids);
    (data||[]).forEach(p=>{ pmap[p.id]=p.handle||p.name||''; }); }catch(e){} }
  const rows = (revs||[]).map(r=>{
    const within = (Date.now()-new Date(r.edited_at).getTime()) <= MONTH;
    const who = r.edited_by ? escapeHtml(pmap[r.edited_by] || r.edited_by.slice(0,8)) : '알 수 없음';
    const rb = canEdit()
      ? (within ? `<button class="btn ghost" data-id="${r.id}">이 버전으로 되돌리기</button>`
                : `<span class="expired">30일 경과 · 롤백 불가</span>`)
      : '';
    return `<div class="rev"><div class="meta"><b>${fmtKST(r.edited_at)}</b> · ${escapeHtml(r.title||'')} · 편집자 ${who}</div>${rb}</div>`;
  }).join('') || '<p>아직 편집 이력이 없습니다. (문서를 한 번 수정하면 이전 버전이 여기에 쌓입니다.)</p>';

  $('#doc').innerHTML = `
    <div class="doc-head"><h1>역사 · ${escapeHtml(key)}</h1>
      <div class="tabs"><button id="backBtn">${ic('back')}문서로</button></div></div>
    <div class="doc-meta">30일 이내 버전만 되돌릴 수 있습니다. 되돌려도 과거 기록은 지워지지 않습니다.</div>
    <div class="history">${rows}</div>`;
  $('#backBtn').onclick=()=>renderDoc(key);
  $('#doc').querySelectorAll('.history button[data-id]').forEach(b=>b.onclick=()=>doRollback(key, Number(b.dataset.id)));
  window.scrollTo(0,0);
}
async function doRollback(key, revId){
  if(!confirm('이 버전으로 되돌릴까요? 현재 내용은 이력으로 보관됩니다.')) return;
  const { error } = await sb.rpc('rollback_document', { p_key:key, p_revision_id:revId });
  if(error){ alert('되돌리기 실패: '+error.message); return; }
  await loadDocs(); await renderDoc(key);
}

/* ================== 회원 관리 (admin+) ================== */
/* 세그먼트 렌더: owner=모든 회원(+양도), admin=viewer·editor 회원만(최대 admin). 본인 행은 잠금. */
/* 회원 관리 표: 회원번호 대신 프로필 사진(없으면 이니셜 원형) */
function avaCellHTML(name, handle, url){
  if(url) return `<div class="ava-cell" style="background-image:url('${escapeAttr(url)}')"></div>`;
  const av=avatarFor(name, handle);
  return `<div class="ava-cell" style="background:${av.bg}">${escapeHtml(av.ch)}</div>`;
}
function memberSeg(m){
  const base=['viewer','editor','admin'];
  const btn=(r,cls,extra)=>`<button class="seg-opt${cls}${r==='owner'?' seg-owner':''}${m.role===r?' on':''}"${extra}>${r}</button>`;
  if(m.id===state.user.id){
    const btns=[...base,'owner'].map(r=>btn(r,'',' disabled')).join('');
    return `<div class="seg seg-locked" title="본인 등급은 바꿀 수 없어요">${btns}</div> <span class="seg-me">(나)</span>`;
  }
  const manageable = isOwner() || roleRank(m.role) <= ROLE_RANK.editor;   // admin은 viewer·editor만
  if(!manageable){
    const btns=base.map(r=>btn(r,'',' disabled')).join('');
    return `<div class="seg seg-locked" title="admin은 viewer·editor 회원만 변경할 수 있어요">${btns}</div>`;
  }
  const list = isOwner() ? [...base,'owner'] : ['viewer','editor'];   // admin은 viewer·editor로만 변경(승격 불가)
  const btns=list.map(r=>btn(r,'',` data-role="${r}"${r==='owner'?' title="owner 양도"':''}`)).join('');
  return `<div class="seg" data-id="${m.id}">${btns}</div> <span class="ck" data-for="${m.id}" style="font-size:11px;margin-left:6px"></span>`;
}

/* 소속(동아리) 칸: owner는 드롭다운으로 배정, 그 외는 텍스트 표시 */
function clubCell(id, cur, names){
  cur = cur || '무소속';
  if(!isOwner()) return escapeHtml(cur);
  const opts = names.includes(cur) ? names : [...names, cur];   // '목록 외' 값도 선택 유지
  const o = opts.map(n=>`<option value="${escapeAttr(n)}"${n===cur?' selected':''}>${escapeHtml(n)}</option>`).join('');
  return `<select class="club-sel" data-id="${escapeAttr(id)}" data-prev="${escapeAttr(cur)}">${o}</select>`;
}
async function setMemberClub(id, club, sel){
  const prev = sel.getAttribute('data-prev') || club;
  sel.disabled=true;
  try{
    const { error } = await sb.rpc('set_member_club', { p_target:id, p_club:club });
    if(error) throw error;
    sel.setAttribute('data-prev', club);
    sel.classList.add('ok'); setTimeout(()=>sel.classList.remove('ok'), 1200);
  }catch(e){
    sel.value=prev;
    alert('소속 변경 실패: owner 권한과 동아리 목록을 확인하세요. (20_member_club.sql 실행 여부도 확인)');
  }finally{ sel.disabled=false; }
}


/* 접속 상태 표시 — '2분 이내 활동'이면 접속 중.
   로그아웃·탭 종료 시엔 go_offline()이 last_active_at을 판정 창 밖으로 밀어 즉시 꺼진다. */
const ONLINE_WINDOW_MS = 120000;
function activityCellHTML(m){
  const la = m.last_active_at;
  if(!la) return m.last_sign_in_at ? fmtKST(m.last_sign_in_at) : '-';
  const online = (Date.now() - new Date(la).getTime()) < ONLINE_WINDOW_MS;
  return fmtKST(la) + (online ? ' <span class="online-dot" title="접속 중">● 접속 중</span>' : '');
}
/* 회원 관리 화면에서 접속 상태만 주기적으로 갱신 (표 전체를 다시 그리지 않음 → 깜빡임·입력 손실 없음) */
let adminPresenceTimer = null;
function startAdminPresence(){
  stopAdminPresence();
  adminPresenceTimer = setInterval(async ()=>{
    if(document.hidden) return;
    if(!document.querySelector('[data-act]')) { stopAdminPresence(); return; }
    try{
      const { data, error } = await sb.rpc('admin_list_members');
      if(error) throw error;
      (data||[]).forEach(m=>{
        const cell = document.querySelector('[data-act="'+m.id+'"]');
        const html = activityCellHTML(m);
        if(cell && cell.innerHTML !== html) cell.innerHTML = html;   // 바뀐 칸만 손댐
      });
    }catch(e){}
  }, 20000);   // 20초마다 (판정 창 2분보다 촘촘)
}
function stopAdminPresence(){ if(adminPresenceTimer){ clearInterval(adminPresenceTimer); adminPresenceTimer=null; } }

/* ---- 동아리 목록 (admin) : 펼치면 소속 회원 프로필 링크 · 무소속 맨 아래 ---- */
async function renderClubSection(){
  const box=$('#clubSection'); if(!box) return;
  let clubs=[], profs=[];
  try{ const { data } = await sb.from('clubs').select('id,name,is_none'); clubs=data||[]; }catch(e){}
  try{ const { data } = await sb.from('profiles').select('id,member_no,name,handle,club,avatar_url'); profs=data||[]; }catch(e){}
  const byClub={}; profs.forEach(p=>{ const c=p.club||'무소속'; (byClub[c]=byClub[c]||[]).push(p); });
  const tableByName={}; clubs.forEach(c=>{ tableByName[c.name]=c; });
  const allNames=new Set([...clubs.map(c=>c.name), ...profs.map(p=>p.club||'무소속')]);
  const names=[...allNames].filter(n=>n!=='무소속').sort((a,b)=>String(a).localeCompare(String(b),'ko'));
  names.push('무소속');
  const items=names.map(n=>{
    const t=tableByName[n]; const inTable=!!t;
    const mem=(byClub[n]||[]).slice().sort((a,b)=>(a.member_no||1e9)-(b.member_no||1e9));
    const memHtml = mem.length ? mem.map(m=>{
      const av=avatarFor(m.name,m.handle);
      const ava = m.avatar_url
        ? `<span class="club-mem-ava" style="background-image:url('${escapeAttr(m.avatar_url)}')"></span>`
        : `<span class="club-mem-ava" style="background:${av.bg}">${escapeHtml(av.ch)}</span>`;
      return `<a class="club-mem" href="#member/${m.id}">${ava}<span class="club-mem-t">#${m.member_no??'-'} ${escapeHtml(m.name||'-')} <span class="muted">@${escapeHtml(m.handle||'-')}</span></span></a>`;
    }).join('') : '<div class="club-empty">소속 회원이 없습니다.</div>';
    return `<div class="club-item">
      <div class="club-row">
        <span class="club-caret">▸</span>
        <span class="club-name">${escapeHtml(n)}</span>${(!inTable && n!=='무소속')?'<span class="club-tag">목록 외</span>':''}
        <span class="club-count">${mem.length}명</span>
      </div>
      <div class="club-members" style="display:none">${memHtml}</div>
    </div>`;
  }).join('');
  box.innerHTML=`
    <div class="club-sec-head"><h2>동아리 목록</h2><button class="btn ghost" id="clubEditBtn">동아리 목록 수정</button></div>
    <div class="club-list">${items}</div>
    <div class="doc-meta">동아리명을 눌러 소속 회원을 펼쳐볼 수 있어요. '목록 외'는 회원이 가입 때 직접 적었지만 목록에 아직 없는 이름이에요 — 수정에서 추가하면 관리됩니다.</div>`;
  box.querySelectorAll('.club-row').forEach(r=>r.onclick=()=>{
    const m=r.parentElement.querySelector('.club-members'); const open=m.style.display!=='none';
    m.style.display=open?'none':'block'; r.querySelector('.club-caret').textContent=open?'▸':'▾';
  });
  $('#clubEditBtn').onclick=openClubEditor;
}

/* 동아리 목록 수정 모달 (추가 / 이름변경 / 삭제) */
async function openClubEditor(){
  let clubs=[];
  try{ const { data } = await sb.from('clubs').select('id,name,is_none'); clubs=data||[]; }catch(e){}
  clubs.sort((a,b)=> (a.is_none?1:0)-(b.is_none?1:0) || String(a.name).localeCompare(String(b.name),'ko'));
  const rows=clubs.map(c=>c.is_none
    ? `<div class="ce-row"><span class="ce-name">${escapeHtml(c.name)}</span><span class="ce-lock">고정</span></div>`
    : `<div class="ce-row" data-id="${c.id}" data-name="${escapeAttr(c.name)}">
         <span class="ce-name">${escapeHtml(c.name)}</span>
         <span class="ce-btns"><button class="ce-rename">이름변경</button><button class="ce-del">삭제</button></span>
       </div>`).join('');
  const ov=document.createElement('div'); ov.className='modal-ov';
  ov.innerHTML=`<div class="modal-box ce-box">
    <div class="modal-msg">동아리 목록 수정</div>
    <div class="ce-add"><input id="ceNew" type="text" placeholder="새 동아리 이름" maxlength="40" autocomplete="off"><button id="ceAdd">추가</button></div>
    <div class="ce-msg" id="ceMsg"></div>
    <div class="ce-list">${rows||'<div class="club-empty" style="padding:10px">동아리가 없습니다.</div>'}</div>
    <div class="modal-btns"><button class="modal-cancel" id="ceClose">닫기</button></div>
  </div>`;
  document.body.appendChild(ov);
  const reopen=()=>{ ov.remove(); openClubEditor(); };
  const close=()=>{ ov.remove(); renderClubSection(); };
  const setMsg=(t,ok)=>{ const m=$('#ceMsg'); if(!m)return; m.textContent=t||''; m.className='ce-msg'+(ok?' ok':(t?' err':'')); };
  $('#ceClose').onclick=close;
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  $('#ceAdd').onclick=async()=>{
    const name=($('#ceNew').value||'').trim(); if(!name){ setMsg('이름을 입력하세요.'); return; }
    const { error }=await sb.rpc('add_club',{ p_name:name });
    if(error){ setMsg(error.message||'추가 실패'); return; }
    reopen();
  };
  $('#ceNew').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); $('#ceAdd').click(); } });
  ov.querySelectorAll('.ce-del').forEach(b=>b.onclick=async()=>{
    const row=b.closest('.ce-row'); const id=row.dataset.id, name=row.dataset.name;
    const ok=await confirmModal('"'+name+'" 동아리를 삭제할까요?','소속 회원은 모두 무소속으로 이동합니다.');
    if(!ok) return;
    showBlockingLoader('삭제하는 중…');
    const { error }=await sb.rpc('delete_club',{ p_id:Number(id) });
    hideBlockingLoader();
    if(error){ setMsg(error.message||'삭제 실패'); return; }
    reopen();
  });
  ov.querySelectorAll('.ce-rename').forEach(b=>b.onclick=()=>{
    const row=b.closest('.ce-row'); const id=row.dataset.id, name=row.dataset.name;
    row.innerHTML=`<input class="ce-edit" type="text" value="${escapeAttr(name)}" maxlength="40" autocomplete="off"><span class="ce-btns"><button class="ce-save">저장</button><button class="ce-cancel">취소</button></span>`;
    const inp=row.querySelector('.ce-edit'); inp.focus();
    row.querySelector('.ce-cancel').onclick=reopen;
    const doSave=async()=>{
      const nn=(inp.value||'').trim(); if(!nn){ setMsg('이름을 입력하세요.'); return; }
      showBlockingLoader('이름을 변경하는 중…');
      const { error }=await sb.rpc('rename_club',{ p_id:Number(id), p_new:nn });
      hideBlockingLoader();
      if(error){ setMsg(error.message||'변경 실패'); return; }
      reopen();
    };
    row.querySelector('.ce-save').onclick=doSave;
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); doSave(); } });
  });
}
async function setRole(id, role){
  const note=$('#doc').querySelector('.ck[data-for="'+id+'"]');
  if(role==='owner'){
    const ok=await confirmModal('이 회원에게 owner 권한을 양도하시겠습니까?', '본인은 admin으로 등급 하향됩니다. (되돌리려면 새 owner가 다시 양도해야 합니다.)', '양도');
    if(!ok){ renderAdmin(); return; }
    if(note){ note.textContent='양도 중…'; note.style.color='var(--text-dim)'; }
    const { error } = await sb.rpc('transfer_owner', { p_target:id });
    if(error){ if(note){ note.textContent='실패: '+error.message; note.style.color='var(--link-red)'; } return; }
    state.role='admin'; renderUserbox();                 // 본인은 이제 admin
    alert('owner 권한을 양도했습니다. 본인 등급은 admin으로 변경되었습니다.');
    renderAdmin();                                        // 새 권한 기준으로 표 갱신
    return;
  }
  if(note){ note.textContent='변경 중…'; note.style.color='var(--text-dim)'; }
  const { error } = await sb.rpc('set_member_role', { p_target:id, p_role:role });
  if(error){ if(note){ note.textContent='실패: '+error.message; note.style.color='var(--link-red)'; } return; }
  const seg=$('#doc').querySelector('.seg[data-id="'+id+'"]');
  if(seg) seg.querySelectorAll('.seg-opt').forEach(b=>b.classList.toggle('on', b.dataset.role===role));
  if(note){ note.textContent='등급 변경됨'; note.style.color='#1b7a2f'; setTimeout(()=>{note.textContent='';},2000); }
}

async function decideRequest(id, status, email){
  if(status==='rejected' && !confirm('이 신청을 거절할까요?')) return;
  const { error } = await sb.from('signup_requests')
    .update({ status, decided_by: state.user.id, decided_at: new Date().toISOString() }).eq('id', id);
  if(error){ alert('처리 실패: '+error.message); return; }
  if(status==='approved'){
    alert('승인되었습니다.\n\n이제 Supabase 대시보드 → Authentication → Invite user 로\n'+email+'\n을(를) 초대하세요. 로그인하면 프로필이 자동으로 채워집니다.');
  }
  renderRequests();
}

async function rpcCheck(label, name, args){
  try{
    const { error } = await sb.rpc(name, args||{});
    if(!error) return healthRow(label, true, 'OK');
    const msg=error.message||''; const code=error.code||'';
    // 이 점검은 일부러 없는 ID(-1 등)를 넘겨 "함수가 배포됐는지"만 본다.
    // 따라서 함수가 더미 인자를 거부하며 내는 "…찾을 수 없습니다"(=행 없음)는 '정상 거부'이지 '함수 없음'이 아니다.
    // 판정은 메시지 문구가 아니라 에러 코드로 한다:
    //   PGRST202/PGRST203 = PostgREST가 스키마 캐시에서 함수를 못 찾음, 42883 = Postgres undefined_function
    const missing = code==='PGRST202' || code==='PGRST203' || code==='42883'
      || /could not find the function|schema cache/i.test(msg)
      || /function .+ does not exist/i.test(msg);
    if(missing) return healthRow(label, false, '함수 없음/미배포 · '+msg);
    return healthRow(label, true, '배포됨 (정상 거부: '+msg+')');
  }catch(e){ return healthRow(label, false, String(e)); }
}
async function storageCheck(label, bucket){
  try{ const { error } = await sb.storage.from(bucket).list('', { limit:1 });
    return healthRow(label, !error, error?error.message:'OK'); }
  catch(e){ return healthRow(label, false, String(e)); }
}
/* 용량 게이지 — DB(500MB) / Storage(1GB) 사용률 + 무거운 테이블 상위 목록 */
function fmtBytes(b){
  if(b>=1024*1024*1024) return (b/1024/1024/1024).toFixed(2)+' GB';
  if(b>=1024*1024)      return (b/1024/1024).toFixed(1)+' MB';
  if(b>=1024)           return (b/1024).toFixed(0)+' KB';
  return b+' B';
}
function usageBar(label, used, limit){
  const pct = limit ? Math.min(100, used/limit*100) : 0;
  const col = pct>=90 ? 'var(--link-red)' : (pct>=70 ? '#c98500' : '#2e9e5b');
  return `<div style="margin:8px 0 12px">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
      <b>${escapeHtml(label)}</b>
      <span>${escapeHtml(fmtBytes(used))} / ${escapeHtml(fmtBytes(limit))} · <b style="color:${col}">${pct.toFixed(1)}%</b></span>
    </div>
    <div style="height:8px;border-radius:4px;background:#e5e5e5;overflow:hidden">
      <div style="height:100%;width:${pct.toFixed(1)}%;background:${col}"></div>
    </div>
  </div>`;
}

/* 문서 사진 GC — 현재 본문에도, 살아남은 리비전 어디에도 없는 사진만 삭제 대상.
   (옛 리비전이 참조 중인 사진을 지우면 역사가 깨지므로 반드시 리비전까지 확인한다) */
async function scanOrphanImages(){
  const msg=document.getElementById('gcMsg'), list=document.getElementById('gcList');
  if(!msg||!list) return;
  msg.textContent='검사 중…'; list.innerHTML='';
  let rows=[];
  try{
    const { data, error } = await sb.rpc('list_orphan_doc_images');
    if(error) throw error;
    rows=data||[];
  }catch(e){ msg.textContent='실패: '+((e&&e.message)||e); return; }

  if(!rows.length){ msg.textContent='정리할 사진이 없습니다. ✅'; return; }
  const total=rows.reduce((a,r)=>a+(Number(r.bytes)||0),0);
  msg.textContent=`${rows.length}개 · ${fmtBytes(total)} 회수 가능`;
  list.innerHTML = rows.slice(0,20).map(r=>
      `<div class="orph-row"><span style="flex:1;overflow:hidden;text-overflow:ellipsis">${escapeHtml(r.path)}</span><span>${escapeHtml(fmtBytes(Number(r.bytes)||0))}</span></div>`).join('')
    + (rows.length>20?`<div class="orph-row"><span>… 외 ${rows.length-20}개</span></div>`:'')
    + `<button class="btn" id="gcDel" style="margin-top:8px;font-size:12px;padding:6px 12px">${rows.length}개 삭제</button>`;

  document.getElementById('gcDel').onclick=async()=>{
    const ok=await confirmModal('안 쓰는 사진을 삭제할까요?',
      `${rows.length}개 · ${fmtBytes(total)}. 현재 문서와 남아있는 역사(리비전) 어디에도 쓰이지 않는 사진입니다.`, '삭제');
    if(!ok) return;
    msg.textContent='삭제 중…';
    try{
      const paths=rows.map(r=>r.path);
      for(let i=0;i<paths.length;i+=100){                       // 100개씩 나눠 요청
        const { error } = await sb.storage.from('doc-images').remove(paths.slice(i,i+100));
        if(error) throw error;
      }
      list.innerHTML=''; msg.textContent=`${rows.length}개 삭제 완료 · ${fmtBytes(total)} 회수 ✅`;
    }catch(e){ msg.textContent='삭제 실패: '+((e&&e.message)||e); }
  };
}

async function capacityCheck(){
  try{
    const { data, error } = await sb.rpc('capacity_usage');
    if(error) throw error;
    const d = (typeof data==='string') ? JSON.parse(data) : data;
    let html = usageBar('Database (텍스트·문서·리비전)', d.db_bytes, d.db_limit)
             + usageBar('Storage (사진)', d.storage_bytes, d.storage_limit);
    const tb = d.tables||[];
    if(tb.length){
      html += `<div style="font-size:12px;color:var(--text-dim);margin-top:6px">무거운 테이블: `
            + tb.slice(0,5).map(t=>`${escapeHtml(t.name)} ${escapeHtml(fmtBytes(t.bytes))}`).join(' · ')
            + `</div>`;
    }
    const worst = Math.max(d.db_bytes/d.db_limit, d.storage_bytes/d.storage_limit)*100;
    if(worst>=90) html += `<div class="notice" style="border-left-color:var(--link-red);margin-top:8px"><b>⚠ 한도의 90%를 넘었습니다 — 정리 또는 플랜 상향이 필요합니다.</b></div>`;
    html += `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn ghost" id="gcBtn" style="font-size:12px;padding:5px 10px">${ic('broom')} 안 쓰는 문서 사진 찾기</button>
        <button class="btn ghost" id="gcChatBtn" style="font-size:12px;padding:5px 10px">${ic('calendar')} 30일 지난 채팅 사진 정리</button>
      </div>
      <div id="gcMsg" style="font-size:12px;color:var(--text-dim);margin-top:6px"></div><div id="gcList"></div>`;
    setTimeout(()=>{
      const b=document.getElementById('gcBtn');      if(b) b.onclick=scanOrphanImages;
      const c=document.getElementById('gcChatBtn');  if(c) c.onclick=scanExpiredChatImages;
    },0);
    return html;
  }catch(e){
    return healthRow('용량 조회 (capacity_usage)', false, '함수 미배포 또는 권한 없음 · '+String((e&&e.message)||e));
  }
}
function healthHead(t){ return `<div class="rev" style="border-left-color:transparent;background:transparent;padding:12px 0 2px"><b style="color:var(--accent);font-size:13.5px">${escapeHtml(t)}</b></div>`; }
async function dbCheck(label, fn){

  catch(e){ return healthRow(label, false, String(e)); }
}
async function fnDebug(name){
  try{
    const r = await fetch(`${SUPABASE_URL}/functions/v1/${name}?debug=1`,
      { headers:{ apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY } });
    return await r.json();
  }catch(e){ return { ok:false, error:String(e) }; }
}
function fnLine(label, res, keys){
  if(!res || !res.diag) return healthRow(label, false, (res&&res.error)?res.error:'함수 응답 없음 (배포/이름/Verify JWT 확인)');
  const parts = keys.map(k=>`${k}: ${res.diag[k]||'-'}`);
  const ok = keys.every(k=>{ const v=res.diag[k]||''; return v.indexOf('❌')<0 && v.indexOf('없음')<0 && v.indexOf('실패')<0 && v.indexOf('예외')<0; });
  return healthRow(label, ok, parts.join(' · '));
}
function healthRow(label, ok, detail){
  return `<div class="rev"><div class="meta"><b>${ok?'✅':'❌'} ${escapeHtml(label)}</b><br><span style="font-size:11.5px">${escapeHtml(detail)}</span></div></div>`;
}

/* 활동명(handle) 변경 모달: 본인만, 중복 불가(서버 set_my_handle 검증), 변경내역 자동 기록 */
function openHandleEditor(current){
  const ov=document.createElement('div'); ov.className='modal-ov';
  ov.innerHTML=`<div class="modal-box">
    <div class="modal-msg">활동명 변경</div>
    <div class="modal-sub">다른 회원과 겹치는 활동명은 사용할 수 없어요.</div>
    <input class="he-input" id="heInput" type="text" maxlength="20" placeholder="새 활동명">
    <div class="he-msg" id="heMsg"></div>
    <div class="modal-btns"><button class="modal-cancel">취소</button><button class="modal-ok">변경</button></div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  const inp=ov.querySelector('#heInput'), msg=ov.querySelector('#heMsg'), okb=ov.querySelector('.modal-ok');
  inp.value=current||''; inp.focus(); inp.select();
  ov.querySelector('.modal-cancel').onclick=close;
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  const doSave=async()=>{
    const v=inp.value.trim();
    if(!v){ msg.textContent='활동명을 입력하세요.'; msg.className='he-msg err'; return; }
    if(v===current){ close(); return; }
    okb.disabled=true; okb.textContent='변경 중…';
    try{
      const { error } = await sb.rpc('set_my_handle', { p_handle: v });
      if(error) throw error;
      state.handle=v; renderUserbox();
      if(state.user){ nameCache[state.user.id]={handle:v,name:state.name||''}; applyName(state.user.id); }
      close(); renderMe();
    }catch(e){
      const dup=/taken|duplicate|unique|exists|중복|이미/i.test(e.message||'');
      msg.textContent = dup ? '이미 사용 중인 활동명이에요.' : ('변경 실패: '+(e.message||'')); msg.className='he-msg err';
      okb.disabled=false; okb.textContent='변경';
    }
  };
  okb.onclick=doSave;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') doSave(); });
}

/* ── 범용 이미지 압축기 ──────────────────────────────────────────────
   업로드 전에 브라우저에서 리사이즈·재인코딩해 용량을 목표치 이하로 맞춘다.
   (원칙: 이미지는 절대 DB에 넣지 않고 Storage로. DB 500MB / Storage 1GB는 별도 쿼터)
   opts.mode   'cover'   = 중앙 정사각형 크롭 (프로필 사진: 표시가 정사각형이라 크롭이 맞음)
               'contain' = 비율 유지, 장변만 dim으로 축소 (질문 이미지: 잘리면 안 됨)
   opts.dim    결과 최대 변 길이(px)
   opts.target 목표 바이트. 품질을 0.9→minQuality까지 낮춰 이 이하로 맞춘다.
   opts.minQuality 품질 하한(기본 0.5)
   반환 { blob, type, width, height }                                     */
const IMG_RAW_MAX = 25*1024*1024;   // 원본 파일 상한(초대형 파일 디코딩 방지)
function compressImage(file, opts){
  const o = Object.assign({ mode:'contain', dim:1280, target:100*1024, minQuality:0.5 }, opts||{});
  return new Promise((resolve, reject)=>{
    const objurl=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(objurl);
      try{
        const iw=img.width, ih=img.height;
        let sx=0, sy=0, sw=iw, sh=ih, dw, dh;
        if(o.mode==='cover'){
          const s=Math.min(iw, ih);
          sx=(iw-s)/2; sy=(ih-s)/2; sw=sh=s;
          dw=dh=o.dim;
        }else{
          const scale=Math.min(1, o.dim/Math.max(iw, ih));   // 원본보다 키우지 않음
          dw=Math.max(1, Math.round(iw*scale));
          dh=Math.max(1, Math.round(ih*scale));
        }
        const cv=document.createElement('canvas'); cv.width=dw; cv.height=dh;
        cv.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, dw, dh);
        const type = cv.toDataURL('image/webp').startsWith('data:image/webp') ? 'image/webp' : 'image/jpeg';
        const step=q=>cv.toBlob(b=>{
          if(!b){ reject(new Error('encode')); return; }
          if(b.size<=o.target || q<=o.minQuality) resolve({ blob:b, type, width:dw, height:dh });
          else step(q-0.1);
        }, type, q);
        step(0.9);
      }catch(err){ reject(err); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(objurl); reject(new Error('load')); };
    img.src=objurl;
  });
}

/* 프로필 사진 업로드/제거 (Supabase Storage: avatars 버킷) — 위 압축기의 'cover' 프리셋 */
const AVA_DIM = 256;                 // 정사각형 한 변(px)
const AVA_TARGET = 40*1024;          // 목표 용량
const AVA_RAW_MAX = IMG_RAW_MAX;     // (하위호환) 원본 파일 상한
function compressAvatar(file){
  return compressImage(file, { mode:'cover', dim:AVA_DIM, target:AVA_TARGET });
}
async function onAvatarFile(e){
  const msg=$('#meAvaMsg'); const file=e.target.files&&e.target.files[0]; e.target.value='';
  if(!file) return;
  if(!/^image\//.test(file.type||'')){ msg.className='me-avatar-msg err'; msg.textContent='이미지 파일만 올릴 수 있어요.'; return; }
  if(file.size > AVA_RAW_MAX){ msg.className='me-avatar-msg err'; msg.textContent='이미지가 너무 큽니다(25MB 이하로 올려주세요).'; return; }
  msg.className='me-avatar-msg'; msg.textContent='이미지 처리 중…';
  let out;
  try{ out=await compressAvatar(file); }
  catch(_){ msg.className='me-avatar-msg err'; msg.textContent='이미지를 처리하지 못했습니다. 다른 사진으로 시도해 주세요.'; return; }
  msg.className='me-avatar-msg'; msg.textContent='업로드 중…';
  try{
    const path=state.user.id+'/avatar';
    // CDN 캐시 1년: 저장 URL에 ?v=업로드시각(아래)이 붙어 사진을 바꾸면 URL이 달라지므로,
    // 길게 캐시해도 변경은 즉시 반영되고(새 URL=캐시 미스), 안 바뀐 동안은 CDN에서 바로 서빙(egress 절감).
    const up=await sb.storage.from('avatars').upload(path, out.blob, { upsert:true, contentType:out.type, cacheControl:'31536000' });
    if(up.error) throw up.error;
    const pub=sb.storage.from('avatars').getPublicUrl(path);
    const base=(pub&&pub.data&&pub.data.publicUrl)?pub.data.publicUrl:'';
    const url=base+'?v='+Date.now();
    const { error } = await sb.rpc('set_my_avatar', { p_url:url });
    if(error) throw error;
    avatarCache[state.user.id]=url; applyAvatar(state.user.id);
    state.avatar_url=url; renderUserbox();   // 상단 계정 아이콘 사진 갱신
    const el=$('#meAvatar'); if(el){ el.textContent=''; el.style.background=''; el.style.backgroundImage="url('"+url+"')"; }
    msg.className='me-avatar-msg ok'; msg.textContent='프로필 사진이 변경됐어요.';
  }catch(err){ msg.className='me-avatar-msg err'; msg.textContent='업로드 실패: 스토리지(avatars 버킷·정책)를 확인해 주세요.'; }
}
async function removeAvatar(){
  const msg=$('#meAvaMsg'); msg.className='me-avatar-msg'; msg.textContent='제거 중…';
  try{
    try{ await sb.storage.from('avatars').remove([state.user.id+'/avatar']); }catch(_){}
    const { error } = await sb.rpc('set_my_avatar', { p_url:null });
    if(error) throw error;
    avatarCache[state.user.id]=null;
    state.avatar_url=''; renderUserbox();   // 상단 계정 아이콘 사진 제거
    let nm=null, hd=null;
    try{ const { data } = await sb.from('profiles').select('name,handle').eq('id',state.user.id).single(); nm=data&&data.name; hd=data&&data.handle; }catch(_){}
    const av=avatarFor(nm, hd);
    const el=$('#meAvatar'); if(el){ el.style.backgroundImage=''; el.style.background=av.bg; el.textContent=av.ch; }
    msg.className='me-avatar-msg ok'; msg.textContent='기본 사진으로 되돌렸어요.';
  }catch(err){ msg.className='me-avatar-msg err'; msg.textContent='제거 실패: 잠시 후 다시 시도해 주세요.'; }
}

function dirMatch(m, q){
  q=(q||'').trim(); if(!q) return true;
  const strip=s=>String(s||'').toLowerCase().replace(/\s+/g,'');
  const nq = (typeof _norm==='function') ? _norm(q) : strip(q);
  const name = (typeof _norm==='function') ? _norm(m.name||'') : strip(m.name);
  const handle = (typeof _norm==='function') ? _norm(m.handle||'') : strip(m.handle);
  const no = String(m.member_no||'');
  return (nq && (name.includes(nq) || handle.includes(nq))) || no.includes(strip(q)) || ('#'+no).includes(strip(q));
}
function renderDirGrid(){
  const grid=$('#dirGrid'); if(!grid) return;
  let arr=dir.data.filter(m=>dirMatch(m, dir.q));
  if(dir.selClubs.size) arr=arr.filter(m=>dir.selClubs.has(m.club||'무소속'));
  const byNo=(x,y)=>(x.member_no||1e9)-(y.member_no||1e9);
  const byName=(x,y)=>String(x.name||'').localeCompare(String(y.name||''),'ko');
  if(dir.sort==='no_asc') arr.sort(byNo);
  else if(dir.sort==='no_desc') arr.sort((x,y)=>byNo(y,x));
  else if(dir.sort==='name_asc') arr.sort(byName);
  else if(dir.sort==='name_desc') arr.sort((x,y)=>byName(y,x));
  const cnt=$('#dirCount'); if(cnt) cnt.textContent='전체 '+dir.data.length+'명'+(arr.length!==dir.data.length?(' · 표시 '+arr.length+'명'):'');
  setTimeout(async()=>{                          // 카드에 기여 크레딧 채우기(비차단)
    const ids=arr.map(m=>m.id);

  grid.innerHTML=arr.map(m=>{
    const av=avatarFor(m.name, m.handle);
    const ava = m.avatar_url
      ? `<div class="dir-ava" style="background-image:url('${escapeAttr(m.avatar_url)}')"></div>`
      : `<div class="dir-ava" style="background:${av.bg}">${escapeHtml(av.ch)}</div>`;
    return `<a class="dir-card" href="#member/${m.id}">
      ${ava}
      <div class="dir-info">
        <div class="dir-name">${escapeHtml(m.name||'-')}</div>

        <div class="mc-credit" data-credit="${escapeAttr(m.id)}"></div>
      </div>
    </a>`;
  }).join('');
}

function fmtKST(iso){ if(!iso) return '-';
  try{ return new Date(iso).toLocaleString('ko-KR',{timeZone:'Asia/Seoul',dateStyle:'medium',timeStyle:'short'}); }
  catch(e){ return iso; } }
function escapeHtml(s){ return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function escapeAttr(s){ return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }


/* 탭 버튼 아이콘 (스타일 C: 테두리 없는 텍스트 버튼 + 아이콘) */
/* 아이콘: 스프라이트의 심볼을 <use>로 참조. 심볼은 파일에 딱 한 번만 존재한다. */
function ic(n){ return '<svg class="ic16" aria-hidden="true"><use href="#i-'+n+'"/></svg>'; }
function ic2(n, cls){ return '<svg class="'+(cls||'ic18')+'" aria-hidden="true"><use href="#i-'+n+'"/></svg>'; }


/* ================== 채팅·쪽지 사진 (30일 보관) ==================
   용량 검증: 문서 화질(150KB)로 채팅에 넣으면 하루 3장만 올려도 10년 1.6GB → 초과.
   ⇒ (가) 강압축 40KB(표시가 최대 240px이라 충분)  (나) 30일 후 자동 삭제(휘발성).
   텍스트는 영구 보존. 만료된 사진 자리엔 회색 상자만 남는다. */
const CHAT_IMG_DIM = 900;
const CHAT_IMG_TARGET = 40*1024;
const CHAT_IMG_MAX = 5;              // 한 번에 5장
const CHAT_IMG_KEEP_DAYS = 30;

let chatPick = [];                   // 전송 대기 중인 사진 (커뮤니티/질문)
let dmPick   = [];                   // 전송 대기 중인 사진 (쪽지)

function isExpired(ts){
  if(!ts) return false;
  return (Date.now() - new Date(ts).getTime()) > CHAT_IMG_KEEP_DAYS*86400*1000;
}
function expiredBoxHTML(){
  return `<div class="img-expired"><b>사진이 만료되었습니다</b><span>보관 기간 ${CHAT_IMG_KEEP_DAYS}일</span></div>`;
}
/* 메시지의 사진 렌더. 30일 지났으면 회색 상자. */
function msgImagesHTML(images, createdAt, mine){
  const arr=images||[];
  if(!arr.length) return '';
  const cls = 'msg-imgs' + (mine ? ' mine' : '');
  if(isExpired(createdAt)) return `<div class="${cls}">${expiredBoxHTML()}</div>`;
  return `<div class="${cls}">${arr.map(u=>
    `<img src="${escapeAttr(u)}" alt="첨부 사진" loading="lazy" data-full="${escapeAttr(u)}"
      onerror="this.outerHTML='<div class=&quot;img-expired&quot;><b>사진이 만료되었습니다</b><span>보관 기간 ${CHAT_IMG_KEEP_DAYS}일</span></div>'">`
  ).join('')}</div>`;
}
/* 선택한 파일들을 40KB로 압축해 chat-images에 올리고 URL 배열 반환 */
async function uploadChatImages(files, onMsg){
  const out=[];
  for(let i=0;i<files.length;i++){
    if(onMsg) onMsg(`사진 올리는 중… (${i+1}/${files.length})`);
    const c = await compressImage(files[i], { mode:'contain', dim:CHAT_IMG_DIM, target:CHAT_IMG_TARGET, minQuality:0.4 });
    const ext = c.type==='image/webp' ? 'webp' : 'jpg';
    const path = `${state.user.id}/${Date.now()}_${i}_${Math.random().toString(36).slice(2,6)}.${ext}`;
    const up = await sb.storage.from('chat-images')
      .upload(path, c.blob, { contentType:c.type, cacheControl:'2592000', upsert:false });   // 30일 캐시
    if(up.error) throw up.error;
    out.push(sb.storage.from('chat-images').getPublicUrl(path).data.publicUrl);
  }
  return out;
}

function drawPickTray(trayId, arr, onChange){

/* 파일 선택기 (공통) */
function pickChatImages(arr, onChange, warn){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.multiple=true;
  inp.onchange=()=>{
    for(const f of [...(inp.files||[])]){
      if(!/^image\//.test(f.type||'')) continue;
      if(arr.length>=CHAT_IMG_MAX){ if(warn) warn(`사진은 ${CHAT_IMG_MAX}장까지예요.`); break; }
      if(f.size>IMG_RAW_MAX){ if(warn) warn('25MB 이하 이미지만 올릴 수 있어요.'); continue; }
      arr.push(f);
    }
    onChange();
  };
  inp.click();
}
/* 붙여넣기(Ctrl+V) 공통 */
function bindChatPaste(el, arr, onChange){
  if(!el) return;
  el.addEventListener('paste', e=>{
    const items=(e.clipboardData && e.clipboardData.items)||[];
    const fs=[...items].filter(i=>i.kind==='file' && /^image\//.test(i.type)).map(i=>i.getAsFile()).filter(Boolean);
    if(!fs.length) return;
    e.preventDefault();
    for(const f of fs){ if(arr.length<CHAT_IMG_MAX) arr.push(f); }
    onChange();
  });
}

/* ================== 쪽지함 (2단계) ==================
   A안(메일형): 받은 쪽지를 인박스에서 읽는다. 좌측 목록 → 클릭 시 우측 상세.
   3단계에서 이 목록에 '질문 답변·등급 변경' 등 다른 알림 종류가 합류한다. */
const inbox = { threads:[], sel:null, timer:null, sig:'', msgIds:new Set(), ch:null };
const INBOX_SAFETY_MS = 30000;   // 안전망: 소켓이 잠깐 끊겨 이벤트를 놓쳤을 때만 메꿈(평소엔 아무 것도 안 함)

/* 목록의 '내용 지문'. 이게 그대로면 DOM을 아예 건드리지 않는다 → 깜빡임·재등장 애니메이션 없음 */
function inboxSig(rows){
  return (rows||[]).map(t=>[t.kind,t.ref,t.at,t.unread,t.preview].join('\u0001')).join('\u0002');
}

/* ── Realtime 구독 (폴링 대체) ──────────────────────────────
   RLS가 실시간 이벤트에도 적용되므로, 테이블 전체를 구독해도
   '내 스레드의 쪽지'와 '나에게 온 알림'만 배달된다. */
function subscribeInbox(){
  unsubscribeInbox();
  inbox.ch = sb.channel('inbox-realtime')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'dm_messages' }, async payload=>{
      const m=payload.new||{};
      // 지금 열어둔 대화의 메시지면 그 창에 바로 덧붙인다
      if(inbox.sel==='dm:'+m.thread_id) await refreshOpenThread();
      await loadInbox(true);          // 목록은 변경 있을 때만 다시 그림
      refreshInboxBadge();
    })
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'notifications' }, async ()=>{
      await loadInbox(true);
      refreshInboxBadge();
    })
    .subscribe();
}
function unsubscribeInbox(){ if(inbox.ch){ try{ sb.removeChannel(inbox.ch); }catch(e){} inbox.ch=null; } }

function startInboxPolling(){
  stopInboxPolling();
  subscribeInbox();
  // 실시간이 주력. 이건 이벤트 유실 대비 안전망(30초, 변경 없으면 DOM 미변경)
  inbox.timer = setInterval(async ()=>{
    if(document.hidden) return;
    await loadInbox(true);
    await refreshOpenThread();
  }, INBOX_SAFETY_MS);
}
function stopInboxPolling(){
  if(inbox.timer){ clearInterval(inbox.timer); inbox.timer=null; }
  unsubscribeInbox();
  stopPresence();
}

function dmTime(ts){
  if(!ts) return '';
  const d=new Date(ts), now=new Date();
  const sameDay = d.toDateString()===now.toDateString();
  if(sameDay) return d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
}
async function refreshInboxBadge(){
  const el=$('#inboxBadge'); if(!el) return;
  try{
    let n=0;
    const r1 = await sb.rpc('inbox_unread_total');          // 쪽지 + 알림
    if(r1.error){
      const r2 = await sb.rpc('dm_unread_total');           // 알림 미배포 시 쪽지만
      if(r2.error) throw r2.error;
      n = Number(r2.data)||0;
    } else n = Number(r1.data)||0;
    const txt = n>99 ? '99+' : String(n);
    el.textContent = txt;
    el.style.display = n>0 ? 'inline-flex' : 'none';
    const bb=document.getElementById('botBadge');       // 하단 탭 바 배지도 동기화
    if(bb){ bb.textContent=txt; bb.style.display = n>0 ? 'flex' : 'none'; }
  }catch(_){
    el.style.display='none';
    const bb=document.getElementById('botBadge'); if(bb) bb.style.display='none';
  }   // 미배포 시 조용히 숨김
}

async function loadInbox(quiet=false){
  const list=$('#ibList'); if(!list) return;
  let rows=[];
  try{
    const r = await sb.rpc('list_inbox');                   // 쪽지 + 알림 통합
    if(r.error) throw r.error;
    rows=(r.data||[]);
  }catch(e){
    try{                                                    // 알림 미배포 시 쪽지만이라도 표시
      const r2 = await sb.rpc('list_dm_threads');
      if(r2.error) throw r2.error;
      rows=(r2.data||[]).map(t=>({ kind:'dm', ref:String(t.thread_id), title:t.other_name,
        preview:(t.last_from_me?'나: ':'')+(t.last_body||''), at:t.last_at, unread:t.unread,
        other_id:t.other_id, other_name:t.other_name, other_handle:t.other_handle, other_avatar:t.other_avatar, link:null }));
    }catch(e2){
      if(quiet) return;                       // 폴링 중 일시적 실패는 조용히 무시(화면 유지)
      list.innerHTML='<div class="ip-empty">쪽지·알림 기능이 아직 배포되지 않았습니다.<br>(30_dm.sql · 32_notifications.sql 실행 필요)</div>';
      return;
    }
  }
  inbox.threads=rows;
  const sig=inboxSig(rows);
  if(quiet && sig===inbox.sig){ return; }     // ★ 변경 없음 → 다시 그리지 않음(깜빡임 방지)
  inbox.sig=sig;
  const keepScroll=list.scrollTop;            // 목록 스크롤 위치 보존
  if(!rows.length){ list.innerHTML='<div class="ip-empty">받은 쪽지·알림이 없습니다.</div>'; return; }
  const ICON={ answer:'💬', role:'🎖', notice:'📢' };
  list.innerHTML=rows.map(t=>{
    const isDm = t.kind==='dm';
    const un=Number(t.unread)||0;
    const key=t.kind+':'+t.ref;
    let ava;
    if(isDm){
      const av=avatarFor(t.other_name, t.other_handle);
      const inner = t.other_avatar
        ? `<div class="ib-ava" style="background-image:url('${escapeAttr(t.other_avatar)}')"></div>`
        : `<div class="ib-ava" style="background:${av.bg}">${escapeHtml(av.ch)}</div>`;
      ava = `<span class="ava-wrap">${inner}<span class="pres-dot" data-pres="${escapeAttr(t.other_id)}" title="접속 중"></span></span>`;
    }else{
      // 알림은 '시스템'이라는 발신자가 보낸 쪽지처럼 취급한다
      ava = `<div class="ib-ava" style="background:var(--accent)">${ICON[t.kind]||'🔔'}</div>`;
    }
    const name = isDm
      ? `${escapeHtml(t.other_name||'-')} <span class="muted">@${escapeHtml(t.other_handle||'-')}</span>`
      : `시스템 <span class="muted">@system</span>`;
    return `<div class="ib-item ${un?'unread':''} ${inbox.sel===key?'on':''}" data-key="${escapeAttr(key)}">
      ${ava}
      <div class="ib-body">
        <div class="ib-top"><span class="ib-name">${name}</span><span class="ib-time">${escapeHtml(dmTime(t.at))}</span></div>
        <div class="ib-prev">${escapeHtml(isDm ? (t.preview||'') : (t.title||''))}</div>
      </div>
      ${un?'<span class="ib-dot" title="안 읽음"></span>':''}
    </div>`;
  }).join('');
  list.querySelectorAll('.ib-item').forEach(el=>{
    el.onclick=()=>{
      const item=inbox.threads.find(x=>(x.kind+':'+x.ref)===el.dataset.key);
      if(!item) return;
      if(item.kind==='dm') openDmThread(Number(item.ref));
      else openNotice(item);
    };
  });
  list.scrollTop=keepScroll;
  refreshInboxBadge();
  refreshPresence();          // 다시 그린 목록에 접속 표시 즉시 반영
}

/* 열어둔 대화에 새 메시지가 오면 '그 창에서 즉시' 반영.
   전체를 다시 그리지 않고 새 메시지만 덧붙여서 → 입력 중인 답장·스크롤이 보존된다. */
async function refreshOpenThread(){
  if(!inbox.sel || inbox.sel.indexOf('dm:')!==0) return;
  const tid=Number(inbox.sel.slice(3));
  const box=$('#ipMsgs'); if(!box) return;
  let msgs=[];
  try{
    const { data, error } = await sb.rpc('get_dm_thread', { p_thread_id: tid });
    if(error) throw error;
    msgs=data||[];
  }catch(_){ return; }                                    // 실패는 조용히 무시
  const atBottom = (box.scrollHeight - box.scrollTop - box.clientHeight) < 48;
  let added=false;
  msgs.forEach(m=>{
    if(inbox.msgIds.has(m.id)) return;                    // 이미 그린 건 건너뜀
    inbox.msgIds.add(m.id);
    if(m.body){
      const b=document.createElement('div');
      b.className='dm-b '+(m.from_me?'me':'them');
      b.textContent=m.body;                               // textContent → XSS 안전
      box.appendChild(b);
    }
    if(m.images && m.images.length){                      // 실시간으로 온 사진도 표시
      const wrap=document.createElement('div');
      wrap.innerHTML=msgImagesHTML(m.images, m.created_at, m.from_me);
      const node=wrap.firstElementChild; if(node) box.appendChild(node);
    }
    const t=document.createElement('div');
    t.className='dm-t'+(m.from_me?' me':''); t.textContent=dmTime(m.created_at);
    box.appendChild(t);
    added=true;
  });
  if(added){
    if(atBottom) box.scrollTop=box.scrollHeight;          // 맨 아래를 보고 있었을 때만 따라감
    refreshInboxBadge();
  }
}
