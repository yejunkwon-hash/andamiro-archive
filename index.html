<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안다 아카이브</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit" async defer></script>
<style>
/* ===== 기본 토큰 (wiki.html과 동일) ===== */
:root{
  --accent:#C00000; --accent-soft:#d64a42; --bg:#eef1f5; --card:#ffffff;
  --text:#202124; --text-dim:#5f6368; --border:#e3e6ea; --border-strong:#c9ced6;
  --link:#1e6be0; --link-red:#cc2b2b; --box-bg:#f6f8fa; --infobox-head:#C00000;
  --table-head:#eef1f7; --shadow:0 1px 3px rgba(0,0,0,.08);
}
body.dark{
  --accent:#e05a52; --accent-soft:#ea7d76; --bg:#17181c; --card:#232429;
  --text:#e4e6eb; --text-dim:#9aa0ab; --border:#33353c; --border-strong:#44464e;
  --link:#6ba4ff; --link-red:#ff6b6b; --box-bg:#2a2c33; --infobox-head:#a83232;
  --table-head:#2a2c33; --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,
  'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;}
a{color:var(--link);text-decoration:none;} a:hover{text-decoration:underline;} a.new{color:var(--link-red);}

.topbar{position:sticky;top:0;z-index:50;background:var(--accent);color:#fff;display:flex;align-items:center;gap:14px;padding:0 18px;height:48px;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.topbar .brandwrap{display:flex;align-items:center;gap:10px;flex:none;}
.topbar .refresh{display:inline-flex;align-items:center;justify-content:center;color:#fff;opacity:.9;cursor:pointer;transition:opacity .15s;}
.topbar .refresh:hover{opacity:1;}
.topbar .refresh svg{display:block;}
.topbar .refresh.spinning{animation:andaspin .7s linear infinite;}
@keyframes andaspin{to{transform:rotate(360deg);}}
.topbar .logo{font-weight:800;font-size:17px;letter-spacing:-.5px;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer;}
.topbar .logo .mark{display:inline-flex;align-items:center;justify-content:center;background:#fff;border-radius:0;padding:4px 6px;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.topbar .logo .mark img{height:22px;width:auto;object-fit:contain;display:block;}
.topbar .search{flex:1;max-width:420px;position:relative;}
.topbar .search input{width:100%;height:32px;border:none;border-radius:5px;padding:0 12px;font-size:13.5px;background:rgba(255,255,255,.95);color:#111;}
.topbar .search input:focus{outline:2px solid rgba(255,255,255,.6);}
.topbar .spacer{flex:1;}
.topbar button.mode,.topbar button.logout,.topbar button.navbtn{background:rgba(255,255,255,.14);color:#fff;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;font-size:13px;}
.topbar button.mode:hover,.topbar button.logout:hover,.topbar button.navbtn:hover{background:rgba(255,255,255,.26);}
.topbar .userbox{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#fff;}
.role-badge{background:rgba(255,255,255,.22);padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;}
.usermenu{position:relative;display:flex;align-items:center;gap:9px;}
#userlabel{color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.um-trigger{position:relative;}
.usericon{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.usericon:hover{background:rgba(255,255,255,.30);}
.usermenu-drop{position:absolute;right:0;top:100%;padding-top:8px;min-width:190px;display:none;z-index:60;}
.um-trigger:hover .usermenu-drop,.um-trigger.open .usermenu-drop{display:block;}
.um-trigger.closing .usermenu-drop{display:none;}
.usermenu-drop a{display:block;padding:11px 15px;color:var(--text);font-size:13.5px;cursor:pointer;background:var(--card);border-left:1px solid var(--border);border-right:1px solid var(--border);}
.usermenu-drop a:first-child{border-top:1px solid var(--border);border-radius:8px 8px 0 0;}
.usermenu-drop a:last-child{border-bottom:1px solid var(--border);border-radius:0 0 8px 8px;box-shadow:0 6px 18px rgba(0,0,0,.14);}
.usermenu-drop a+a{border-top:1px solid var(--border);}
.usermenu-drop a:hover{background:var(--box-bg);text-decoration:none;}
.usermenu-drop a.danger{color:var(--link-red);}
@media(max-width:860px){ #userlabel{display:none;} }

/* 페이지 전환 애니메이션 */
@keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#doc.pageIn{animation:pageIn .22s ease;}

/* 대문(랜딩) */
.landing .hero-notice{text-align:center;border:1px solid var(--border);border-radius:10px;background:var(--box-bg);padding:22px 18px;margin-bottom:22px;}
.hn-title{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-.5px;margin-bottom:12px;}
.hn-lines p{margin:5px 0;color:var(--text);font-size:14px;line-height:1.7;}
.hn-lines b{color:var(--accent);}
.landing-grid{display:flex;gap:20px;align-items:flex-start;}
.cats{flex:1;min-width:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.landing-reco{min-height:calc(100vh - 300px);display:flex;flex-direction:column;}
.landing-reco .cat:last-child{flex:1;}
/* 커뮤니티 */
.community{display:flex;gap:16px;align-items:flex-start;}
.chat{flex:1;min-width:0;display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:420px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);}
.chat-head{background:var(--accent);color:#fff;font-weight:800;font-size:14px;padding:10px 14px;}
.chat-log{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.chat-empty{color:var(--text-dim);font-size:13px;text-align:center;margin:auto;}
.chat-log .msg{display:flex;gap:9px;align-items:flex-start;max-width:100%;}
.msg-avatar{flex:none;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;overflow:hidden;}
.msg-main{min-width:0;display:flex;flex-direction:column;gap:3px;}
.msg-who{font-weight:700;font-size:12.5px;color:var(--text);}
.msg-bubble-row{display:flex;align-items:flex-end;gap:6px;}
.msg-bubble{background:var(--card);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:8px 12px;font-size:14px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word;max-width:min(72%,420px);box-shadow:0 1px 2px rgba(0,0,0,.05);}
.msg.mine .msg-bubble{background:#fdeaea;border-color:#f0c8c8;}
body.dark .msg.mine .msg-bubble{background:#3a2626;border-color:#5a3a3a;}
.msg-time{font-size:10.5px;color:var(--text-dim);white-space:nowrap;}
.msg-reactions{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:1px;}
.rpill{display:inline-flex;align-items:center;gap:3px;font-size:12px;background:var(--box-bg);border:1px solid var(--border);border-radius:11px;padding:1px 8px;cursor:pointer;color:var(--text);line-height:1.7;}
.rpill.mine{background:var(--accent);border-color:var(--accent);color:#fff;}
.rpill:hover{border-color:var(--accent);}
.react-wrap{position:relative;display:inline-flex;}
.react-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;font-size:12px;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.react-btn:hover{border-color:var(--accent);color:var(--accent);}
.react-pop{position:absolute;bottom:26px;left:0;display:none;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 6px;box-shadow:var(--shadow);z-index:30;}
.react-pop.open{display:flex;}
.react-opt{border:none;background:transparent;font-size:17px;cursor:pointer;padding:2px 5px;border-radius:6px;line-height:1;}
.react-opt:hover{background:var(--box-bg);}
.react-opt.on{background:var(--box-bg);outline:2px solid var(--accent);}
.chat-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);background:var(--card);}
.chat-input input{flex:1;height:38px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-size:14px;background:var(--card);color:var(--text);}
.chat-input button{border:none;background:var(--accent);color:#fff;border-radius:6px;padding:0 18px;font-weight:700;cursor:pointer;}
.chat-input button:hover{filter:brightness(1.08);}
/* 캘린더 */
.calendar-wrap{width:280px;flex:none;position:sticky;top:64px;}
.cal{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);}
.cal-topbar{display:flex;align-items:center;justify-content:space-between;background:var(--accent);color:#fff;padding:8px 12px;}
.cal-title{font-weight:800;font-size:14px;}
.cal-nav{background:rgba(255,255,255,.18);color:#fff;border:none;width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:11px;line-height:1;}
.cal-nav:hover:not(:disabled){background:rgba(255,255,255,.32);}
.cal-nav:disabled{opacity:.35;cursor:not-allowed;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);padding:1px;}
.cal-dow{background:var(--box-bg);text-align:center;font-size:11px;font-weight:800;padding:6px 0;color:var(--text-dim);}
.cal-cell{background:var(--card);min-height:38px;padding:4px;font-size:12px;color:var(--text);}
.cal-cell.empty{background:var(--box-bg);}
.cal-cell.today .cal-num{background:var(--accent);color:#fff;border-radius:50%;padding:1px 5px;}
.cal-dow.sun,.cal-cell.sun .cal-num{color:#d33;}
.cal-dow.sat,.cal-cell.sat .cal-num{color:#37c;}
.cal-cell.today.sun .cal-num,.cal-cell.today.sat .cal-num{color:#fff;}
.cal-admin{font-size:12px;color:var(--text);padding:9px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.cal-admin.muted{color:var(--text-dim);}
.cal-yr-input{width:64px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--card);color:var(--text);font-size:12px;}
.cal-save{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700;}
.cal-save:hover{filter:brightness(1.08);}
.cal-yr:hover{border-color:var(--accent);}
.cal-range{color:var(--text-dim);font-size:11px;}
.doclist-head{background:var(--accent);color:#fff;font-weight:800;font-size:15px;text-align:center;padding:11px;}
.cat-head{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--accent);color:#fff;border-top:1px solid rgba(255,255,255,.22);padding:9px 14px;}
.cat-name{font-weight:800;font-size:14px;color:#fff;}
.cat-toggle{font-size:12px;color:#fff;white-space:nowrap;}
.cat-toggle .ct-open,.cat-toggle .ct-close{cursor:pointer;opacity:.55;padding:0 1px;}
.cat-toggle .ct-open:hover,.cat-toggle .ct-close:hover{opacity:1;text-decoration:underline;}
.cat:not(.collapsed) .ct-close{opacity:1;font-weight:800;}
.cat.collapsed .ct-open{opacity:1;font-weight:800;}
.cat-body{background:var(--card);}
.cat.collapsed .cat-body{display:none;}
.doc-link{display:flex;align-items:baseline;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;color:var(--text);}
.doc-link:last-child{border-bottom:none;}
.doc-link:hover{background:var(--box-bg);text-decoration:none;}
.dl-title{font-weight:700;color:var(--accent);white-space:nowrap;}
.dl-desc{font-size:12.5px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;}
.recent{width:215px;flex:none;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);}
.recent-h{font-weight:800;font-size:13px;padding:10px 13px;border-bottom:1px solid var(--border);color:var(--text-dim);background:var(--box-bg);}
.rc-item{display:flex;justify-content:space-between;gap:8px;padding:9px 13px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;color:var(--text);}
.rc-item:last-child{border-bottom:none;}
.rc-item:hover{background:var(--box-bg);text-decoration:none;}
.rc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rc-time{color:var(--text-dim);font-size:11px;white-space:nowrap;}
@media(max-width:760px){ .landing-grid{flex-direction:column;} .recent{width:100%;} }

.layout{max-width:1180px;margin:16px auto;padding:0 14px;display:flex;gap:16px;align-items:flex-start;}
.sidebar{width:210px;flex:none;position:sticky;top:64px;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;}
.sidebar h4{margin:0;padding:11px 14px;font-size:12px;color:var(--text-dim);letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--box-bg);}
.sidebar nav a{display:block;padding:9px 14px;color:var(--text);font-size:13.5px;border-bottom:1px solid var(--border);cursor:pointer;}
.sidebar nav a:hover{background:var(--box-bg);text-decoration:none;}
.sidebar nav a.active{color:var(--accent);font-weight:700;border-left:3px solid var(--accent);padding-left:11px;}
.sidebar .addbtn{display:block;width:calc(100% - 20px);margin:10px;padding:8px;border:1px dashed var(--border-strong);background:transparent;color:var(--accent);border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;}
.sidebar .addbtn:hover{background:var(--box-bg);}
.content{flex:1;min-width:0;}
.rightrail{width:217px;flex:none;position:sticky;top:64px;display:flex;flex-direction:column;gap:10px;}
.rightrail .recent{width:100%;box-sizing:border-box;}
.rightrail .addbtn{display:block;width:100%;padding:9px;border:1px dashed var(--border-strong);background:var(--card);color:var(--accent);border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;box-shadow:var(--shadow);}
.rightrail .addbtn:hover{background:var(--box-bg);}
.search-results{position:absolute;top:36px;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);overflow-y:auto;max-height:60vh;z-index:60;}
.search-results a{display:block;padding:9px 12px;color:var(--text);font-size:13.5px;border-bottom:1px solid var(--border);cursor:pointer;}
.search-results a:last-child{border-bottom:none;}
.search-results a:hover{background:var(--box-bg);text-decoration:none;}
.search-results .sr-empty{padding:9px 12px;color:var(--text-dim);font-size:13px;}
.search-results .sr-head{padding:7px 12px;font-size:11px;font-weight:800;letter-spacing:.3px;color:var(--text-dim);background:var(--box-bg);border-bottom:1px solid var(--border);}

.doc{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:22px 28px 34px;}
.doc-head{display:flex;align-items:baseline;flex-wrap:wrap;gap:10px;border-bottom:2px solid var(--accent);padding-bottom:8px;margin-bottom:4px;}
.doc-head h1{margin:0;font-size:26px;letter-spacing:-.5px;}
.doc-head .tabs{margin-left:auto;display:flex;gap:4px;}
.doc-head .tabs button{background:var(--box-bg);border:1px solid var(--border);color:var(--text-dim);font-size:12px;padding:4px 9px;border-radius:5px;cursor:pointer;}
.doc-head .tabs button:hover{border-color:var(--border-strong);color:var(--text);}
.doc-head .tabs button.danger{color:var(--link-red);}
.doc-meta{font-size:12px;color:var(--text-dim);margin:6px 0 14px;}

.notice{background:var(--box-bg);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:4px;padding:9px 14px;font-size:13px;color:var(--text-dim);margin:0 0 18px;}
.notice b{color:var(--text);}
.infobox{float:right;width:290px;margin:0 0 16px 20px;border:1px solid var(--border-strong);border-radius:6px;overflow:hidden;font-size:13px;background:var(--card);}
.infobox .ib-title{background:var(--infobox-head);color:#fff;text-align:center;padding:10px;font-weight:800;font-size:15px;letter-spacing:-.3px;}
.infobox .ib-sub{background:var(--infobox-head);color:rgba(255,255,255,.85);text-align:center;padding:0 10px 9px;font-size:12px;margin-top:-4px;}
.infobox table{width:100%;border-collapse:collapse;}
.infobox th,.infobox td{padding:7px 9px;border-top:1px solid var(--border);vertical-align:top;text-align:left;}
.infobox th{background:var(--table-head);width:34%;color:var(--text-dim);font-weight:700;white-space:nowrap;}

.toc{display:inline-block;min-width:230px;max-width:100%;background:var(--box-bg);border:1px solid var(--border);border-radius:5px;padding:10px 16px 12px;margin:6px 0 22px;}
.toc .toc-title{font-weight:800;font-size:14px;margin-bottom:6px;}
.toc ul{list-style:none;margin:0;padding:0;font-size:13.5px;}
.toc li{padding:1.5px 0;} .toc li.l3{padding-left:16px;} .toc li.l4{padding-left:32px;}
.toc a{color:var(--link);cursor:pointer;} .toc .n{color:var(--text-dim);margin-right:5px;}

.doc h2,.doc h3,.doc h4{scroll-margin-top:64px;cursor:pointer;position:relative;}
.doc h2{font-size:21px;border-bottom:1px solid var(--border-strong);padding-bottom:5px;margin:30px 0 12px;}
.doc h3{font-size:17.5px;border-bottom:1px solid var(--border);padding-bottom:4px;margin:22px 0 10px;}
.doc h4{font-size:15.5px;margin:18px 0 8px;}
.doc h2 .sec-num,.doc h3 .sec-num,.doc h4 .sec-num{color:var(--accent);margin-right:7px;font-weight:800;}
.doc h2 .fold{position:absolute;right:2px;font-size:12px;color:var(--text-dim);font-weight:400;}
.doc .collapsed{display:none;}
.doc p{margin:9px 0;}
.doc ul.body-list,.doc ol.body-list{margin:9px 0;padding-left:24px;}
.doc ul.body-list li,.doc ol.body-list li{margin:4px 0;}
.doc strong{color:var(--text);}
.doc table.wtable{border-collapse:collapse;width:100%;margin:12px 0;font-size:13.5px;}
.doc table.wtable th,.doc table.wtable td{border:1px solid var(--border-strong);padding:7px 10px;vertical-align:top;}
.doc table.wtable th{background:var(--table-head);font-weight:700;}
.doc table.wtable td.y{white-space:nowrap;color:var(--text-dim);width:90px;}
.callout{background:var(--box-bg);border:1px solid var(--border);border-left:4px solid var(--accent-soft);border-radius:4px;padding:11px 15px;margin:14px 0;font-size:14px;}
.callout .ct{font-weight:800;display:block;margin-bottom:3px;color:var(--accent);}
.imgph{background:repeating-linear-gradient(45deg,var(--box-bg),var(--box-bg) 10px,transparent 10px,transparent 20px);border:1px dashed var(--border-strong);border-radius:6px;color:var(--text-dim);display:flex;align-items:center;justify-content:center;text-align:center;min-height:120px;margin:14px 0;font-size:13px;padding:14px;}
.fn{color:inherit;}
.fn-mark{color:var(--link);cursor:help;font-size:11px;vertical-align:super;position:relative;}
.fn-mark:hover::after{content:attr(data-note);position:absolute;left:50%;bottom:150%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:7px 11px;border-radius:6px;font-size:12px;line-height:1.5;width:max-content;max-width:280px;white-space:normal;z-index:20;box-shadow:0 3px 10px rgba(0,0,0,.25);vertical-align:baseline;}
.footnotes{margin-top:34px;border-top:1px solid var(--border);padding-top:14px;font-size:12.5px;color:var(--text-dim);}
.footnotes .fn-item{margin:5px 0;} .footnotes .fn-item b{color:var(--link);margin-right:6px;}
.category{margin-top:26px;background:var(--box-bg);border:1px solid var(--border);border-radius:5px;padding:8px 14px;font-size:12.5px;color:var(--text-dim);}
.category b{color:var(--text-dim);margin-right:6px;} .category a{margin-right:4px;}
.related{list-style:none;padding:0;margin:8px 0;}
.related li{padding:3px 0 3px 18px;position:relative;}
.related li::before{content:"▸";position:absolute;left:0;color:var(--accent);}
footer.site{max-width:1180px;margin:14px auto 30px;padding:0 14px;color:var(--text-dim);font-size:12px;text-align:center;}

/* ===== 로그인 화면 ===== */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.login-card{background:var(--card);border:1px solid var(--border);border-top:4px solid var(--accent);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.12);width:100%;max-width:360px;padding:28px 26px;}
.login-card h1{margin:0 0 4px;font-size:22px;letter-spacing:-.5px;}
.login-card .sub{color:var(--text-dim);font-size:13px;margin-bottom:20px;}
.login-card label{display:block;font-size:12.5px;color:var(--text-dim);margin:12px 0 4px;font-weight:700;}
.login-card input{width:100%;height:38px;border:1px solid var(--border-strong);border-radius:6px;padding:0 11px;font-size:14px;background:var(--card);color:var(--text);}
.login-card input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
.btn{border:none;border-radius:6px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer;}
.btn.primary{background:var(--accent);color:#fff;width:100%;margin-top:18px;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.ghost{background:var(--box-bg);border:1px solid var(--border);color:var(--text);}
.login-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:12.5px;}
.login-row a{cursor:pointer;}
.msg{font-size:13px;margin-top:12px;padding:8px 11px;border-radius:6px;display:none;}
.msg.err{display:block;background:#fdecec;color:#b3261e;border:1px solid #f5c2c0;}
.msg.ok{display:block;background:#eaf6ec;color:#1b7a2f;border:1px solid #bfe3c6;}
body.dark .msg.err{background:#3a2020;color:#ff9a94;border-color:#5a2a2a;}
body.dark .msg.ok{background:#1f3323;color:#8fd39c;border-color:#2f5236;}

/* ===== 편집 폼 ===== */
.editor label{display:block;font-size:12.5px;color:var(--text-dim);font-weight:700;margin:14px 0 4px;}
.editor input,.editor textarea{width:100%;border:1px solid var(--border-strong);border-radius:6px;padding:9px 11px;font-size:14px;background:var(--card);color:var(--text);font-family:inherit;}
.editor textarea{min-height:340px;resize:vertical;line-height:1.6;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;}
.editor .hint{font-size:11.5px;color:var(--text-dim);font-weight:400;margin-left:6px;}
.editor .adv summary{cursor:pointer;font-size:12.5px;color:var(--text-dim);margin-top:14px;}
.editor-actions{display:flex;gap:8px;margin-top:18px;align-items:center;}

/* ===== 역사 패널 ===== */
.history .rev{border:1px solid var(--border);border-radius:6px;padding:10px 13px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.history .rev .meta{font-size:12.5px;color:var(--text-dim);}
.history .rev .meta b{color:var(--text);}
.history .rev button{white-space:nowrap;}
.history .rev button:disabled{opacity:.45;cursor:not-allowed;}
.history .expired{font-size:11.5px;color:var(--text-dim);}

@media(max-width:860px){
  .layout{flex-direction:column;}
  .rightrail{width:100%;position:static;}
  .landing-reco{min-height:0;}
  .community{flex-direction:column;}
  .calendar-wrap{width:100%;position:static;}
  .chat{height:60vh;}
  .infobox{float:none;width:100%;margin:0 0 16px;}
  .doc{padding:18px 16px 28px;}
  .topbar .search{max-width:none;}
  .doc-head h1{font-size:22px;}
}
</style>

<script>
/* ================== 설정 ================== */
const SUPABASE_URL = 'https://vqocngalfxboticcmiwh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_DXLmvZx9AfuAwcSlCD1Zww_RCSl83Lx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===== Cloudflare Turnstile (CAPTCHA) ===== */
const TS_SITEKEY = '0x4AAAAAADxloShb4WCYFvpB';
let liWidget=null, suWidget=null, liToken='', suToken='';
window.onTurnstileLoad = function(){
  renderLoginCaptcha();
  if(document.getElementById('signupCard').style.display!=='none') renderSignupCaptcha();
};
function renderLoginCaptcha(){
  if(window.turnstile && liWidget===null)
    liWidget=turnstile.render('#li-captcha',{sitekey:TS_SITEKEY,callback:t=>{liToken=t;},'expired-callback':()=>{liToken='';},'error-callback':()=>{liToken='';}});
}
function renderSignupCaptcha(){
  if(window.turnstile && suWidget===null)
    suWidget=turnstile.render('#su-captcha',{sitekey:TS_SITEKEY,callback:t=>{suToken=t;},'expired-callback':()=>{suToken='';},'error-callback':()=>{suToken='';}});
}
function resetLoginCaptcha(){ if(window.turnstile && liWidget!==null) turnstile.reset(liWidget); liToken=''; }
function resetSignupCaptcha(){ if(window.turnstile && suWidget!==null) turnstile.reset(suWidget); suToken=''; }

/* 사이드바 표시 순서(원하는 순). 목록에 없는 새 문서는 뒤에 자동 추가 */
const ORDER = ['home','kypt','method','stats','topics','tools'];

const state = { user:null, role:'viewer', email:'', name:'', handle:'', docs:[], key:null, recovery:false };
const $ = s => document.querySelector(s);

/* ================== 인증 ================== */
async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ await onLoggedIn(); } else { showLogin(); }
}
function showLogin(){ $('#login').style.display='flex'; $('#app').style.display='none'; }
function showApp(){ $('#login').style.display='none'; $('#app').style.display='block'; }

async function doLogin(){
  const email=$('#li-email').value.trim(), pw=$('#li-pw').value;
  const msg=$('#li-msg'); msg.className='msg';
  if(!email||!pw){ msg.className='msg err'; msg.textContent='이메일과 비밀번호를 입력하세요.'; return; }
  if(!liToken){ msg.className='msg err'; msg.textContent='보안 확인(CAPTCHA)을 완료해 주세요.'; return; }
  $('#li-btn').disabled=true; $('#li-btn').textContent='로그인 중…';
  const { error } = await sb.auth.signInWithPassword({ email, password:pw, options:{ captchaToken: liToken } });
  $('#li-btn').disabled=false; $('#li-btn').textContent='로그인';
  resetLoginCaptcha();
  if(error){ msg.className='msg err'; msg.textContent='로그인 실패: '+error.message; return; }
  await onLoggedIn();
}
async function doReset(){
  const email=$('#li-email').value.trim(), msg=$('#li-msg');
  if(!email){ msg.className='msg err'; msg.textContent='먼저 이메일을 입력한 뒤 눌러주세요.'; return; }
  if(!liToken){ msg.className='msg err'; msg.textContent='보안 확인(CAPTCHA)을 완료해 주세요.'; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href, captchaToken: liToken });
  resetLoginCaptcha();
  msg.className = error ? 'msg err' : 'msg ok';
  msg.textContent = error ? ('오류: '+error.message) : '재설정 링크를 이메일로 보냈어요. 메일의 링크를 누르면 새 비밀번호를 설정하는 화면으로 이동합니다. (스팸함도 확인) 혹시 메일을 받지 못하였다면 관리자에게 직접 문의하세요.';
}
async function onLoggedIn(){
  const { data:{ user } } = await sb.auth.getUser();
  state.user = user;
  const { data: prof } = await sb.from('profiles').select('role,email,name,handle').eq('id', user.id).single();
  state.role = prof?.role || 'viewer';
  state.email = prof?.email || user.email;
  state.name = prof?.name || '';
  state.handle = prof?.handle || '';
  renderUserbox();
  await loadDocs();
  showApp();
  route();
}
function canEdit(){ return state.role==='editor' || state.role==='admin'; }
function isAdmin(){ return state.role==='admin'; }
function renderUserbox(){
  const who = state.name || state.handle || (state.email ? state.email.split('@')[0] : '') || '회원';
  $('#userlabel').innerHTML = `${escapeHtml(who)} 님 <span class="role-badge" style="background:rgba(255,255,255,.22)">${state.role}</span>`;
  $('#dropAdmin').style.display = isAdmin() ? 'block' : 'none';
}

/* ================== 문서 목록/로드 ================== */
async function loadDocs(){
  const { data, error } = await sb.from('documents').select('key,title');
  if(error){ $('#doc').innerHTML='<p>문서 목록을 불러오지 못했습니다: '+escapeHtml(error.message)+'</p>'; return; }
  const rank = k => { const i=ORDER.indexOf(k); return i<0 ? 999 : i; };
  state.docs = (data||[]).sort((a,b)=> rank(a.key)-rank(b.key) || a.key.localeCompare(b.key));
  buildNav();
}
function buildNav(active){
  const nav=$('#nav'); if(!nav) return;   // 좌측 문서 목록 제거됨 → 호출돼도 안전하게 무시
  nav.innerHTML =
    `<a data-key="main" class="${active==='main'?'active':''}">🏠 대문</a>` +
    state.docs.map(d =>
      `<a data-key="${d.key}" class="${d.key===active?'active':''}">${escapeHtml(d.title||d.key)}</a>`).join('');
  $('#nav').querySelectorAll('a').forEach(a=>a.onclick=()=>{ location.hash='#'+a.dataset.key; });
}

/* 우측 '최근 변경' 레일 (문서 페이지에서만 표시) */
async function fetchRecent(){
  try{ const { data } = await sb.from('documents').select('key,title,updated_at').order('updated_at',{ascending:false}).limit(10); return data||[]; }
  catch(e){ return []; }
}
function renderRightRail(recent){
  const rail=$('#rightrail'); if(!rail) return;
  if(!recent || !recent.length){ rail.style.display='none'; rail.innerHTML=''; return; }
  const rc = recent.map(r=>`<a class="rc-item" data-key="${escapeAttr(r.key)}"><span class="rc-name">${escapeHtml(r.title||r.key)}</span><span class="rc-time">${fmtKST(r.updated_at)}</span></a>`).join('');
  rail.innerHTML = `<div class="recent"><div class="recent-h">최근 변경</div>${rc}</div>`
    + (canEdit()?`<button class="addbtn" id="railAdd">＋ 새 문서</button>`:'');
  rail.style.display='';
  rail.querySelectorAll('.rc-item[data-key]').forEach(a=>a.onclick=()=>{ location.hash='#'+a.dataset.key; });
  const add=$('#railAdd'); if(add) add.onclick=addDoc;
}

async function renderDoc(key){
  const { data: doc, error } = await sb.from('documents').select('*').eq('key', key).single();
  if(error || !doc){ $('#doc').innerHTML='<h1>문서 없음</h1><p>존재하지 않는 문서입니다.</p>'; return; }
  state.key = key;
  const info = doc.infobox, cat = doc.category;
  let infoboxHtml='';
  if(info && info.rows){
    const rows = info.rows.map(r=>`<tr><th>${r[0]}</th><td>${r[1]}</td></tr>`).join('');
    infoboxHtml = `<aside class="infobox"><div class="ib-title">${escapeHtml(info.title||'')}</div>`
      + (info.sub?`<div class="ib-sub">${escapeHtml(info.sub)}</div>`:'')
      + `<table>${rows}</table></aside>`;
  }
  const tabs = [];

/* 목차/각주 (wiki.html과 동일 로직) */
function buildToc(){
  const body=$('#doc').querySelector('.doc-body'); if(!body) return;
  const heads=body.querySelectorAll('h2,h3,h4'); let c2=0,c3=0,c4=0; const items=[];
  heads.forEach(h=>{
    let num='';
    if(h.tagName==='H2'){c2++;c3=0;c4=0;num=`${c2}`;}
    else if(h.tagName==='H3'){c3++;c4=0;num=`${c2}.${c3}`;}
    else{c4++;num=`${c2}.${c3}.${c4}`;}
    const id='sec-'+num.replace(/\./g,'-'); h.id=id;
    const t=h.textContent;
    h.innerHTML=`<span class="sec-num">${num}.</span>${t}`+(h.tagName==='H2'?`<span class="fold">［접기］</span>`:'');
    items.push({level:h.tagName,num,id,text:t});
  });
  if(items.length){
    const lis=items.map(it=>{const cls=it.level==='H3'?'l3':it.level==='H4'?'l4':'';
      return `<li class="${cls}"><a data-target="${it.id}"><span class="n">${it.num}.</span>${it.text}</a></li>`;}).join('');
    $('#doc').querySelector('.toc-slot').innerHTML=`<div class="toc"><div class="toc-title">목차</div><ul>${lis}</ul></div>`;
  }
  $('#doc').querySelectorAll('.toc a').forEach(a=>a.onclick=e=>{e.preventDefault();
    const t=document.getElementById(a.dataset.target); if(t)t.scrollIntoView({behavior:'smooth',block:'start'});});
  body.querySelectorAll('h2').forEach(h=>h.addEventListener('click',()=>{
    let el=h.nextElementSibling; const col=h.classList.toggle('is-collapsed');
    const f=h.querySelector('.fold'); if(f)f.textContent=col?'［펼치기］':'［접기］';
    while(el&&el.tagName!=='H2'){el.classList.toggle('collapsed',col);el=el.nextElementSibling;}
  }));
}
function buildFootnotes(){
  const fns=$('#doc').querySelectorAll('.doc-body .fn'); if(!fns.length) return;
  const list=[];
  fns.forEach((fn,i)=>{const n=i+1,note=fn.dataset.note||'';
    const m=document.createElement('sup');m.className='fn-mark';m.textContent=`[${n}]`;m.dataset.note=note;
    fn.after(m); list.push(`<div class="fn-item" id="fn-${n}"><b>[${n}]</b>${note}</div>`);});
  $('#doc').querySelector('.footnotes-slot').innerHTML=`<div class="footnotes"><b>각주</b>${list.join('')}</div>`;
}

async function saveDoc(key){

  if(rawInfo){ try{ infobox=JSON.parse(rawInfo); }catch(e){ msg.className='msg err'; msg.textContent='정보 틀 JSON 형식 오류: '+e.message; return; } }
  const cat=$('#e-cat').value.split(',').map(s=>s.trim()).filter(Boolean);
  const payload={
    title:$('#e-title').value.trim(),
    eng:$('#e-eng').value.trim()||null,
    notice:$('#e-notice').value.trim()||null,
    body:$('#e-body').value,

    infobox: infobox,

  };

async function addDoc(){
  const key=(prompt('새 문서의 주소(영문 소문자, 예: history)')||'').trim().toLowerCase();
  if(!key) return;
  if(!/^[a-z0-9_-]+$/.test(key)){ alert('주소는 영문 소문자·숫자·-·_ 만 가능해요.'); return; }
  const title=(prompt('문서 제목')||'').trim(); if(!title) return;

    key, title, body:'<h2>개요</h2>\n<p>내용을 작성하세요.</p>', updated_by: state.user.id });
  if(error){ alert('생성 실패: '+error.message); return; }

async function deleteDoc(doc){

/* ================== 역사 / 롤백 ================== */
async function showHistory(key){
  const { data: revs, error } = await sb.from('revisions').select('*').eq('doc_key', key).order('edited_at',{ascending:false});
  if(error){ alert('이력을 불러오지 못했습니다: '+error.message); return; }
  const MONTH = 30*24*3600*1000;
  const rows = (revs||[]).map(r=>{
    const within = (Date.now()-new Date(r.edited_at).getTime()) <= MONTH;
    const who = r.edited_by ? r.edited_by.slice(0,8) : '알 수 없음';
    const rb = canEdit()
      ? (within ? `<button class="btn ghost" data-id="${r.id}">이 버전으로 되돌리기</button>`
                : `<span class="expired">30일 경과 · 롤백 불가</span>`)
      : '';
    return `<div class="rev"><div class="meta"><b>${fmtKST(r.edited_at)}</b> · ${escapeHtml(r.title||'')} · 편집자 ${who}</div>${rb}</div>`;
  }).join('') || '<p>아직 편집 이력이 없습니다. (문서를 한 번 수정하면 이전 버전이 여기에 쌓입니다.)</p>';

  $('#doc').innerHTML = `
    <div class="doc-head"><h1>역사 · ${escapeHtml(key)}</h1>
      <div class="tabs"><button id="backBtn">[문서로]</button></div></div>
    <div class="doc-meta">30일 이내 버전만 되돌릴 수 있습니다. 되돌려도 과거 기록은 지워지지 않습니다.</div>
    <div class="history">${rows}</div>`;
  $('#backBtn').onclick=()=>renderDoc(key);
  $('#doc').querySelectorAll('.history button[data-id]').forEach(b=>b.onclick=()=>doRollback(key, Number(b.dataset.id)));
  window.scrollTo(0,0);
}
async function doRollback(key, revId){
  if(!confirm('이 버전으로 되돌릴까요? 현재 내용은 이력으로 보관됩니다.')) return;
  const { error } = await sb.rpc('rollback_document', { p_key:key, p_revision_id:revId });
  if(error){ alert('되돌리기 실패: '+error.message); return; }
  await loadDocs(); await renderDoc(key);
}

async function dbCheck(label, fn){
  try{ const { error } = await fn(); return healthRow(label, !error, error?error.message:'OK'); }
  catch(e){ return healthRow(label, false, String(e)); }
}
async function fnDebug(name){
  try{
    const r = await fetch(`${SUPABASE_URL}/functions/v1/${name}?debug=1`,
      { headers:{ apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY } });
    return await r.json();
  }catch(e){ return { ok:false, error:String(e) }; }
}
function fnLine(label, res, keys){
  if(!res || !res.diag) return healthRow(label, false, (res&&res.error)?res.error:'함수 응답 없음 (배포/이름/Verify JWT 확인)');
  const parts = keys.map(k=>`${k}: ${res.diag[k]||'-'}`);
  const ok = keys.every(k=>{ const v=res.diag[k]||''; return v.indexOf('❌')<0 && v.indexOf('없음')<0 && v.indexOf('실패')<0 && v.indexOf('예외')<0; });
  return healthRow(label, ok, parts.join(' · '));
}
function healthRow(label, ok, detail){
  return `<div class="rev"><div class="meta"><b>${ok?'✅':'❌'} ${escapeHtml(label)}</b><br><span style="font-size:11.5px">${escapeHtml(detail)}</span></div></div>`;
}

/* ================== 유틸 / 라우팅 ================== */
function fmtKST(iso){ if(!iso) return '-';
  try{ return new Date(iso).toLocaleString('ko-KR',{timeZone:'Asia/Seoul',dateStyle:'medium',timeStyle:'short'}); }
  catch(e){ return iso; } }
function escapeHtml(s){ return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function escapeAttr(s){ return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

/* ---- 채팅 + 반응 ---- */
const EMOJIS=[{code:'heart',glyph:'❤️'},{code:'check',glyph:'✔️'},{code:'thumb',glyph:'👍'},{code:'smile',glyph:'😊'}];
let reactState={};   // mid -> {counts:{code:n}, mine:code|null}

function avatarFor(name, handle){
  const s=String(handle||name||'익명');
  const ch=[...s][0]||'?';
  let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))>>>0;
  return { ch, bg:`hsl(${h%360} 52% 55%)` };
}

async function loadMessages(){
  const log=$('#chatLog'); if(!log) return;
  try{
    const { data, error } = await sb.from('messages')
      .select('id,user_id,author_name,author_handle,body,created_at')
      .order('created_at',{ascending:true}).limit(200);
    if(error) throw error;
    const rows=data||[];
    log.innerHTML = rows.length ? '' : '<div class="chat-empty">아직 메시지가 없습니다. 첫 메시지를 남겨보세요.</div>';
    await loadReactions(rows.map(m=>m.id));
    rows.forEach(m=>appendMessage(m,false));
    scrollChatBottom();
  }catch(e){ log.innerHTML='<div class="chat-empty">메시지를 불러오지 못했습니다. (DB 설정 09_community_chat.sql 실행 여부 확인)</div>'; }
}

function appendMessage(m, doScroll=true){
  const log=$('#chatLog'); if(!log) return;
  const empty=log.querySelector('.chat-empty'); if(empty) empty.remove();
  if(log.querySelector('.msg[data-mid="'+m.id+'"]')) return;   // 중복 방지
  const mine=(state.user && m.user_id===state.user.id);
  const who=escapeHtml(m.author_name || m.author_handle || '익명');
  const av=avatarFor(m.author_name, m.author_handle);
  const el=document.createElement('div');
  el.className='msg'+(mine?' mine':''); el.setAttribute('data-mid', m.id);
  el.innerHTML=`
    <div class="msg-avatar" style="background:${av.bg}">${escapeHtml(av.ch)}</div>
    <div class="msg-main">
      <div class="msg-who">${who}</div>
      <div class="msg-bubble-row">
        <div class="msg-bubble">${escapeHtml(m.body)}</div>
        <span class="msg-time">${fmtKST(m.created_at)}</span>
      </div>
      <div class="msg-reactions" data-mid="${m.id}"></div>
    </div>`;
  log.appendChild(el);
  renderReactions(m.id);
  if(doScroll) scrollChatBottom();
}

function scrollChatBottom(){ const log=$('#chatLog'); if(log) log.scrollTop=log.scrollHeight; }

async function sendMessage(){
  const inp=$('#chatText'); if(!inp || !state.user) return;
  const body=inp.value.trim(); if(!body) return;
  inp.value='';
  try{
    const { error } = await sb.from('messages').insert({ user_id:state.user.id, author_name:state.name||null, author_handle:state.handle||null, body });
    if(error) throw error;   // 실시간 구독으로 곧 화면에 반영됨(본인 메시지 포함)
  }catch(e){ inp.value=body; alert('전송 실패: 로그인 상태와 DB 설정(09_community_chat.sql)을 확인하세요.'); }
}

/* 반응(회원당 최대 1개: 하트/체크/엄지/웃음) */
async function loadReactions(ids){
  reactState={};
  if(!ids || !ids.length) return;
  try{
    const { data } = await sb.from('message_reactions').select('message_id,user_id,emoji').in('message_id', ids);
    (data||[]).forEach(r=>{
      const s=reactState[r.message_id] || (reactState[r.message_id]={counts:{},mine:null});
      s.counts[r.emoji]=(s.counts[r.emoji]||0)+1;
      if(state.user && r.user_id===state.user.id) s.mine=r.emoji;
    });
  }catch(e){}
}
function renderReactions(mid){
  const box=document.querySelector('.msg-reactions[data-mid="'+mid+'"]'); if(!box) return;
  const s=reactState[mid] || {counts:{},mine:null};
  const pills=EMOJIS.filter(e=>s.counts[e.code]>0).map(e=>
    `<button class="rpill${s.mine===e.code?' mine':''}" data-mid="${mid}" data-emoji="${e.code}">${e.glyph} ${s.counts[e.code]}</button>`).join('');
  const pop=EMOJIS.map(e=>`<button class="react-opt${s.mine===e.code?' on':''}" data-mid="${mid}" data-emoji="${e.code}">${e.glyph}</button>`).join('');
  box.innerHTML = pills + `<span class="react-wrap"><button class="react-btn" data-mid="${mid}" title="반응 남기기">＋</button><span class="react-pop">${pop}</span></span>`;
  box.querySelectorAll('.rpill,.react-opt').forEach(b=>b.onclick=(ev)=>{ ev.stopPropagation(); toggleReaction(b.dataset.mid, b.dataset.emoji); });
  const rb=box.querySelector('.react-btn');
  if(rb) rb.onclick=(ev)=>{ ev.stopPropagation(); const pop=box.querySelector('.react-pop'); const willOpen=!pop.classList.contains('open'); closeAllReactPops(); if(willOpen) pop.classList.add('open'); };
}
function closeAllReactPops(){ document.querySelectorAll('.react-pop.open').forEach(p=>p.classList.remove('open')); }
document.addEventListener('click',closeAllReactPops);

async function toggleReaction(mid, emoji){
  if(!state.user) return;
  mid=parseInt(mid,10);
  const s=reactState[mid] || {counts:{},mine:null};
  try{
    if(s.mine===emoji){
      const { error } = await sb.from('message_reactions').delete().eq('message_id',mid).eq('user_id',state.user.id);
      if(error) throw error;
    } else {
      const { error } = await sb.from('message_reactions').upsert({ message_id:mid, user_id:state.user.id, emoji }, { onConflict:'message_id,user_id' });
      if(error) throw error;
    }
    await refreshReactionsFor(mid);
  }catch(e){ alert('반응 처리 실패: DB 설정(10_message_reactions.sql) 실행 여부를 확인하세요.'); }
}
async function refreshReactionsFor(mid){
  mid=parseInt(mid,10);
  try{
    const { data } = await sb.from('message_reactions').select('user_id,emoji').eq('message_id',mid);
    const s={counts:{},mine:null};
    (data||[]).forEach(r=>{ s.counts[r.emoji]=(s.counts[r.emoji]||0)+1; if(state.user&&r.user_id===state.user.id) s.mine=r.emoji; });
    reactState[mid]=s;
  }catch(e){}
  renderReactions(mid);
}

function subscribeChat(){
  unsubscribeChat();
  chatChannel = sb.channel('community-realtime')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, payload=>appendMessage(payload.new, true))
    .on('postgres_changes', { event:'*', schema:'public', table:'message_reactions' }, payload=>{
      const mid=(payload.new&&payload.new.message_id) || (payload.old&&payload.old.message_id);
      if(mid && document.querySelector('.msg-reactions[data-mid="'+mid+'"]')) refreshReactionsFor(mid);
    })
    .subscribe();
}

/* ---- 캘린더 ---- */
async function loadBaseYear(){
  try{
    const { data, error } = await sb.from('app_settings').select('value').eq('key','calendar_base_year').maybeSingle();
    if(!error && data && data.value!=null){ const y=parseInt(String(data.value),10); if(y) community.baseYear=y; }
  }catch(e){}
}
function calMove(delta){
  const min=(community.baseYear-5)*12+0, max=(community.baseYear+5)*12+11;
  const total=community.viewY*12+community.viewM+delta;
  if(total<min || total>max) return;
  community.viewY=Math.floor(total/12); community.viewM=((total%12)+12)%12; renderCalendar();
}
async function setBaseYear(y){
  if(!isAdmin() || y<2000 || y>2100) return;
  try{
    const { error } = await sb.from('app_settings').update({ value:y, updated_at:new Date().toISOString(), updated_by:state.user.id }).eq('key','calendar_base_year');
    if(error) throw error;
    community.baseYear=y; community.viewY=y;
    const minY=y-5, maxY=y+5;
    if(community.viewY<minY){ community.viewY=minY; community.viewM=0; }
    if(community.viewY>maxY){ community.viewY=maxY; community.viewM=11; }
    renderCalendar();
  }catch(e){ alert('기준연도 변경 실패: admin 권한/DB 설정을 확인하세요.'); }
}
function renderCalendar(){
  const wrap=$('#calWrap'); if(!wrap) return;
  const y=community.viewY, m=community.viewM;
  const startDow=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const minY=community.baseYear-5, maxY=community.baseYear+5;
  const atMin=(y===minY && m===0), atMax=(y===maxY && m===11);
  const wd=['일','월','화','수','목','금','토'];
  let cells=wd.map((d,i)=>`<div class="cal-dow${i===0?' sun':''}${i===6?' sat':''}">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) cells+='<div class="cal-cell empty"></div>';
  const t=new Date();
  for(let d=1;d<=days;d++){
    const isToday=(t.getFullYear()===y && t.getMonth()===m && t.getDate()===d);
    const dow=(startDow+d-1)%7;
    cells+=`<div class="cal-cell${isToday?' today':''}${dow===0?' sun':''}${dow===6?' sat':''}"><span class="cal-num">${d}</span></div>`;
  }
  const admin = isAdmin()
    ? `<div class="cal-admin">기준연도 <input class="cal-yr-input" id="byInput" type="number" value="${community.baseYear}" min="2000" max="2100"><button class="cal-save" id="bySave">저장</button> <span class="cal-range">(${minY}~${maxY})</span></div>`
    : `<div class="cal-admin muted">기준연도 ${community.baseYear} · 이동범위 ${minY}~${maxY}</div>`;
  wrap.innerHTML=`
    <div class="cal">
      <div class="cal-topbar">
        <button class="cal-nav" id="calPrev" ${atMin?'disabled':''} aria-label="이전 달">▲</button>
        <div class="cal-title">${y}년 ${m+1}월</div>
        <button class="cal-nav" id="calNext" ${atMax?'disabled':''} aria-label="다음 달">▼</button>
      </div>
      <div class="cal-grid">${cells}</div>
      ${admin}
    </div>`;
  const p=$('#calPrev'), n=$('#calNext');
  if(p) p.onclick=()=>calMove(-1);
  if(n) n.onclick=()=>calMove(1);
  if(isAdmin()){ const sv=$('#bySave'), inp=$('#byInput');
    if(sv) sv.onclick=()=>{ const v=parseInt(inp.value,10); if(v) setBaseYear(v); };
    if(inp) inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const v=parseInt(inp.value,10); if(v) setBaseYear(v); } });
  }
}

$('#modeBtn').onclick=()=>{ const d=document.body.classList.toggle('dark'); $('#modeBtn').textContent=d?'☀ 주간':'🌙 야간'; };
/* 상단 검색: 한글 자모 분해 부분일치 + 호버 시 랜덤 추천 */
const searchBox=$('#search');
const _CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const _JUNG=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const _JONG=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function _jamo(str){ let out=''; for(const ch of String(str)){ const c=ch.charCodeAt(0);
    if(c>=0xAC00 && c<=0xD7A3){ const s=c-0xAC00; out+=_CHO[Math.floor(s/588)]+_JUNG[Math.floor((s%588)/28)]+_JONG[s%28]; }
    else out+=ch; } return out; }
function _norm(s){ return _jamo(String(s).toLowerCase().replace(/\s+/g,'')); }   // 띄어쓰기 제거 + 자모 분해
function searchDocs(q){ const nq=_norm(q); if(!nq) return [];
  return (state.docs||[]).filter(d=> _norm(d.title||'').includes(nq) || _norm(d.key).includes(nq)).slice(0,8); }
function randomDocs(n){ const a=[...(state.docs||[])];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a.slice(0,n); }
function closeSearchResults(){ const d=$('#searchResults'); if(d) d.remove(); }
function goSearchHit(key){ location.hash='#'+key; searchBox.value=''; closeSearchResults(); }
function _renderResults(items, headLabel){
  closeSearchResults();
  const wrap=document.createElement('div'); wrap.id='searchResults'; wrap.className='search-results';
  const head = headLabel ? `<div class="sr-head">${headLabel}</div>` : '';
  wrap.innerHTML = items.length
    ? head + items.map(d=>`<a data-key="${escapeAttr(d.key)}">${escapeHtml(d.title||d.key)}</a>`).join('')
    : '<div class="sr-empty">검색 결과 없음</div>';
  searchBox.parentElement.appendChild(wrap);
  wrap.querySelectorAll('a[data-key]').forEach(a=>a.onclick=()=>goSearchHit(a.dataset.key));
}
function showRecommend(){ if(searchBox.value.trim()) return; const r=randomDocs(5); if(r.length) _renderResults(r,'추천 문서'); }
searchBox.addEventListener('input',()=>{ const q=searchBox.value.trim(); if(!q){ showRecommend(); return; } _renderResults(searchDocs(q), null); });
searchBox.addEventListener('mouseenter', showRecommend);
searchBox.addEventListener('focus', showRecommend);
searchBox.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const first=document.querySelector('#searchResults a[data-key]'); if(first) goSearchHit(first.dataset.key); }
  else if(e.key==='Escape'){ closeSearchResults(); } });
(function(){ const sc=searchBox.parentElement;
  sc.addEventListener('mouseleave',()=>{ if(document.activeElement!==searchBox) closeSearchResults(); }); })();
document.addEventListener('click',e=>{ const sc=document.querySelector('.topbar .search'); if(sc && !sc.contains(e.target)) closeSearchResults(); });

/* 비밀번호 재설정 링크로 들어온 경우: 즉시 비번 변경 화면으로 고정 */
sb.auth.onAuthStateChange(async (event) => {
  if(event === 'PASSWORD_RECOVERY'){
    state.recovery = true;
    await onLoggedIn();          // showApp → route → (recovery 가드) → 비번 변경 화면
    location.hash = '#password';
    renderPassword();
  }
});

/* 문서 전환 애니메이션: #doc 내용이 바뀔 때마다 재생 */
(function(){
  const d=$('#doc');
  if(d) new MutationObserver(()=>{ stopLoading(); d.classList.remove('pageIn'); void d.offsetWidth; d.classList.add('pageIn'); }).observe(d,{childList:true});
})();
if($('#refreshMark')) $('#refreshMark').onclick=()=>route();   // 수동 새로고침

init();
</script>
