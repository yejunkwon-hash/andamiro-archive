/* ============ '입력 중' 표시 (커뮤니티 · 질문게시판) ============
   ★DB에 쓰지 않는다. Realtime broadcast(휘발성)로만 주고받아 저장 0바이트.
   쪽지함은 제외 — 상대에게 '지금 보고 있음'이 노출되는 걸 원치 않기로 합의. */
const typing = { peers:new Map(), lastSent:0, idleTimer:null, tick:null };
const TYPING_THROTTLE = 2000;   // 최대 2초에 한 번만 신호(실시간 쿼터 보호)
const TYPING_EXPIRE   = 4000;   // 4초간 신호 없으면 '멈춤'으로 간주

/* 주격 조사: 받침 있으면 '이', 없으면 '가'  (민지가 / 홍길동이) */
function subjParticle(name){
  const c=String(name||'').trim().slice(-1);
  if(!c) return '이';
  const code=c.charCodeAt(0);
  if(code>=0xAC00 && code<=0xD7A3) return ((code-0xAC00)%28)===0 ? '가' : '이';
  return '이';
}
function typingText(){
  const now=Date.now();
  const live=[...typing.peers.values()].filter(p=>now-p.at < TYPING_EXPIRE);
  if(!live.length) return '';
  const first=live[0].name||'회원';
  if(live.length===1) return `${first}${subjParticle(first)} 입력 중<span class="tdot">…</span>`;
  return `${first} 외 ${live.length-1}명이 입력 중<span class="tdot">…</span>`;
}
function renderTyping(){
  const bar=$('#typingBar'); if(!bar) return;
  const now=Date.now();
  for(const [k,v] of typing.peers) if(now-v.at >= TYPING_EXPIRE) typing.peers.delete(k);
  bar.innerHTML=typingText();
}
/* 내가 입력할 때 신호 보내기 (스로틀) */
function sendTyping(){
  if(!chatChannel || !state.user) return;
  const now=Date.now();
  if(now - typing.lastSent < TYPING_THROTTLE) return;
  typing.lastSent=now;
  try{
    chatChannel.send({ type:'broadcast', event:'typing',
      payload:{ id:state.user.id, name:(state.handle||state.name||'회원') } });
  }catch(e){}
  clearTimeout(typing.idleTimer);
  typing.idleTimer=setTimeout(sendTypingStop, TYPING_EXPIRE);
}
function sendTypingStop(){
  if(!chatChannel || !state.user) return;
  typing.lastSent=0;
  try{ chatChannel.send({ type:'broadcast', event:'typing_stop', payload:{ id:state.user.id } }); }catch(e){}
}
function resetTyping(){
  typing.peers.clear();
  clearTimeout(typing.idleTimer);
  if(typing.tick){ clearInterval(typing.tick); typing.tick=null; }
  const bar=$('#typingBar'); if(bar) bar.innerHTML='';
}

/* ================== 질문 게시판 (4단계) ==================
   답변은 messages 테이블을 재사용한다(question_id != null). community.qid가 현재 스레드. */
const Q_IMG_BUDGET = 100*1024;   // 질문 하나당 이미지 합계 상한
const Q_IMG_MAX    = 10;         // 장수 상한(합계 100KB를 나눠 쓰므로 현실적 한계)

/* 여러 장을 합계 budget 이하로 자동 압축. 장변을 단계적으로 줄이며 예산에 맞춘다. */
async function compressImagesToBudget(files, budget=Q_IMG_BUDGET){
  const n=files.length; if(!n) return [];
  const per=Math.floor(budget/n);
  for(const dim of [1280, 960, 720, 540, 400]){
    const outs=[];
    for(const f of files) outs.push(await compressImage(f, { mode:'contain', dim, target:per, minQuality:0.4 }));
    const total=outs.reduce((s,o)=>s+o.blob.size, 0);
    if(total<=budget) return outs;
  }
  throw new Error(`이미지 ${n}장을 합계 100KB 안에 담을 수 없어요. 장수를 줄여 주세요.`);
}

async function deleteQuestion(qid, images){
  const ok=await confirmModal('질문을 삭제하시겠습니까?','답변과 첨부 이미지도 함께 삭제되며 되돌릴 수 없습니다.');
  if(!ok) return;
  try{
    const { data, error } = await sb.rpc('delete_question', { p_id: qid });
    if(error) throw error;
    // 고아 파일 방지: Storage 이미지도 함께 제거
    const urls = data || images || [];
    const paths = urls.map(u=>{ const i=String(u).indexOf('/question-images/'); return i<0?null:String(u).slice(i+17).split('?')[0]; }).filter(Boolean);
    if(paths.length){ try{ await sb.storage.from('question-images').remove(paths); }catch(_){} }
    location.hash='#community';
  }catch(e){ alert('삭제 실패: '+((e&&e.message)||e)); }
}

/* 질문 작성 모달 (정중앙) — 제목 + 내용 + 이미지 여러 장(합계 100KB 자동 압축) */
function openQuestionCompose(){
  let picked=[];
  const ov=document.createElement('div'); ov.className='qc-ov';
  ov.innerHTML=`<div class="qc-drawer">
    <div class="modal-msg">질문하기</div>
    <div class="modal-sub">이미지는 <b>몇 장이든</b> 올릴 수 있어요. 질문 하나당 합계 <b>100KB</b>가 되도록 자동으로 압축됩니다.</div>
    <input id="qcTitle" type="text" maxlength="200" placeholder="질문 제목" style="width:100%;margin-top:12px;padding:9px 10px;border:1px solid var(--border-strong);border-radius:8px;font:inherit;font-size:14px;background:var(--card);color:var(--text)">
    <textarea id="qcBody" rows="5" maxlength="4000" placeholder="궁금한 내용을 자세히 적어주세요…" style="width:100%;margin-top:8px;padding:10px;border:1px solid var(--border-strong);border-radius:8px;font:inherit;font-size:14px;resize:vertical;background:var(--card);color:var(--text)"></textarea>
    <div style="margin-top:8px"><button class="btn ghost" id="qcPick">이미지 추가</button>
      <input type="file" id="qcFile" accept="image/*" multiple style="display:none"></div>
    <div class="qc-thumbs" id="qcThumbs"></div>
    <div class="modal-sub" id="qcMsg" style="min-height:16px"></div>
    <div class="modal-btns">
      <button class="modal-cancel" id="qcCancel">취소</button>
      <button class="modal-ok" id="qcOk">올리기</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener('click', e=>{ if(e.target===ov) close(); });
  const msg=ov.querySelector('#qcMsg');
  ov.querySelector('#qcCancel').onclick=close;
  ov.querySelector('#qcPick').onclick=()=>ov.querySelector('#qcFile').click();
  ov.querySelector('#qcTitle').focus();

  const drawThumbs=()=>{
    const box=ov.querySelector('#qcThumbs');
    box.innerHTML=picked.map((f,i)=>`<div class="qc-thumb"><img src="${URL.createObjectURL(f)}" alt=""><button class="qc-x" data-i="${i}">×</button></div>`).join('');
    box.querySelectorAll('.qc-x').forEach(b=>b.onclick=()=>{ picked.splice(Number(b.dataset.i),1); drawThumbs(); });
    msg.textContent = picked.length ? `${picked.length}장 선택됨 — 올릴 때 합계 100KB로 압축됩니다.` : '';
  };
  ov.querySelector('#qcFile').onchange=e=>{
    const fs=[...(e.target.files||[])].filter(f=>/^image\//.test(f.type||''));
    e.target.value='';
    for(const f of fs){
      if(picked.length>=Q_IMG_MAX){ msg.textContent=`이미지는 ${Q_IMG_MAX}장까지예요.`; break; }
      if(f.size>IMG_RAW_MAX){ msg.textContent='25MB 이하 이미지만 올릴 수 있어요.'; continue; }
      picked.push(f);
    }
    drawThumbs();
  };

  ov.querySelector('#qcOk').onclick=async()=>{
    const title=(ov.querySelector('#qcTitle').value||'').trim();
    const body=(ov.querySelector('#qcBody').value||'').trim();
    if(!title){ msg.textContent='제목을 입력해 주세요.'; return; }
    const btn=ov.querySelector('#qcOk'); btn.disabled=true;
    try{
      let urls=[];
      if(picked.length){
        msg.textContent='이미지 압축 중…';
        const outs=await compressImagesToBudget(picked, Q_IMG_BUDGET);
        const total=outs.reduce((s,o)=>s+o.blob.size,0);
        msg.textContent=`업로드 중… (합계 ${(total/1024).toFixed(0)}KB)`;
        const stamp=Date.now();
        for(let i=0;i<outs.length;i++){
          const ext = outs[i].type==='image/webp' ? 'webp' : 'jpg';
          const path = `${state.user.id}/${stamp}_${i}.${ext}`;
          const up=await sb.storage.from('question-images')
            .upload(path, outs[i].blob, { contentType: outs[i].type, cacheControl:'31536000', upsert:false });
          if(up.error) throw up.error;
          const pub=sb.storage.from('question-images').getPublicUrl(path);
          urls.push(pub.data.publicUrl);
        }
      }
      msg.textContent='등록 중…';
      const { data, error } = await sb.rpc('create_question', { p_title:title, p_body:body, p_images:urls });
      if(error) throw error;
      close();
      location.hash='#q/'+data;
    }catch(e){ msg.textContent='실패: '+((e&&e.message)||e); btn.disabled=false; }
  };
}

/* ---- 채팅 내부 콘텐츠 배율 (축소/확대) : 창 크기는 고정, 프로필사진·텍스트·말풍선만 스케일 ---- */
const CHAT_SCALE=[0.6,0.7,0.8,0.9,1,1.1,1.2,1.3,1.4];
function applyChatSize(){
  const i=Math.max(0,Math.min(CHAT_SCALE.length-1, community.chatSize|0));
  document.documentElement.style.setProperty('--chat-scale', String(CHAT_SCALE[i]));
  const d=$('#cszDown'), u=$('#cszUp');
  if(d) d.disabled=(i<=0); if(u) u.disabled=(i>=CHAT_SCALE.length-1);
}
function changeChatSize(delta){
  community.chatSize=Math.max(0,Math.min(CHAT_SCALE.length-1,(community.chatSize|0)+delta));
  try{ localStorage.setItem('andachat_size2', String(community.chatSize)); }catch(e){}
  applyChatSize();
}
function initChatSize(){
  try{ const v=localStorage.getItem('andachat_size2'); if(v!==null){ const n=parseInt(v,10); if(!isNaN(n)) community.chatSize=n; } }catch(e){}
  const d=$('#cszDown'), u=$('#cszUp');
  if(d) d.onclick=()=>changeChatSize(-1);
  if(u) u.onclick=()=>changeChatSize(1);
  applyChatSize();
}

/* ---- 메세지 삭제 권한: admin·owner만, 그리고 내 서열 > 작성자 서열 ----
   (admin→viewer·editor / owner→viewer·editor·admin. owner 메세지·본인 메세지는 삭제 불가) */
const roleCache={};   // user_id -> role
async function prefetchRoles(ids){
  if(!isAdmin()) return;   // 삭제 가능자(admin+)만 작성자 등급이 필요
  const need=[...new Set((ids||[]).filter(Boolean))].filter(u=>!(u in roleCache));
  if(!need.length) return;
  try{ const { data } = await sb.from('profiles').select('id,role').in('id', need); (data||[]).forEach(p=>{ roleCache[p.id]=p.role||'viewer'; }); }catch(e){}
  need.forEach(u=>{ if(!(u in roleCache)) roleCache[u]='viewer'; });
}
async function ensureRole(uid){
  if(!isAdmin() || !uid || (uid in roleCache)) return;
  roleCache[uid]='viewer';   // 재요청 방지(임시) → 실제값으로 덮어씀
  try{ const { data } = await sb.from('profiles').select('role').eq('id',uid).single(); roleCache[uid]=(data&&data.role)||'viewer'; }catch(e){}
  refreshMsgDelete(uid);
}
function canDeleteMsg(m){
  if(!m || !m.user_id) return false;
  if(state.user && m.user_id===state.user.id) return true;   // 본인 메세지는 등급 무관 항상 삭제 가능
  if(!isAdmin()) return false;                                // 남의 메세지는 admin·owner만
  const r=roleCache[m.user_id]; if(r===undefined) return false;
  return myRank() > roleRank(r);                              // 내 서열 > 작성자 서열
}
/* 작성자 등급이 뒤늦게 확인됐을 때, 해당 사용자의 메세지들에 삭제버튼을 추가/제거 */
function refreshMsgDelete(uid){
  const allow = isAdmin() && roleRank(roleCache[uid]) < myRank();
  document.querySelectorAll('.msg[data-uid="'+uid+'"]').forEach(el=>{
    const row=el.querySelector('.msg-bubble-row'); if(!row) return;
    const has=row.querySelector('.msg-del');
    if(allow && !has){
      const b=document.createElement('button'); b.className='msg-del'; b.title='메세지 삭제'; b.innerHTML=ic('trash');
      b.onclick=()=>deleteMessage({ id:el.getAttribute('data-mid'), user_id:uid });
      row.appendChild(b);
    } else if(!allow && has){ has.remove(); }
  });
}

/* ---- 채팅 + 반응 ---- */
const EMOJIS=[{code:'heart',glyph:'❤️'},{code:'check',glyph:'✔️'},{code:'thumb',glyph:'👍'},{code:'smile',glyph:'😊'}];
let reactState={};   // mid -> {counts:{code:n}, mine:code|null}

function avatarFor(name, handle){
  const s=String(handle||name||'익명');
  const ch=[...s][0]||'?';
  let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))>>>0;
  return { ch, bg:`hsl(${h%360} 52% 55%)` };
}

/* 채팅 아바타: user_id -> avatar_url 캐시 (프로필 사진 반영) */
const avatarCache = {};
/* 채팅 표시명: user_id -> {handle,name} 라이브 캐시 (활동명 변경 즉시 반영) */
const nameCache = {};
function liveWho(m){
  const p=nameCache[m.user_id];
  return escapeHtml((p&&(p.handle||p.name)) || m.author_handle || m.author_name || '익명');
}
function applyName(uid){
  const p=nameCache[uid]; if(!uid||!p) return;
  const who=(p.handle||p.name||'익명');
  document.querySelectorAll('.msg[data-uid="'+uid+'"] .msg-who').forEach(el=>{ el.textContent=who; });
}
function msgAvatarHTML(m){
  const url=avatarCache[m.user_id];
  if(url) return `<div class="msg-avatar" style="background-image:url('${escapeAttr(url)}')"></div>`;
  const p=nameCache[m.user_id];
  const av=avatarFor((p&&p.name)||m.author_name, (p&&p.handle)||m.author_handle);
  return `<div class="msg-avatar" style="background:${av.bg}">${escapeHtml(av.ch)}</div>`;
}
function applyAvatar(uid){
  const url=avatarCache[uid]; if(!uid||!url) return;
  document.querySelectorAll('.msg[data-uid="'+uid+'"] .msg-avatar').forEach(el=>{
    el.textContent=''; el.style.background=''; el.style.backgroundImage="url('"+url+"')";
  });
}
async function ensureAvatar(uid){
  if(!uid || (uid in avatarCache)) return;
  avatarCache[uid]=null;   // 재요청 방지
  try{
    const { data } = await sb.from('members_public').select('name,handle,avatar_url').eq('id', uid).single();
    avatarCache[uid]=(data&&data.avatar_url)?data.avatar_url:null;
    if(data) nameCache[uid]={handle:data.handle||'',name:data.name||''};
  }catch(e){}
  applyAvatar(uid); applyName(uid);
}
async function prefetchAvatars(ids){
  const need=[...new Set((ids||[]).filter(Boolean))].filter(u=>!(u in avatarCache));
  if(!need.length) return;
  try{
    const { data } = await sb.from('members_public').select('id,name,handle,avatar_url').in('id', need);
    (data||[]).forEach(p=>{ avatarCache[p.id]=p.avatar_url||null; nameCache[p.id]={handle:p.handle||'',name:p.name||''}; });
  }catch(e){}
  need.forEach(u=>{ if(!(u in avatarCache)) avatarCache[u]=null; });
}

async function loadMessages(){
  const log=$('#chatLog'); if(!log) return;
  try{
    const q = community.qid || null;                       // null=커뮤니티 채팅, 숫자=질문 답변 스레드
    let sel = sb.from('messages')
      .select('id,user_id,author_name,author_handle,body,created_at,kind,question_id,images');
    sel = q ? sel.eq('question_id', q) : sel.is('question_id', null);
    const { data, error } = await sel.order('created_at',{ascending:false}).limit(200);
    if(error) throw error;
    const rows=(data||[]).reverse();   // 최신 200개를 오래된→최신 순으로 표시
    log.innerHTML = rows.length ? '' : '<div class="chat-empty">아직 메시지가 없습니다. 첫 메시지를 남겨보세요.</div>';
    await loadReactions(rows.map(m=>m.id));
    await prefetchAvatars(rows.map(m=>m.user_id));
    await prefetchRoles(rows.map(m=>m.user_id));   // 작성자 등급(삭제 권한 판정용)
    rows.forEach(m=>appendMessage(m,false));
    scrollChatBottom();
  }catch(e){ log.innerHTML='<div class="chat-empty">메시지를 불러오지 못했습니다. (DB 설정 09_community_chat.sql 실행 여부 확인)</div>'; }
}

function appendMessage(m, doScroll=true){
  const log=$('#chatLog'); if(!log) return;
  const empty=log.querySelector('.chat-empty'); if(empty) empty.remove();
  if(log.querySelector('[data-mid="'+m.id+'"]')) return;   // 중복 방지(일반·시스템 공통)
  if(m.kind==='system'){                                   // 시스템 공지: 회색·중앙 정렬
    const s=document.createElement('div');
    s.className='msg-system'; s.setAttribute('data-mid', m.id);
    s.innerHTML=`<span>${escapeHtml(m.body||'')}</span>`;
    log.appendChild(s);
    if(doScroll) scrollChatBottom();
    return;
  }
  const mine=(state.user && m.user_id===state.user.id);
  const canDel = canDeleteMsg(m);   // admin·owner만 + 내 서열 > 작성자 서열
  const who=liveWho(m);             // 활동명 라이브 조회(변경 즉시 반영), 폴백=저장 스냅샷
  const el=document.createElement('div');
  el.className='msg'+(mine?' mine':''); el.setAttribute('data-mid', m.id); el.setAttribute('data-uid', m.user_id||'');
  el.innerHTML=`
    ${msgAvatarHTML(m)}
    <div class="msg-main">
      <div class="msg-who">${who}</div>
      <div class="msg-bubble-row">
        ${m.body?`<div class="msg-bubble">${escapeHtml(m.body)}</div>`:''}${msgImagesHTML(m.images, m.created_at, mine)}
        <span class="msg-time">${fmtKST(m.created_at)}</span>
        ${canDel?`<button class="msg-del" title="메세지 삭제">${ic('trash')}</button>`:''}
      </div>
      <div class="msg-reactions" data-mid="${m.id}"></div>
    </div>`;
  log.appendChild(el);
  if(!mine && m.user_id){   // 본인 제외: 아바타/활동명 클릭 → 해당 회원 프로필
    const go=()=>{ location.hash='#member/'+m.user_id; };
    const av=el.querySelector('.msg-avatar'), wh=el.querySelector('.msg-who');
    if(av){ av.classList.add('go-profile'); av.onclick=go; }
    if(wh){ wh.classList.add('go-profile'); wh.onclick=go; }
  }
  if(canDel){ const db=el.querySelector('.msg-del'); if(db) db.onclick=()=>deleteMessage(m); }
  else if(isAdmin() && m.user_id && !(m.user_id in roleCache)) ensureRole(m.user_id);   // 실시간 신규 메세지: 작성자 등급 확인 후 버튼 반영
  if(m.user_id && !(m.user_id in avatarCache)) ensureAvatar(m.user_id);
  renderMath(el.querySelector('.msg-bubble'));
  renderReactions(m.id);
  if(doScroll) scrollChatBottom();
}

/* KaTeX 온디맨드 로더 — 예전엔 head에서 전 페이지에 즉시 로드(≈280KB)했지만,
   실제 사용처는 '수식이 들어있는 채팅·문서'뿐이다. 처음 필요할 때 1회만 받아온다.
   → 로그인·대문·회원조회·쪽지함 첫 렌더가 빨라짐(특히 모바일). */
const KATEX_CDN='https://cdn.jsdelivr.net/npm/katex@0.16.9/dist';
let _katexP=null;
function ensureKatex(){
  if(_katexP) return _katexP;
  _katexP = new Promise((resolve)=>{
    const css=document.createElement('link');
    css.rel='stylesheet'; css.href=KATEX_CDN+'/katex.min.css';
    document.head.appendChild(css);
    const s1=document.createElement('script'); s1.src=KATEX_CDN+'/katex.min.js';
    s1.onload=()=>{
      const s2=document.createElement('script'); s2.src=KATEX_CDN+'/contrib/auto-render.min.js';
      s2.onload=()=>resolve(true); s2.onerror=()=>resolve(false);
      document.head.appendChild(s2);
    };
    s1.onerror=()=>resolve(false);
    document.head.appendChild(s1);
  });
  return _katexP;
}
/* LaTeX 수식 렌더 ($..$ 인라인, $$..$$ 디스플레이) */
async function renderMath(node){
  if(!node) return;
  const t=node.textContent||'';
  if(t.indexOf('$')<0 && t.indexOf('\\(')<0 && t.indexOf('\\[')<0) return;   // 수식 없으면 KaTeX를 아예 안 받음
  await ensureKatex();
  if(!window.renderMathInElement) return;
  try{ window.renderMathInElement(node,{ delimiters:[
    {left:'$$',right:'$$',display:true},
    {left:'$',right:'$',display:false},
    {left:'\\(',right:'\\)',display:false},
    {left:'\\[',right:'\\]',display:true}
  ], throwOnError:false }); }catch(e){}
}

async function toggleReaction(mid, emoji){
  if(!state.user) return;

  }catch(e){ alert('반응 처리 실패: DB 설정(10_message_reactions.sql) 실행 여부를 확인하세요.'); }
}
async function refreshReactionsFor(mid){
  mid=parseInt(mid,10);
  try{
    const { data } = await sb.from('message_reactions').select('user_id,emoji').eq('message_id',mid);
    const s={counts:{},mine:null};
    (data||[]).forEach(r=>{ s.counts[r.emoji]=(s.counts[r.emoji]||0)+1; if(state.user&&r.user_id===state.user.id) s.mine=r.emoji; });
    reactState[mid]=s;
  }catch(e){}
  renderReactions(mid);
}

function subscribeChat(){
  unsubscribeChat();
  // 채널명을 스레드별로 분리 → 커뮤니티에서 친 '입력 중'이 질문방에 새지 않는다
  chatChannel = sb.channel('chat:'+(community.qid || 'main'))
    .on('broadcast', { event:'typing' }, ({ payload })=>{
      if(!payload || !payload.id) return;
      if(state.user && payload.id===state.user.id) return;      // 내 신호는 무시
      typing.peers.set(payload.id, { name:payload.name||'회원', at:Date.now() });
      renderTyping();
    })
    .on('broadcast', { event:'typing_stop' }, ({ payload })=>{
      if(!payload || !payload.id) return;
      typing.peers.delete(payload.id);
      renderTyping();
    })
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, payload=>{
      // 현재 열려 있는 스레드의 메시지만 표시 (커뮤니티=null, 질문=해당 id)
      const cur = community.qid || null;
      const got = (payload.new && payload.new.question_id) || null;
      if(String(cur) !== String(got)) return;
      appendMessage(payload.new, true);
    })
    .on('postgres_changes', { event:'DELETE', schema:'public', table:'messages' }, payload=>{
      const id=payload.old&&payload.old.id;
      if(id!=null){ const el=document.querySelector('[data-mid="'+id+'"]'); if(el) el.remove(); }
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'message_reactions' }, payload=>{
      const mid=(payload.new&&payload.new.message_id) || (payload.old&&payload.old.message_id);
      if(mid && document.querySelector('.msg-reactions[data-mid="'+mid+'"]')) refreshReactionsFor(mid);
    })
    .subscribe();
  resetTyping();
  typing.tick=setInterval(renderTyping, 1000);   // 만료된 사람 자동 제거
}

/* 정리 기간 선택 (owner/admin) — 예전엔 '1년'으로 고정이었다 */
const PURGE_RANGES = [
  { key:'1y', label:'1년',   days:365 },
  { key:'6m', label:'6개월', days:183 },
  { key:'3m', label:'3개월', days:92  },
  { key:'1m', label:'1개월', days:30  },
  { key:'1w', label:'1주일', days:7   },
];
function onTrashClick(){
  const bar=$('#chatAdmin');
  const old=bar.querySelector('.chat-del-prompt'); if(old){ old.remove(); return; }   // 토글
  const p=document.createElement('div'); p.className='chat-del-prompt';
  p.innerHTML=`<span>얼마나 지난 메세지를 삭제할까요?</span>
    ${PURGE_RANGES.map(r=>`<button class="cdp-range" data-d="${r.days}" data-l="${escapeAttr(r.label)}">${escapeHtml(r.label)}</button>`).join('')}
    <button class="cdp-no">취소</button>`;
  bar.appendChild(p);
  p.querySelector('.cdp-no').onclick=()=>p.remove();
  p.querySelectorAll('.cdp-range').forEach(b=>{
    b.onclick=async()=>{
      const days=Number(b.dataset.d), label=b.dataset.l;
      p.remove();
      const cutoff=new Date(Date.now() - days*86400*1000);
      let cnt=0;
      try{   // 몇 개가 지워지는지 먼저 보여준다 (되돌릴 수 없으므로)
        const { count } = await sb.from('messages')
          .select('*',{count:'exact',head:true})
          .lt('created_at', cutoff.toISOString())
          .is('question_id', null);           // 커뮤니티 채팅만 (질문 답변은 보존)
        cnt=count||0;
      }catch(e){}
      if(!cnt){ alert(`${label}이 지난 커뮤니티 메세지가 없습니다.`); return; }
      const ok=await confirmModal(
        `${label} 지난 메세지 ${cnt}개를 삭제할까요?`,
        `${fmtKST(cutoff.toISOString())} 이전의 커뮤니티 채팅이 영구 삭제되며 되돌릴 수 없습니다.\n(질문 게시판의 답변은 삭제되지 않습니다)`,
        '삭제');
      if(ok) await deleteOldMessages(days, label);
    };
  });
}
async function deleteOldMessages(days, label){
  const cutoff=new Date(Date.now() - days*86400*1000);
  showBlockingLoader(`${label} 지난 메세지를 삭제하는 중…`);
  try{
    const { error } = await sb.from('messages').delete()
      .lt('created_at', cutoff.toISOString())
      .is('question_id', null);              // ★질문 답변은 건드리지 않는다
    if(error) throw error;
    await loadMessages();
    await renderChatAdmin();
  }catch(e){ alert('삭제 실패: admin 권한과 DB 설정을 확인하세요.'); }
  finally{ hideBlockingLoader(); }
}

/* 확인 팝업(Promise) */
function confirmModal(title, sub, okLabel){
  return new Promise(resolve=>{
    const ov=document.createElement('div'); ov.className='modal-ov';
    ov.innerHTML=`<div class="modal-box"><div class="modal-msg">${escapeHtml(title)}</div>${sub?`<div class="modal-sub">${escapeHtml(sub)}</div>`:''}<div class="modal-btns"><button class="modal-cancel">취소</button><button class="modal-ok">${escapeHtml(okLabel||'삭제')}</button></div></div>`;
    document.body.appendChild(ov);
    const done=v=>{ ov.remove(); resolve(v); };
    ov.querySelector('.modal-cancel').onclick=()=>done(false);
    ov.querySelector('.modal-ok').onclick=()=>done(true);
    ov.addEventListener('click',e=>{ if(e.target===ov) done(false); });
  });
}

/* ---- 캘린더 ---- */
async function loadBaseYear(){
  try{
    const { data, error } = await sb.from('app_settings').select('value').eq('key','calendar_base_year').maybeSingle();
    if(!error && data && data.value!=null){ const y=parseInt(String(data.value),10); if(y) community.baseYear=y; }
  }catch(e){}
}
function calMove(delta){
  const min=(community.baseYear-5)*12+0, max=(community.baseYear+5)*12+11;
  const total=community.viewY*12+community.viewM+delta;
  if(total<min || total>max) return;
  community.viewY=Math.floor(total/12); community.viewM=((total%12)+12)%12; renderCalendar();
}
async function setBaseYear(y){
  if(!isAdmin() || y<2000 || y>2100) return;
  try{
    const { error } = await sb.from('app_settings').update({ value:y, updated_at:new Date().toISOString(), updated_by:state.user.id }).eq('key','calendar_base_year');
    if(error) throw error;
    community.baseYear=y; community.viewY=y;
    const minY=y-5, maxY=y+5;
    if(community.viewY<minY){ community.viewY=minY; community.viewM=0; }
    if(community.viewY>maxY){ community.viewY=maxY; community.viewM=11; }
    renderCalendar();
  }catch(e){ alert('기준연도 변경 실패: admin 권한/DB 설정을 확인하세요.'); }
}
function renderCalendar(){
  const wrap=$('#calWrap'); if(!wrap) return;
  const y=community.viewY, m=community.viewM;
  const startDow=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const minY=community.baseYear-5, maxY=community.baseYear+5;
  const atMin=(y===minY && m===0), atMax=(y===maxY && m===11);
  const wd=['일','월','화','수','목','금','토'];
  let cells=wd.map((d,i)=>`<div class="cal-dow${i===0?' sun':''}${i===6?' sat':''}">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) cells+='<div class="cal-cell empty"></div>';
  const t=new Date();
  for(let d=1;d<=days;d++){
    const isToday=(t.getFullYear()===y && t.getMonth()===m && t.getDate()===d);
    const dow=(startDow+d-1)%7;
    cells+=`<div class="cal-cell${isToday?' today':''}${dow===0?' sun':''}${dow===6?' sat':''}"><span class="cal-num">${d}</span></div>`;
  }
  const admin = isAdmin()
    ? `<div class="cal-admin">기준연도 <input class="cal-yr-input" id="byInput" type="number" value="${community.baseYear}" min="2000" max="2100"><button class="cal-save" id="bySave">저장</button> <span class="cal-range">(${minY}~${maxY})</span></div>`
    : `<div class="cal-admin muted">기준연도 ${community.baseYear} · 이동범위 ${minY}~${maxY}</div>`;
  wrap.innerHTML=`
    <div class="cal">
      <div class="cal-topbar">
        <button class="cal-nav" id="calPrev" ${atMin?'disabled':''} aria-label="이전 달">▲</button>
        <div class="cal-title">${y}년 ${m+1}월</div>
        <button class="cal-nav" id="calNext" ${atMax?'disabled':''} aria-label="다음 달">▼</button>
      </div>
      <div class="cal-grid">${cells}</div>
      ${admin}
    </div>`;
  const p=$('#calPrev'), n=$('#calNext');
  if(p) p.onclick=()=>calMove(-1);
  if(n) n.onclick=()=>calMove(1);
  if(isAdmin()){ const sv=$('#bySave'), inp=$('#byInput');
    if(sv) sv.onclick=()=>{ const v=parseInt(inp.value,10); if(v) setBaseYear(v); };
    if(inp) inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const v=parseInt(inp.value,10); if(v) setBaseYear(v); } });
  }
}

/* 페이지 전환 로딩 표시 (헤더 새로고침 아이콘 회전) */
function startLoading(){ const m=$('#refreshMark'); if(m) m.classList.add('spinning'); }
function stopLoading(){ const m=$('#refreshMark'); if(m) setTimeout(()=>m.classList.remove('spinning'),280); }

function route(){
  if(state.recovery){ renderPassword(); return; }   // 복구 모드: 비번 바꿀 때까지 고정
  startLoading();          // 페이지 로딩 시작 → 새로고침 아이콘 회전
  refreshInboxBadge();     // 안 읽은 쪽지 개수 갱신 (네비 배지)
  unsubscribeChat();       // 커뮤니티를 떠나면 채팅 실시간 구독 해제
  stopInboxPolling();      // 쪽지함을 떠나면 실시간 구독·안전망 해제
  closeTipWin();           // 편집기를 떠나면 떠다니는 팁 창도 닫기
  clearTypeToFocus();      // 이전 화면의 '타이핑→포커스' 해제
  stopAdminPresence();     // 회원관리를 떠나면 상태 갱신 중지
  document.body.classList.remove('trash-view');   // 휴지통 열람 모드는 경로 이동 시 해제
  const key=(location.hash||'#main').slice(1);
  const isMember = key.startsWith('member/');
  const isTrashDoc = key.startsWith('trash/');
  const isQuestion = key.startsWith('q/');
  const isDm = key.startsWith('dm/');
  setBotnavActive(key);
  const fullWidthPages=['community','admin','requests','health','password','me','directory','trash','inbox','docs','questions'];
  railReserve(!fullWidthPages.includes(key) && !isMember && !isTrashDoc && !isQuestion && !isDm);   // 문서/대문: 레일 폭 미리 확보(흔들림 방지) · 그 외: 숨김
  if(isMember){ renderMemberProfile(decodeURIComponent(key.slice(7))); return; }
  if(key==='trash'){ if(isAdmin()) renderTrash(); else location.hash='#home'; return; }
  if(isTrashDoc){ if(isAdmin()) renderTrashDoc(decodeURIComponent(key.slice(6))); else location.hash='#home'; return; }
  if(key==='directory'){ renderDirectory(); return; }
  if(key==='main'){ renderLanding(); return; }
  if(key==='community'){ renderCommunity(); return; }
  if(isQuestion){ renderQuestion(Number(key.slice(2))); return; }
  if(key==='docs'){ renderDocsPage(); return; }
  if(key==='questions'){ renderQuestions(); return; }
  if(key==='inbox'){ renderInbox(); return; }
  if(isDm){ renderInbox(decodeURIComponent(key.slice(3))); return; }
  if(key==='admin'){ if(isAdmin()) renderAdmin(); else location.hash='#home'; return; }
  if(key==='requests'){ if(isOwner()) renderRequests(); else location.hash='#home'; return; }
  if(key==='health'){ if(isOwner()) renderHealth(); else location.hash='#home'; return; }
  if(key==='password'){ renderPassword(); return; }
  if(key==='me'){ renderMe(); return; }
  if(state.docs.length && !state.docs.find(d=>d.key===key)){ renderDoc(state.docs[0].key); return; }
  renderDoc(key||'home');
}
window.addEventListener('hashchange',()=>{ if($('#app').style.display!=='none') route(); });

$('#go-signup').onclick=()=>{ $('#loginCard').style.display='none'; $('#signupCard').style.display='block'; renderSignupCaptcha(); };

$('#su-btn').onclick=doSignupRequest;
async function doSignupRequest(){
  const email=$('#su-email').value.trim(), msg=$('#su-msg'); msg.className='msg';
  const cohort=$('#su-cohort').value, name=$('#su-name').value.trim(), handle=$('#su-handle').value.trim();
  const club=$('#su-club').value.trim();
  if(!email||!name||!handle||!cohort){ msg.className='msg err'; msg.textContent='모든 항목을 입력해 주세요. (소속은 없으면 비워두셔도 돼요)'; return; }
  if(!suToken){ msg.className='msg err'; msg.textContent='보안 확인(CAPTCHA)을 완료해 주세요.'; return; }
  $('#su-btn').disabled=true; $('#su-btn').textContent='신청 중…';
  const { data, error } = await sb.functions.invoke('signup-request', {
    body:{ email, cohort:parseInt(cohort,10), name, handle, club, captchaToken: suToken } });
  $('#su-btn').disabled=false; $('#su-btn').textContent='신청하기';
  resetSignupCaptcha();
  if(error || !data || !data.ok){
    msg.className='msg err';
    msg.textContent = (data && data.error) ? ((data.code?('['+data.code+'] '):'')+data.error) : '신청 처리 중 오류(네트워크). 잠시 후 다시 시도해 주세요.';
    return;
  }
  msg.className='msg ok';
  msg.textContent='신청이 접수됐어요! 관리자 승인 후 이메일로 안내됩니다.';
  ['#su-email','#su-cohort','#su-name','#su-handle','#su-club'].forEach(s=>$(s).value='');
}

/* 테마(야간/주간): 저장값 적용 + 토글 시 저장 후 새로고침 */

/* 상단 검색: 한글 자모 분해 부분일치 + 호버 시 랜덤 추천 */
const searchBox=$('#search');
const _CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const _JUNG=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const _JONG=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function _jamo(str){ let out=''; for(const ch of String(str)){ const c=ch.charCodeAt(0);
    if(c>=0xAC00 && c<=0xD7A3){ const s=c-0xAC00; out+=_CHO[Math.floor(s/588)]+_JUNG[Math.floor((s%588)/28)]+_JONG[s%28]; }
    else out+=ch; } return out; }
function _norm(s){ return _jamo(String(s).toLowerCase().replace(/\s+/g,'')); }   // 띄어쓰기 제거 + 자모 분해
function searchDocs(q){ const nq=_norm(q); if(!nq) return [];
  return (state.docs||[]).filter(d=> _norm(d.title||'').includes(nq) || _norm(d.key).includes(nq)).slice(0,8); }
function randomDocs(n){ const a=[...(state.docs||[])];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a.slice(0,n); }
function closeSearchResults(){ const d=$('#searchResults'); if(d) d.remove(); }
function goSearchHit(key){ location.hash='#'+key; searchBox.value=''; closeSearchResults(); }
function _renderResults(items, headLabel){
  closeSearchResults();
  const wrap=document.createElement('div'); wrap.id='searchResults'; wrap.className='search-results';
  const head = headLabel ? `<div class="sr-head">${headLabel}</div>` : '';
  wrap.innerHTML = items.length
    ? head + items.map(d=>`<a data-key="${escapeAttr(d.key)}">${escapeHtml(d.title||d.key)}</a>`).join('')
    : '<div class="sr-empty">검색 결과 없음</div>';
  searchBox.parentElement.appendChild(wrap);
  wrap.querySelectorAll('a[data-key]').forEach(a=>a.onclick=()=>goSearchHit(a.dataset.key));
}
function showRecommend(){ if(searchBox.value.trim()) return; const r=randomDocs(5); if(r.length) _renderResults(r,'추천 문서'); }
searchBox.addEventListener('input',()=>{ const q=searchBox.value.trim(); if(!q){ showRecommend(); return; } _renderResults(searchDocs(q), null); });
searchBox.addEventListener('mouseenter', showRecommend);
searchBox.addEventListener('focus', showRecommend);
searchBox.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const first=document.querySelector('#searchResults a[data-key]'); if(first) goSearchHit(first.dataset.key); }
  else if(e.key==='Escape'){ closeSearchResults(); } });
(function(){ const sc=searchBox.parentElement;
  sc.addEventListener('mouseleave',()=>{ if(document.activeElement!==searchBox) closeSearchResults(); }); })();
document.addEventListener('click',e=>{ const sc=document.querySelector('.topbar .search'); if(sc && !sc.contains(e.target)) closeSearchResults(); });
