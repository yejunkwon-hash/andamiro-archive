name: Keep Supabase Alive

# 무료 플랜은 7일간 요청이 없으면 프로젝트가 자동 정지됩니다.
# 이 워크플로가 매일 1회 keep_alive() RPC를 호출해 정지 타이머를 리셋합니다.
# (7일 한도에 대해 "매일"은 넉넉한 안전 마진)

on:
  schedule:
    # 분·시는 UTC 기준. '17 15 * * *' = 매일 UTC 15:17 = 한국시간(KST) 00:17.
    # 정각(:00)은 GitHub 스케줄러 혼잡으로 지연되기 쉬워, 어중간한 분(:17)을 사용.
    - cron: '17 15 * * *'
  workflow_dispatch:   # 저장소 Actions 탭에서 수동 실행(테스트)도 가능

# 동시에 여러 번 돌지 않도록
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping keep_alive RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Pinging ${SUPABASE_URL}/rest/v1/rpc/keep_alive ..."
          curl -sS -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/keep_alive" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            -o /dev/null -w "HTTP %{http_code}\n" \
            --fail --retry 3 --retry-delay 10 --max-time 30
          echo "Done."
